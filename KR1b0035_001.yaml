body:
  text: 尚書句解卷一元朱祖義撰堯典第一堯書謂之典孔氏曰五典言常道也是以典訓常蓋謂一書之中所載皆堯之常行也堯典於篇次實居第一然篇次之數非孔子之舊乃安國所定何以知之孔子所作書序舜典之後有汨作一篇九共九篇稿飫一篇其十一篇而後乃大禹謨堯典既第一舜典既第二又如此十一篇為孔子所定則大禹謨當第十四今乃云第三是知篇次之數安國所定虞書堯唐帝也書應謂之唐今云虞書者蓋其初堯典實題為唐舜典實題為虞禹謨實題為夏今三篇俱謂之虞書者非史之舊乃孔子定書之後序正也何以知之左傳莊八年引夏書曰臯陶邁種德僖二十四年引夏書曰地平天成襄二十八年引夏書曰與其殺不辜寧失不經是莊襄之時夫子未序正禹謨實謂之夏書則堯典於孔子未序正前亦謂之唐書明矣雖然孔子於三聖之書雖不仍舊貫而必為之序正不俱謂之唐不俱謂之夏必謂之虞者蓋堯授舜舜授禹三聖相授實守一道故序正其書使同其題號者書同則道同也夫舜上承於堯下授於禹以虞名書則上可以該堯下可以該禹三聖之道混然一致略無間斷夫子之意顧不深歟孔氏傳孔安國孔子十一代孫也武帝時古文尚書厄於秦火而復出帝以其家書詔安國作傳其所注解謂之傳也昔在帝堯古者在於帝堯之時聰明文思其聼聰其視明其文煥然其思湛然思笥光宅天下以其有是四德故居天萬民之上而甚光顯也將遜於位將退遜于位也讓於虞舜禪於虞舜作堯典於是作堯典書書序本自作一篇列於百篇之後鄭玄馬融王肅皆以為孔子所作然觀其領略大意而盡於數言至於一字不可增損蓋聖人之文非吾夫子莫能為也本在百篇之後今冠於每篇之首者安國之所分也堯典此二字史臣之舊題古者序自為一篇故每篇首揭其題以為一篇之目孔安國引序冠篇首因存而不去故今書諸篇皆重言本目也曰史臣言若稽古帝堯順考古道而行之者帝堯曰放勳謂能依倣上古之功欽明文思其行已也敬其遇事也明發于政事而其文煥然運于心術而其思湛然安安堯乃安安然初不矜耀其有是功有是四德允恭克讓方且信于盡恭而非偽誠于遜讓而非假光被四表故其功德之光輝被及于四方之外格於上下格而至于塞乎天地之間克明俊德能明一己之大德以親九族以是德親睦九族如父族四父五屬之內一也父之女昆弟適人及其子二也已之女昆弟適人及其子三也已之女子適人及其子四也母族三母之父姓一也母之母姓二也母之女昆弟適人及其子三也妻族二妻之父姓一也妻之母姓二也兹其所以為九族也若以髙祖至玄孫為九族則髙祖非已所逮事元孫亦非已所及見果何以親而睦之耶九族既睦則九族盡和睦平章百姓以是德平和章顯百官族姓自其分職率屬而言之曰百官自其分姓受氏而言之曰百姓百姓昭明百官族姓皆精白以承休德而名揚乃職協和萬邦以是德合和天下萬邦之民黎民於變時雍衆民大變於善時臻雍和乃命羲和堯乃總命處羲和之職者林少頴以謂下文言咨汝羲暨和則羲和似人名余以經考之胤征言羲和廢厥職夫堯與仲康之時相去如此其逺若果人名豈有堯時人名羲和仲康時人亦名羲和耶要之羲和乃官職名世掌天地四時之官也在顓帝時其職名重黎自堯以至夏其職名羲和故楊子雲法言云羲近重和近黎是羲和即重黎也然下文又言羲仲和仲羲叔和叔蓋分掌四時相繼相承如伯仲叔季也以此别其次序欽若昊天使之敬順昊天之日月星辰厯象日月星辰厯以步其數厯者書也如洪範之厯數以紀日月星辰之先後者象以占其象象者器也如舜典之璣衡以參考日月星辰之行度者敬授人時以考究天時以敬授於人分命羲仲又分命處羲仲之職者掌春也宅嵎夷曰暘谷居正東嵎夷之地禹貢嵎夷既略亦在青州之正東謂之暘谷以日出於東山谷皆明也嵎隅寅賔出日寅敬賔迎出日於東若帝嚳厯日月而迎送之即此法也平秩東作春屬於東必均平秩序春時農作之事日中星鳥春分之時晝五十刻夜五十刻晝夜相半而鶉火見於南方正午之位不言鶉火而言星鳥舉四象也以殷仲春以此可以正仲春之氣曰孟曰仲曰季舉仲而言蓋取中氣之得其正厥民析其民於此時分析在田以耕以耨析音昔鳥獸孳尾鳥獸於此時孔化而交接孳字申命羲叔申命處羲叔之職者掌夏宅南交居正南交趾之地史記五帝紀言黃帝之地南至交趾是也平秩南訛夏屬於南必均平秩序夏時化育之事自苗而實即物之變化敬致敬以致其日之至周官言春夏致日左氏言日官居卿以致日蓋聖人南靣視因其夏至之日至而致之以驗時氣之中也日永星火夏至之日晝長夜短晝六十刻夜四十刻大火星見於南方正午之位謂之日永星火此舉十二次也以正仲夏以之可以正仲夏之氣曰孟曰仲曰季舉仲而言蓋取中氣之得其正也厥民因其民於此時因春所耕以耘以耔鳥獸希革鳥獸於此時毛羽希少而改革分命和仲分命處和仲之職者掌秋宅西曰昧谷居正西隴西之縣謂之昧谷以日出於西山谷皆暗寅餞納日寅敬餞送入日於西若帝嚳厯日月而迎送之是也平秩西成秋屬於西必均平秩序秋時成熟之事宵中星虛秋分之時晝夜相半各五十位刻而虛星見於南方正午之以殷仲秋以此可以正仲秋之氣曰孟曰仲曰季舉仲而言蓋取中氣之得其正也厥民夷其民於此時已見收成其心和平而樂易鳥獸毛毨鳥獸於此時毛羽更生而整理毨銑申命和叔重命處和叔之職者掌冬宅朔方曰幽都居正北之方而謂之幽都即幽州也史記五帝紀言黃帝之地北至幽陵亦是此地共工亦流於此平在朔易冬屬於北必均平考察冬窮改歲之事日短星昴冬至之時畫短夜長晝四十刻夜六十刻昂星見於南方正午之位謂之日短星昴此舉二十八宿也以正仲冬以此可以正仲冬之氣曰孟曰仲曰季舉仲而言蓋取中氣之得其正也厥民隩其民於此時入居於隩暖之處鳥獸氄毛鳥獸於此時又生氄細之毛以自溫氄冗帝曰堯言咨汝羲暨和咨命汝羲仲羲叔與和仲和叔期三百有六旬有六日以閏月定四時成歲周一年計三百有六十有六日號為三百六十日積分餘六日有十二箇月六箇月小又餘六日一年實有三百五十四日共餘十二日第二年又餘十二日第三年又餘十二日共餘三十六日以三十日閏一月猶餘六日所謂三年一閏是也第四年又餘十二日第五年又餘十二日連前所餘六日共三十日又閏一月所謂五年再閏是也而四時由此而定嵗功由此而成允釐百工然後百官信以治事庶績咸熙故衆官之功績皆熙然而廣大帝曰堯言疇咨若時登庸有誰可命順是登庸之任將登而用之使居帝位放齊曰放齊言胤子朱啓明嗣子丹朱開明敏悟可授以天下史記亦云嗣子丹朱帝曰吁堯言吁而怪疑之嚚訟可乎謂丹朱口不道忠信之言而好爭訟具可授以天下乎嚚音銀帝曰堯言疇咨若豫采有誰可命順我百揆之事將用為相歡兜曰都歡兜言都而歎美之共工方鳩僝功謂今為共工之官者方始鳩聚著見其功可選用也共恭僝仕簡反帝曰吁堯言吁而疑怪之靜言庸違謂為共工者言不顧行靜則能言用則違之象恭滔天又象貌恭敬而心則傲狠自大如水之滔滔漫天帝曰堯言咨四嶽命主四方方嶽之職湯湯洪水方割大水湯湯逆流沸騰方為世害蕩蕩懷山襄陵蕩蕩然泛濫山之髙者懷而包之陵之卑者襄而上之浩浩滔天其聲浩浩然有滔天之勢下民其咨天下之民皆咨嗟困苦有能俾乂有能治水者將使治之僉曰於四嶽於是采衆人之言先歎而美之於烏鯀哉然後薦鯀謂其才可用鰥音衮帝曰吁堯吁而疑怪之曰咈哉言其違戾而不可用方命圯族孟子云方命虐民趙氏注方猶放放棄教命圯壞族類傾陷忌刻之人也圯音痞嶽曰四嶽言異哉然則已矣乎異音異試可乃已但試其可治水則已無求其他帝曰堯姑順四嶽之意而戒之曰往欽哉可往治水當處之以敬九載績用弗成其功用果厯九年而弗成帝曰堯言咨四嶽命主四方方嶽之官朕在位士十載堯年十六自唐侯陟天子之位在位七十年時年八十六汝能庸命汝四嶽能用我之命巽朕位我將巽汝以朕位嶽曰四嶽言否德忝帝位己之不德適所以忝辱帝位曰堯言明明揚側陋如此則汝當明明然舉揚僻側淺陋之處賢者師錫帝曰四嶽遂率衆人共與帝堯言之有鰥在下曰虞舜有無妻而鰥者在下謂之虞舜可以當帝位虞其氏舜其名後因以虞為國號帝曰俞堯答曰然豫聞如何我亦聞其名但未知為人何如嶽曰四嶽言瞽子舜乃瞽者之子舜父本有目以其不能分别善惡時人謂之瞽父頑舜父心不則德義之經母嚚舜母口不道忠信之言象傲舜弟名象又傲慢而不恭克諧以孝舜皆能諧和之以孝道蒸蒸乂使之進進以善而自治不格姦不至於為姦惡以害舜帝曰堯言我其試哉我且試舜以考其行績女于時於是以二女女之以女適人謂之女女去觀厥刑于二女觀其如何以禮法刑制二女釐降二女于媯汭舜果能以禮法制之降下二女於媯水北而居之媯龜汭音芮嬪于虞帝女雖貴從夫而居行婦道於有虞之族也帝曰堯美之曰欽哉果能相敬也舜典第二此書所載皆舜之常行可以為萬世之常法故謂之舜典虞舜側微虞其氏舜其名後因以虞為國號舜初處僻側之地微賤之中堯聞之聰明堯間其聽聰其視明將使嗣位將使繼帝位歷試諸難歷歷以諸難行之事試之作舜典於是作舜典書舜典此二字史官之舊題曰史官之言若稽古帝舜順考占道而行之者帝舜曰又言重華協于帝堯有此光華之德舜能重之亦有此光華之德合協于堯而無異濬哲文明其德濬深宏也哲睿哲也文文章也明聰明也溫恭允塞溫粹和也恭恭敬也允信當也塞充實也玄德升聞凡八者即元德也舜雖潛幽逺處而實升聞於天朝乃命以位堯乃命之以官位慎徽五典以之任司徒之職而謹夫慎徽美君臣父子兄弟婦朋友五常之教五典克從五典之教皆能順從初無違教之人也納于百揆納之於宰相之職而揆度百官之事百揆時敘百揆之事一時皆得其次序而無廢事賔于四門以之賔迎諸侯于四門四門穆穆四方諸侯來朝者皆和穆而又穆納于大麓堯以水為患使舜入山林相視原隰也烈風雷雨弗迷暴風雷雨大至而舜不迷惑天地鬼神亦或有相之者太史公亦謂山林川澤烈風雷雨舜行弗迷帝曰堯言格汝舜至汝舜詢事考言謀汝以事而察汝之言乃言砥可績汝之言皆能致行而可以立功三載汝陟帝位三年使汝舜升帝位舜讓于德弗嗣舜乃遜于有德之人不冒陟帝位以繼堯正月上日舜既讓而堯不許舜乃以正月初一日受終於文祖受堯終帝位之事於堯文德之祖宗廟在璿璣玉衡以璿玉為璣以玉為衡璣畫天文於其上可以運轉衡如簫管之狀舜察璣衡以齊七政以齊上天日月五星之七事使如璣衡所畫之軌度不如則為變異而不齊也肆類于上帝遂以物之類天者祀上天而告以陟位之事如天之色蒼則祀以蒼璧天之體圓則祀以圜丘禋于六宗精意以享四時也寒暑也日也月也星辰也水旱也六者之可尊者望于山川山川既逺則望而祭之遍於羣神以至祀典不載皆遍及之輯五瑞輯斂收聚五等諸侯所執之玉既月盡正月一月乃日覲四嶽羣牧乃日朝覲四嶽羣諸侯以觀其能否班瑞于羣后果皆賢無所貶黜然後以五瑞復還諸侯嵗二月東巡狩舜乃於一年之間二月春之仲月春之中也往東方巡省守土諸侯至于岱宗柴至于東嶽岱山為衆山之尊者燔柴以告至所以告天也望秩于山川又望東方山川之神以序而祭之肆覲東后肆覲見東方之諸侯協時月正日因而於四時之節氣月之小大必以王朝之正朔考而合之日之甲乙必以王朝之正朔辨而正之則厯法定矣同律度量衡然後律度量衡可考而知度量衡生乎律而律之卜二如黃鍾太簇姑洗蕤賔夷則無射林鍾南吕應鍾大吕夾鍾中吕又生乎律之十二辰班孟堅律厯志云推厯生律故舜欲律之十二度之分寸丈尺量之籥合升斗衡之銖兩斤釣考而校之使逺近內外均同如一必先協時月正日也修五禮修明吉凶賔軍嘉之五禮五玉公執桓圭九寸侯執信圭伯執躬圭各七寸子執榖璧男執蒲璧各五寸三帛諸侯世子執纁公之孤執玄附庸之君執黃二生卿執羔取其羣而不失其類大夫執鴈取其候時而不失其時一死士執雉取其守死而不失其節贄五等諸侯與其國之卿大夫士各以其所執贄見於天子贄猶言至執之以自至也贄至如五器亦如輯五瑞之器卒乃復終乃復還之五月南巡守五月夏時之中舜往南方巡省守土諸侯至于南嶽至于南嶽衡山如岱禮其燔柴以至於諸侯卿大夫士贄見於方嶽之下皆如岱宗之禮八月西巡守八月秋時之中舜往西方巡省守土之諸侯至于西嶽至于西嶽華山如初如其初岱宗之所行十有一月朔巡守十一月冬時之中舜往北方巡省守上之諸侯至于北嶽至於北嶽恆山如西禮又知西嶽之禮歸格于藝祖用特巡守四嶽既畢然後歸還京師至于文祖之廟其牲用牛以告至也五載一巡守五年之間天子以一年出巡守四嶽之諸侯羣后四朝由四年侯綏要荒之諸侯各以一年朝天子于京師惟畿內甸服之諸侯執事于王庭朝夕見焉故無俟於朝敷奏以言諸侯來朝者各敷陳進奏其言明試以功因其言而明審以試其果有功車服以庸然後錫之車與服以顯其可用如采菽之詩曰君子來朝何以豫之路車乘馬玄衮及黼是也肇十有二州洪水之初禹别九州水土既平舜始分為十二分冀為豳為并分青為營封十有二山取十二州之山至髙大者以為強域之表識濬川深十二州之川以通其流使無壅塞象以典刑象者垂以示人蓋示民以常刑使知所避即周官垂刑象于象魏流宥五刑人有罪據其狀合刑而情差可恕全赦則太輕致刑則太重不忍依例刑殺故完全其體流之逺方以寬墨劓剕宫大辟之五刑鞭作官刑官事不治則立鞭箠之法以為治官之刑即周禮滌狼氏誓大夫曰敢不關鞭五百是也撲作教刑有學校之間不勤學道則撲之以為教導之刑記曰夏楚二物收其威也撲普卜反金作贖刑人有過誤又作贖刑使入金以贖罪若吕刑所謂大辟疑赦其罰千鍰等所罰之金即今之銅古者金銀銅鐵總號為金周官攻金之工六其所為者有銅有鐵是皆金名贖音蜀眚災肆赦已所誤為為眚因人致罪為災縱緩自怠於為事為肆三者情輕舜赦之眚省怙終賊刑怙恃其惡終於為惡賊害其人此三者情重舜刑之怙户欽哉欽哉敬而又敬惟刑之恤哉惟刑之憂恤惟恐其或濫流共工于幽洲共工象恭滔天故放流之幽洲之地流者移其居處若水之流放歡兜于崇山歡兜黨共工其罪同故放之崇山放者使之自治竄三苗于三危三苗貪冒無厭故竄之三危之地竄者投棄之名殛鯀于羽山鯀九載績用不成故殛之羽山四罪而天下咸服罰此四罪而得其當故天下皆心服二十有八載堯年十六即位在位七十年求禪試舜三年一在七十年之中自正月上日舜居攝至堯崩又二十八年凡夀一百二十四嵗帝乃殂落堯乃魂氣升于天而殂體魄降于地而落百姓如喪考妣百姓思之如失父母三載三年之間四海遏密八音四海之內皆遏絶金石絲竹匏土革木之八音月正元日舜服堯喪三年已畢乃於正月初一日舜格于文祖舜至文德之祖廟告以即位詢于四嶽有事則詢問於在內四嶽之大臣闢四門闢四方之門以來四方之賢者明四目明四方之目以視四方之事達四聰達四方之聰以聽四方之言咨十有二牧咨命在外十有二牧養民之諸侯曰告之曰食哉惟時欲民之粒食足當使之因時以趨農柔逺能邇以柔道懷逺人則能治邇人敦德允元敦崇有德之人信任元善之人而難任人以難任用人材不敢輕易也蠻夷率服則南蠻東夷莫不相率而來朝舜曰舜言咨四嶽咨言四嶽之大臣有能奮庸熙帝之載有人能奮起其功廣堯之事者使宅百揆使之居宰相之職以揆度百官之事亮采惠疇明其掌治掌教掌禮者之事各順其類而率屬僉曰衆人同詞而言伯禹作司空禹作司空主平水土已有功可用案國語云有崇伯鯀賈禹逵云崇國名伯爵也必是禹代鯀為崇伯故謂之伯帝曰俞舜言俞以然其舉咨禹於是咨命禹汝平水土汝平治水土實有成績惟時懋哉今居是百揆之職必能勉禹拜稽首禹乃首至地為稽首而拜讓于稷契暨臯陶讓于稷契與臯陶契音薛帝曰俞舜言俞以然之汝往哉汝可往居百揆之職帝曰棄棄稷之名因其生時棄之隘巷寒氷平林故名以棄舜命曰黎民阻飢黎民之艱阻者在於飢餒汝后稷播時百榖汝居稷官當教民播種是百榖帝曰契舜命契曰百姓不親百姓不相親睦五品不遜父子君臣夫婦朋友長幼五者尊卑品秩之序皆不相順汝作司徒命汝為司徒之官敬敷五教在寬以敬敷布五常之教於天下在於以寬待之不可急迫帝曰臯陶舜命臯陶曰蠻夷猾夏今蠻夷猾亂華夏寇賊姦宄肆為攻劫之寇殺人之賊在內曰姦在外曰宄汝作士汝為士師之官掌刑以治之五刑有服墨劓剕宫大辟之五刑各有所從犯某罪者從某刑五服三就五刑既各有所從則就所在者有三大罪就原野大夫就朝士就市五流有宅有情可恕者又制為五等流法以宥之而各有所處五宅二居五流之所處有三居大罪居四裔其次居九州之外其次居千里之外惟明克允惟能審其刑而後能允當人之罪帝曰舜言疇若豫工誰能順我百工之事僉曰衆人同辭而舉垂哉垂可勝任帝曰俞舜言俞以然之咨垂於是命垂汝共工汝當恭謹百工之事垂拜稽首垂乃首至地為稽首而拜讓于殳斨暨伯與讓于殳斨與伯與二臣殳殊斨鎗帝曰俞舜然之曰往哉汝諧垂可往居此職汝能諧和其事帝曰舜言疇若豫上下草木鳥獸誰木順獸山澤草事順者以時而取之也僉曰衆人同辭而舉益哉帝曰俞舜然之咨益於是命益汝作朕虞汝可為我虞官益拜稽首益首至地稽首而拜讓于朱虎熊羆讓于二臣帝曰俞舜然之曰往哉汝諧益可往居此職汝能諧和其事帝曰舜言咨四嶽命四嶽大臣有能典朕三禮有能主我祀天神祭地祗享人鬼之三禮者我命之僉曰衆人同辭而舉伯夷伯夷可勝任帝曰俞舜然之咨伯於是命伯汝作秩宗汝為秩宗之官謂以序祭祀而尊崇三禮夙夜惟寅惟早夜寅敬直哉惟清正直而不溺清潔而不汙伯拜稽首伯夷首至地為稽首而拜讓于夔龍讓于二臣帝曰俞舜然之曰往欽哉汝可往居此職敬以處之帝曰夔舜命夔命汝典樂教胄子命汝主樂教長子王制王太子王子羣后之太子卿大夫元士之適子是也周官人司樂以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語即此職也直而溫此下即教以樂德蓋直者常徑正而不溫和故因直而教以溫也寬而栗寬者常怠緩而不莊栗故因寬而教以栗剛而無虐剛強常失於苛虐故因剛教以無虐簡而無傲簡易常失於傲慢故因簡教以無傲詩言志此下即教以樂語也蓋詩者志之所之在心為志發言為詩是詩所以言志歌永言言不足而嗟歎永歌是歌所以永長其言聲依永人聲有洪纎髙下樂聲有宫商角徵羽故樂聲常依隨永言而作律和聲又以十二律和樂之五聲八音克諧然後金石絲竹匏土革木之八音單出為聲雜出為音莫不諧和無相奪倫無相奪其倫理神人以和足以感人與神之和則胄子之德安得不歸於中和夔曰夔自述作樂之效而言於豫擊石拊石石磬樂之難和也詩曰鞉鼓淵淵嘒嘒管聲既和且平依我磬聲以此知樂之和由石聲而依之也於我大以繫之小以拊之和其所難和百獸率舞則百獸之難感也今也聞樂之聲率舞于前自有以感物之所難感帝曰龍舜命龍曰朕堲讒説殄行我疾惡小人為讒邪之言殄絶君子之行聖情入殄田上行去聲震驚朕師震動驚恐我衆命汝作納言命汝為納言之官夙夜出納早夜之間出上之言於下使臣民於人君之德意志慮無不畢達納下之言於上使人臣於下之缺諷刺無不周知上下情通則讒説自止朕命惟允我以是命汝汝惟信以行之帝曰舜言咨汝二十有二人命汝禹垂益伯夷夔龍六人新命居職者合四嶽十二牧為二卜二人欽哉敬哉惟時亮天功惟因時而明天之事如典曰天敘禮曰天秩刑曰天討無非天命也三載考績三年之後考爾之功三考黜陟幽明至於三考九年升陟有功者以顯明其功退黜無功者於幽隱之地使不得顯揚於世庶績咸熙如此則衆功皆廣矣分北三苗其時惟三苗弗即功已竄其君於三危今又久而不悛於是分别北背其黨北音背舜生三十舜生三十年在側微之中徵庸三十堯召用厯試三年攝位二十八年在位五十載堯崩服喪三年其一年已在三十之數又在位為天子五十年是為舜夀一百一十二嵗陟方乃死然後升遐而死帝釐下土此下乃十一篇亡書序謂舜經理天下之土方設居方隨方而設其居方之法量地制邑度地居民别生分類别其族姓之生使知尊祖分其合族之類使知相從別鱉作汨作於是作汨作之書其書雖亡大意言治民之功興汨骨九共九篇於是作九共之書九篇其書雖亡大意言九州土地所生不同其貢物亦異共音恭稿飫於是作稿飫之書其書雖亡大意言勞賜斯民亦厚稿犒尚書句解卷一
