body:
  text: 尚書句解卷十一元朱祖義撰周官第二十二成王四征來歸董正周之百官而作此篇以訓迪之故曰周官成王既黜殷命殺武庚而黜絶殷命滅淮夷三監既叛淮夷同惡成王滅之還歸在豐乃還歸在豐以滅淮夷之事告於文王之廟還旋作周官因而董正治官訓迪百官故作此篇周官竹簡所標惟周王撫萬邦淮成王撫臨萬邦以為君巡侯甸乃巡行於侯服甸服四征弗庭四面而征諸侯不朝於王庭者綏厥兆民特以諸侯負固不服割害下民征之乃所以安其兆民六服羣辟由是侯甸男邦采衛之衆君辟壁罔不承德無不奉承成王之德心悅誠服歸于宗周成王於是還師歸于豐邑謂之宗周以周家為天下之所尊董正治官董督釐正朝廷治事之官王曰成王言若昔大猷如欲順古昔大道而行之制治于未亂常制其治於未亂之先使政教無闕保邦于未危安其國於未危之日使上下無虞曰唐虞稽古因論堯舜稽考古道建官惟百建宫之數惟止於百內有百揆四嶽在內則有百揆宰相之位四嶽以分掌諸侯外有州牧侯伯在外則有十二州之牧與諸侯之長庶政惟和所以為政得其和而政教禮刑無不理萬國咸寧萬國得其寧逺近內外無不安夏商官倍夏商之官倍於唐虞其數二百亦克用乂亦能用之以致治明王立政信乎明王立政之要不惟其官不在官多惟其人惟在得人今豫小子成王自稱祗勤于德祇敬而勤勉於為德夙夜不逮早夜之間常如不及仰惟前代時若仰慕唐虞夏商用人致治之效順而行之訓迪厥官以訓導啓迪其百官立太師建立太師以其師法於王太傅曰傅以其輔翼於王太保曰保以其保安於王兹惟三公此謂之三公以其公於國家而無私也論道經邦講論治道因革之宜損益之節以經理邦國夑理陰陽國安民和則天地之和應而陰陽自得其調理矣官不必備三公所任如此其大故其官不可用備具惟其人惟得其人則以任之無其人寧闕以待用少師少傅少保孤次於公謂之少者以其職贊二於三公曰三孤上有三公之尊則易以曲從故欲孤特自守所以謂之三孤二公𢎞化贊成三孤洪大三公之化寅亮天地敬明天地之道弼豫一人輔我一人使知所以長天冢宰掌邦治冢山之頂也至髙也他官專一官之事冢宰掌六官之事此宰相之職故曰掌邦治則合禮教刑政而兼主之統百官統率百官使皆在冶均四海均平四海使皆趨治司徒掌邦教司徒掌邦國之教謂充乘騎而徒行者皆主以教之也敷五典敷布五常之教於民擾兆民順兆民之性所固有者而教之宗伯掌邦禮宗伯掌邦國之禮以尊事天神人鬼而此為之長治神人施其禮於祭祀則事天神地祗人鬼謂之治神施其禮於人事則有吉凶軍賔嘉謂之治人和上下施其禮於交接之間則有君臣父子上下之分不可瀆亂故謂之和司馬掌邦政政官謂之司馬以正軍旅所主在馬故以司馬名官統六師天子畿內六鄉一鄉一軍司馬統率之平邦國以削平諸侯驕蹇叛上者司寇掌邦禁主治羣行攻劫之寇不言掌邦刑而言禁蓋刑於己然不若禁止於未然詰姦慝奸詐慝惡乃暴亂之未著特窮詰切責之而已詰起一切刑暴亂暴虐為亂乃奸慝之已著則加之刑司空掌邦土事官之長主度空土以居民居四民以居士農工商之民時地利使民種植以時而收地利六卿分職六卿各分職以掌其事各率其屬每卿有屬官六十各率其屬以共治以倡九牧同以倡率九州之牧阜成兆民以大成就其民六年五服一朝六年之中五服各以一年朝天子又六年王乃時巡又六年則十二年之間五服諸侯經二次來朝天子乃出巡守以省方觀民時巡如舜典春東夏南秋西冬北是也考制度于四嶽巡守至方嶽之下考其制度如舜典協時月正日同律度量衡諸侯各朝于方嶽諸侯各來朝天子于方嶽之下大明黜陟大明黜陟之法有功者加地進爵無功者削地黜爵王曰嗚呼歎言凡我有官君子在大夫以上者欽乃攸司各敬所主之職愼乃出令當令未出之前謹而審之令出惟行及令既出惟在所行弗惟反不可别反出令以改前令以公滅私以公理滅私情民其允懷民乃誠信歸服學古入官學古人之道然後可入官治事議事以制講論當世之務則以先王制度為法政乃不迷然後政事無迷惑紊亂其爾典常作之師其爾有官君子當以典章常行者為師法無以利口亂厥官無以利便之口說紊亂所主之事蓄疑敗謀有疑則問若蓄藏於心而不決則敗所謀之事怠忽荒政當行則行若怠惰忽略則荒廢所行之政不學牆靣學古則見博不學則如面牆而立無所見蒞事惟煩以之臨事則胸中膠擾煩亂蒞利戒爾卿士成王又告戒六卿功崇惟志已成謂之功心所期向謂之志欲功之崇惟在於此志之堅業廣惟勤始修謂之業勉力而無有作輟者謂之勤欲業之廣大惟在於勤而不至於荒怠惟克果斷惟能果斷其志以有立果斷於勤而不倦乃罔後艱則功業之成於後不見其難矣位不期驕人以位而貴位不欲驕而驕自生祿不期侈人以祿而富祿不欲侈而侈自至恭儉惟德欲不驕莫如恭欲不侈莫如儉德者得於己恭儉在已則是善出於所性無載爾僞非以聲音笑貌而行詐僞作德心逸日休恭儉既出於德則心廣體胖安逸而日有休矣作僞心勞日拙恭儉苟出於僞則心焦然不寧勞苦而日見拙惡居寵思危處寵祿貴盛之時不可以驕侈為心常思其有災危及身罔不惟畏恐懼戰栗無往而不畏則可以無危弗畏入畏不知畏懼自恣驕侈則災危不旋踵而入於可畏之中推賢讓能人有賢則推之使在已前人有能則讓之使在已上也庶官乃和是以衆官皆相悅而和睦不和政厖若自恃己長則官不和叶而政事厖亂舉能其官卿士所舉之人能其官而稱職惟爾之能是爾卿士亦有能焉稱匪其人卿士所舉非人惟爾不任是爾卿士不任其責王曰嗚呼嗟曰三事暨大夫命乃事乃凖乃牧與大夫次於卿者而告之敬爾有官敬爾所居之官而無忽亂爾有政治爾所掌之政而無紊以佑乃辟以佑助爾君辟壁永康兆民長安天下之民萬邦惟無斁使萬邦無厥斁於我周家斁亦成王既伐東夷此孔子序賄肅愼之命之書成王伐淮夷以其與三監同叛肅愼來賀東北逺夷其國有名肅愼以王戰勝遂來朝賀王俾榮伯作賄肅愼之命王賂肅愼以幣帛嘉其逺來使榮國伯爵之諸侯作賄肅愼之命之書此書亡周公在豐此孔子序亳姑之書周公退老不歸魯而在豐使成王於政事便於謀度咨問是周公退老之日不忘其君也將沒公垂沒之際欲葬成周成周即頑民所遷洛邑周公師保萬民民懷其德故欲葬成周者所以係商民之心是周公於將死之頃不忘其民也公薨成王葬于畢以文武墓在畢成王不敢臣周公葬周公於葬文武之所告周公既葬致告公以葬畢與遷奄之事作亳姑此篇書亡亳姑即蒲姑也周公前此欲遷奄君於蒲姑至此告其已遷矣君陳第二十三以聖繼聖則其治易以賢繼聖則其治難東郊成周之頑民周公在則周公治之公沒以君陳繼其後此以賢繼聖者可不謹哉故成王作書周公既沒先是周公化東郊之民命君陳分正東郊成周公沒成王又命君陳分東郊成周之民善惡而正之洛邑在西成周在東故謂東郊成周作君陳故作此篇君陳舊簡標題王若曰成王之意若曰君陳君以尊其身陳以呼其名惟爾令德孝恭惟爾有令善之德在於孝而能恭惟孝友于兄弟惟能孝友在內則能順其兄弟克施有政在外則能施其政事蓋孝可移忠於君居家理故事可移於官命汝尹兹東郊是以命汝正此東郊之民敬哉當主於敬昔周公師保萬民昔公化東郊之民師以教之保以安之民懷其德故民懷慕周公之德往愼乃司今汝君陳往東郊當謹愼所主之職兹率厥常於此率循周公常法懋昭周公之訓勉力以明周公訓民之道惟民其乂乂治也我聞曰我聞古人有言至治馨香極治之世天下和平至和之氣蔚為馨香感于神明幽而神明猶可感動況於頑民乎黍稷非馨以黍稷祭祀非馨香能感動也明德惟馨明德達於至治自然有馨香之逺聞爾尚式時周公之猷訓爾君陳庶幾法周公之道教蓋道教即明德也惟日孜孜以致其動無敢逸豫無敢萌安逸暇豫之心凡人未見聖周公聖人也凡人之情未見聖人若不克見急於見之若恐不能及見既見聖及既見聖人亦不克由聖或自暴自棄亦不能用聖人之道爾其戒哉爾君陳當以凡人而為之戒爾惟風下民惟草爾今日為商民之君動化於上猶之風焉商民順從於下猶之草焉草上之風必偃民之邪正實在君陳之身可不戒其徒見聖而不由聖歟圖厥政今爾圖謀政事莫或不艱莫或不以為難有廢有興有欲廢者有欲興者出入自爾師虞當出則虞度於爾外之衆人入則虞度於爾內之衆人庶言同則繹衆人之言或同謂此政事當廢此政事當興又當紬繹反覆以審其政事於己爾有嘉謀嘉猷爾圖謀政事人與己並用而有嘉謀善道則入告爾后于內則當以入告爾后成王於內爾乃順之于外成王以為然然後爾君陳順行於外不可倒行而逆施曰斯謀斯猷惟我后之德有善則稱君惟曰此謀此猷之善惟我后成王之德所致嗚呼王歎以告君陳臣人咸若時使人臣圖政事皆能如是虞之於人繹之於己告之於上順行於下收功於臣必歸德於君惟良顯哉惟謹為良臣而有顯名於世矣王曰君陳呼而告之爾惟𢎞周公丕訓爾惟𢎞大周公大訓推廣以施於民無依勢作威無倚傍官勢作威以虐民無倚法以削無倚恃國家有取民之法而多取以侵削於民寬而有制以寬容為主於寬之中使默有法制寓於其間從容以和使民愛而能畏從容暇豫自至於和殷民在辟不幸殷民陷在刑辟之中辟闢豫曰辟我言當加之法爾惟勿辟汝不可徇我言遂加之法豫曰宥我言當在赦宥爾惟勿宥汝不可徇我言遂從而宥之惟厥中惟徇其理之中而已蓋君之好惡無常情而法之輕重有常理有弗若于汝政果有人不順于汝政弗化于汝訓不化於汝之教辟以止辟汝必以法加此一人可止千萬人畏而不敢犯法乃辟汝乃以法加此一人於法狃于姦宄乃有人狃習為奸於外為宄於內狃紐敗常亂俗以敗壞五常之道紛亂天下之風俗三細不宥犯至於再猶可恕犯至於三雖細罪亦不可赦爾無忿疾于頑汝無忿怒疾惡不懷德義之頑民無求備於一夫無求全責備於漸能率教之人必有忍此即無忿疾之意夫忍之與容大同小殊忍則出於制其心人必制其心使無忿疾其乃有濟然後其事乃有濟有容容則其量自然寬大有所含蓄非忍之比實由忍可以至於容也德乃大然後德日以大德之大又不止於有濟實由有濟可以至於德乃大也簡厥修此即無求備之意有人知自修而耻於為惡者吾簡而別之亦簡其或不修則不知自修者亦有所簡别於是愧於中曰吾奚而不與厥修者之簡也亦從此而為之修矣進厥良有賢良之人其德行可用者吾進而顯之以率其或不良以率其不為賢良之人則彼知所自勉而愧於中曰吾奚而不與厥良者之進也亦將化而為良矣惟民生厚所以簡不修率不良者無他以民生本醇厚因物有遷因外物遷變遂至於薄惡違上所命從厥攸好有違棄上所教命而各從其所私好爾克敬典在德成王言民未易糾率在爾君陳能以誠敬自處常在於惟德以化民時乃罔不變則一時之人將化上之德無不變其舊染之習允升于大猷信能升進於大道矣惟豫一人膺受多福非惟民化惟我一人亦當受其多福矣其爾之休終有辭于永世非惟君多福而爾君陳之休美亦當終有稱譽之辭於永久之世矣顧命第二十四回首曰顧成王臨崩回顧而命臣以相康王故以此名篇成王將崩天子死曰崩命召公畢公率諸侯命二公大臣率領諸侯相康王輔相康王作顧命遂作顧命之書顧命舊簡標題惟四月哉生魄四月十六曰始生魄王不懌成王始得疾不悅懌甲子至甲子日其疾愈甚王乃洮頮水王自度必死故扶持而起以水洮浣其手頮洗其面洮滔頮悔相被冕服不能自衣自冠故扶相成王之官如太僕者以冠冕冠於王之首以衮服加於王之體故曰被憑玉几憑倚玉几乃同召太保奭乃同時召諸侯卿士及居太保之職者奭即召公也芮伯芮國伯爵諸侯彤伯彤國伯爵諸侯畢公畢國公爵之諸侯衛侯衛國侯爵諸侯毛公毛國公爵諸侯師氏中大夫掌以媺詔王者虎臣虎賁氏百尹百官之長御事凡治事之臣成王臨崩皆在左右成王憑玉几命之受顧命相康王王曰嗚呼嗟歎疾大漸惟幾我疾大進而其勢危病日臻遂成重病日至既彌留既久留於體而不退恐不獲誓言嗣恐其死不得出誓誥以言立康王嗣續之事兹豫審訓命汝故於此我必詳審而為訓辭以命汝等諸侯卿士昔君文王武王昔先君文武宣重光相繼宣布此重光之德奠麗陳教則肄定其民之所附麗者而行之君之所行即民之所麗於是陳其教於民則民莫不習其教麗離肄不違既習其教而不違用克達殷集大命文武用能顯達於為殷之時而集大命於為周之日在後之侗在我後人雖侗闕侗同敬迓天威常以敬迎天威嗣守文武大訓繼續遵守文王武王大訓而行之無敢昏逾無敢昏迷而越其訓今天降疾殆今不幸天降下疾病在身甚危殆弗興弗悟不能興起不能曉悟爾尚明時朕言爾等諸侯卿士庶幾明審我此言用敬保元子釗用敬保安長子康王名釗釗昭𢎞濟于艱難大濟度其艱難柔逺能邇必須以柔道治逺民而後能治近民安勸小大庶邦撫安勸勉小大庶邦之諸侯使相安相勉以善思夫人自亂于威儀奈何我思夫人多自亂其為君之威儀爾無以釗冒貢于非幾爾衆臣無以康王無所知識冒昧進之於非事危事之地兹既受命還此諸侯卿士既受顧命而還出綴衣于庭乃徹去王坐處幄帳於庭將為死備越翼日乙丑王崩於明日成王死太保命仲桓南宫毛召公乃命二武臣必是掌宿衛者俾爰齊侯吕伋使於太公之後吕伋掌兵之所伋急以二干戈用二干戈二人各執其一虎賁百人逆子釗于南門之外迎太子名釗於路寢門外成王病時臣子皆侍左右今將正太子之尊故使出南門而更迎入所以殊之也賁奔延入翼室成王喪在路寢故延請太子釗入路寢旁翼室即孟子言二室也恤宅宗謂以喪憂居側室為憂居之主王喪丁卯自乙丑越三日丁卯日命作册度召公命太史為册書法度下云皇后憑玉几宣成王顧命之言是册書也將受命時升階即位及傳命己後康王答命受同祭享是法度也越七日癸酉自丁卯越七日伯相命士須材以召公領諸公則謂之伯以召公為冢宰則謂之相命士致材木須待以供喪用謂棺椁冥器之類是也狄設黼扆綴衣自此以下成王之四座也狄下士也扆屏風畫為斧文也白與黑謂之黼以白黑畫斧文也綴衣幄帳也命下士設黼扆綴衣於四座之上以宣王命象成王之生時也扆於豈反牖間南嚮牖窗也牖間窗之東戶之西也於窗東戶西南嚮設此一座象王生時見諸侯朝羣臣之座也敷重篾席黼純天子之席三重敷設三重篾席篾席桃枝竹席也黼黑白雜繒也純緣也以黑白雜繒緣席也篾篾純準華玉仍几華玉五色玉也設五色玉几周禮吉事變几凶事仍几因生時之几不改作也西序東嚮東西廂謂之序於西廂向東設此一座象王生時旦夕聽事之座也敷重砥席綴純敷設三重砥席蒲荔之席也以綴為純乃連綴諸色之綵以為純也文貝仍几貝水蟲取其甲以飾器物文貝有文之貝用以飾几中東序西嚮東廂向西設此一座象王生時養國老享羣臣之座敷重豐席畫純敷設三重豐席以管為席也盡純以五采色畫帛為緣也畫畫雕玉仍几用雕鏤玉為几西夾南嚮天子處中央之太室即路寢也兩畔有東西室夾中央之大室故謂之東西夾於西廂之夾室中向南設此座象王生時與親屬私宴之座敷重筍席𤣥紛純敷施三重筍席以篛竹為席也𤣥紛黑純也以黑綬為緣漆仍几以漆飾几越玉五重陳寶自此以下陳王之所實也列玉五重又陳先王之寶器玉一雙為重五重五雙玉也下文𢎞璧琬琰大玉夷玉天球各一雙是玉五重也下文赤刀大訓河圖舞衣大貝鼖鼓戈弓竹矢是陳列其寶器也赤刀武王誅紂時以赤為飾大訓虞書典謨𢎞璧大璧琬琰大圭在西序以此陳於西序之座北大玉華山之玉夷玉東夷之玉天球雍州之玉河圖伏羲所畫之八卦在東序以此陳於東序之座北𦙍之舞衣𦙍國所制之舞衣合於法度也大貝猶前之文貝取其大者鼖鼓長八尺先代之器商周以來實之鼖焚在西房以此陳於西夾坐之東兊之戈兊古之巧者所造戈和之弓和古之巧者所造弓垂之竹矢垂舜時共工所造之竹矢在東房以此陳於東廂之夾室大輅在賔階面自此以下陳王所乘車輅周禮典輅云若有大祭祀則出輅大喪大賔客亦如之大輅輅之大者即周禮巾車所掌玉輅以玉飾輅也在賔階陳此輅在西階也謂之面者人在堂上面向南方此輅轅亦向南綴輅在阼階面綴輅繫綴於玉輅之下是玉輅之次者即周禮巾車所掌金輅以金飾輅也在阼階陳此輅在東階也謂之面者以人在堂上面向南方陳此輅轅亦向南先輅在左孰之前先輅即周禮巾車所掌象輅以象飾輅也孰者門側之堂也左孰在門內之西自內向外言之雖在西自外向內言之實在左孰前陳車皆以轅北面向堂孰孰次輅在右孰之前次輅即周禮巾車所掌木輅次於象輅也孰者門側之堂也左孰在門內之東自內向外言之雖在東自外向內言之實在右孰前陳車皆以轅北面向堂二人雀辨執惠自此至立於側階設王儀衛所以宿衛衛殯者士服辨凡言辨者皆士也二人頭服雀辨其辨赤白色如雀頭色手執惠惠三隅矛也立于畢門之內畢門路寢之門也門之左右各一人守門故用二人四人綦辨四人頭服綦辨青黑色曰綦綦其執戈上刃手執戈而戈刃向上夾兩階戺戺堂扉之間夾於賔主兩階堂廉之間而立各二人故用四人戺矣一人冕執劉禮大夫服冕凡言冕皆大夫也一人頭服冕手執劉劉斧屬立于東堂立于東廂近階之開以備升階之人一人冕執鉞一人頭服冕手執鉞鉞斧屬立于西堂立于西廂近階之間以備升階之人一人冕執戣一人頭服冕屬乎執戣戣㦸戣逵立于東垂立于東廂堂上之逺地一人冕執瞿手執瞿瞿㦸屬瞿劬立于西垂立于西廂堂上之逺地一人冕執鋭鋭矛屬立于側階立于堂北階之上王麻冕黼裳前面鋪陳儀衛已定於是𫝊顧命於康王麻冕積麻三十升以為冕一升八十縷布之極細也黼裳以裳之章色黼黻有文也康王頭服麻冕下衣黼裳由賔階隮必由西階而升者未受顧命不敢當王卿士邦君卿士兼公孤大夫言之邦君諸侯也麻冕蟻裳頭服麻冕下蟻裳謂色𤣥如蟻入即位入就班位太保三公太史掌册太宗掌禮皆麻冕彤裳此三人皆頭服麻冕下衣纁裳太保承介圭太保奉大圭於五即鎮圭也考功記曰鎮圭尺有二寸天子守之上宗奉同瑁上宗即大宗伯同尊爵名奉同於王使康王主祭祀也瑁圭名長四寸奉瑁於王執以覆冒天下瑁冒由阼階隮大保上宗皆自東階而升太史秉書太史抗成王所作顧命書由賔階隮隨王之後故與王皆自西階而升御王册命進王以册書即顧命也太史讀册書命康王即位曰皇后憑玉几告康王曰大君成王於疾大漸之時親憑倚玉几道揚末命稱道發揚臨終之命命汝嗣訓命汝康王繼文武之大訓臨君周邦以臨涖為君於周邦率循大卞率循文武之大法夑和天下以調夑和叶於天下用答揚文武之光訓用對揚文武光明之訓不負前人之付託王再拜興王拜受顧命既拜而興起答曰對答太史眇眇豫末小子眇視不明也謂眇眇不明之甚者即是幾微末之小子其能而亂四方豈能治此四方以敬忌天威以恭敬天威而不敢慢禁忌天威而不敢犯哉乃受同瑁乃一手受同一手受瑁受於上宗也王三宿宿與肅同三祭三咤王以同就奠於兩楹之間酌酒於殯東三進爵於神座三奠爵於地告神言已受羣臣所傳之顧命也咤詫上宗曰饗上宗於是贊王曰享使王飲此福酒太保受同降太保於是受王所執同降而下堂反之於篚盥以異同太保亦祭不可用王之同故以水盥手更以别同盥管去秉璋以酢秉執半圭之璋以報祭謂王既祭而太保復祭授宗人同拜宗人小宗伯也大宗供王宗人供大宗既報祭訖遂授與宗人以同爵然後拜成王之柩告以已𫝊顧命也王答拜康王答拜尊所授之顧命也雖王無答拜之禮以召公畢公皆朝之元老又新即位故謙退也太保受同祭嚌既祭受福嚌少飲至齒王曰享亦至齒也嚌劑宅授宗人同拜太保居受福酒處不動則其同復授與宗人而拜白下成王之柩謂𫝊顧命事畢王答拜康王亦答拜敬所白也太保降收禮告畢太保下堂有言遂收前一切器物諸侯出廟門俟諸侯出廟門以俟天子維新之命時在路寢而言出廟門以成王之殯在焉故謂之廟康王之誥第二十五諸侯奔赴王喪見新君受顧命尸天子之位出於應門之內將受百辟之朝百辟既朝因而進戒康王於是作此篇以報誥之康王既尸天子主天子之位遂誥諸侯遂報告諸侯作康王之誥作此篇康王之誥舊簡標題王出在應門之內旱門之外為應門畢門乃內寢殯宫在焉故王出在應門之內太保率西方諸侯入應門左召公為西伯率領西方諸侯入應門之左北面而立畢公率東方諸侯入應門右畢公為東伯率領東方諸侯入應門之右北面而立皆布乘黃朱諸侯皆布陳一乘黃馬四匹朱以飾尾鬛以為庭實之物黃出於自然朱出於人為賔稱奉圭兼幣周禮小行人合六幣曰圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼是圭以馬為幣謂奉圭又兼以馬也諸侯於王為賔舉奉圭兼幣之禮以進曰致辭於王一二臣衛一二諸侯為王藩衛敢執壤奠敢各執土所出者以真之於庭以為贄見之物皆再拜稽首皆拜而又拜以送幣首至地稽首以盡禮王義嗣德答拜康王義在於繼前人之德以為諸侯之主不敢不受其幣故答拜王無答拜之禮以即位之初而謙退太保暨芮伯咸進召公與芮伯率諸侯百官皆進相揖相王氏以為儐禮之人相禮者揖之皆再拜稽首然後太保與諸侯皆再拜稽首於王前曰拜興致辭於王敢敬告天子致恭戒告皇天改大邦殷之命紂不道天改大國殷命而歸周惟周文武文王武王誕受羑若所以大受天命者以文王出羑里之囚天命始順羑酉克恤西土故能憂恤西土之民興邦自西伯始惟新陟王是周雖舊邦其命維新乃新升為天下主畢協賞罰盡和叶賞罰無不得其當戡定厥功故能勝天下之強定天下之業戡康用敷遺後人休用此休美敷布以遺子孫今王敬之哉今康王當以誠敬為主張皇六師張大六師俾國威振而天下服無壞我髙祖寡命無隳我文武少有之天命壞怪王若曰康王之意若曰庶邦侯甸男衛呼庶國諸侯而言之也惟豫一人釗報誥羣臣既進戒於我惟我一人釗亦報誥羣臣昔君文武昔之為君如文武丕平富大均平其富厚之澤於天下使家給人足不務咎不務以咎罰治人砥至齊信砥定也至極也極至其齊一之德而不變極至其極信之德而不誣用昭明于天下用此德昭顯光明于天下則亦有熊羆之士然文武非止特一己之德亦有熊羆武力之士不二心之臣一心事上之臣保乂王家保安乂治王家用端命于上帝用此道肇端天命於上天皇天用訓厥道上天於是用順其道付畀四方付與以天下四方使為君乃命建侯樹屏乃命建置侯國植立屏翰之助屏丙在我後之人其意在於輔贊我後之人今豫一二伯父今我一二伯父乃同姓諸侯尚須暨顧庶幾相與顧念綏爾先公之臣服于先王安行爾先公所以臣服我先王之事以輔我雖爾身在外雖爾身在外土乃心罔不在王室而汝心所向無不在王室者用奉恤厥若用奉愛其臣道之所當順行而盡者無遺鞠子羞無遺我稚子之羞辱汝諸侯不能盡臣道豈不遺我之羞羣公既皆聽命羣公自太保而下已皆聽康王誥命相揖趨出相禮者揖之而後趨出蓋進則必待揖而後拜退則必待揖而後出王釋冕康王自受顧命服麻冕黼裳乃吉服也今事既畢故釋去向所服黼冕之吉服反喪服反吉從凶以服喪服尚書句解卷十一
