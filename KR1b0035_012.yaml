body:
  text: 尚書句解卷十二元朱祖義撰畢命第二十六商俗三紀之後與周公君陳之時大異化之尤難蓋是時為善已衆不可無所勸為惡雖寡不可無所懲非有元老重望不足以膺其責康王所以命畢公康王命作册畢康王命為册書以命畢公所以重其行也分居里成周郊分居里於成周之郊者蓋分頑民所居之里或善或惡而勸懲之周公遷頑民於東郊又謂之成周以周安危惟兹殷士周道之成不成係殷士之化不化作畢命作此篇畢命竹簡舊題安國存之以知古書自此始前則孔子序書之辭惟十有二年康王即位之十二年六月庚午朏庚午之日月光朏然未盛乃六月初三日朏斐越三日壬申逾三日壬申乃六月五日王朝步自宗周因將命畢公即祖廟行事示不敢專故康王早朝徐行自鎬京至于豐豐有文王之廟以成周之衆以成周所遷商餘之衆士命畢公保釐東郊命畢公保以安之使無流離之苦釐以析之使無善惡之混洛邑在西成周在東故謂之東郊王若曰康王之意若曰嗚呼嗟歎父師畢公為太師謂之父師尊之也惟文王武王敷大德于天下昔文武敷布大德於天下用克受殷命用能受殷家之大命以有天下惟周公左右先王是時又有周公左右輔弼文武綏定厥家安定王家毖殷頑民毖謹以待商之頑民遷于洛邑乃自衛都遷徒於洛邑之成周密邇王室使之親近王室式化厥訓用其化以訓頑為友既歷三紀自周公遷商民至畢公時已經三紀凡三十六年世變風移三十年為一世今三十六年則世更變矣向者頑不率教今皆式化厥訓則風俗已改移矣四方無虞故自東西南北無可憂之事豫一人以寧我一人因而有安寧之福道有升降為治之道在於升其善降其惡政由俗革所施升善降惡之政必因風俗之善惡而改革升降之不臧厥臧苟不善其為善之人而升之民罔攸勸民無所攸勸何以堅其為善之心惟公懋德惟畢公能懋勉修德克勤小物能勤於小事而不忽略則大事可知弼亮四世輔弼左右文武成康正色率下端正其顔色以率先在下之人罔不祗師言人無不敬祇師法畢公之言嘉績多于先王故其休功美績多見於先王之時豫小子垂拱仰成我亦得以垂衣拱手仰賴畢公以成其功仰去聲王曰嗚呼康王嗟歎父師畢公為太師呼父以尊之今豫祗命公以周公之事敬命公者周公之事未終待公終之往哉公往居職旌别淑慝旌賞分别其善惡使不相雜揉表厥宅里其人果善則表異其所居之宅如旌表門閭彰善疸惡彰善而使為善有所顯疸惡而使為惡有所病疸亶樹之風聲立此彰善疸惡之風聲於上則民皆知為善之有益為惡之必棄自然望風而化聞聲而應如風動於此而物偃於彼聲振於此而音應於彼弗率訓典至此而猶有不循典常之訓必是頑愚無耻之人殊厥井疆殊異其所井之田畝所居之疆界使不得齒於鄉里不得與鄉田同井出入相友之也俾克畏慕使能知惡之可畏而不為善之可慕而必為申畫郊圻猶恐有如徐夷商奄相搧成亂故於郊外圻界昔所區畫必使重而晝之愼固封守封疆守禦雖已有人必使謹而固之守狩以康四海非特可安東郊之民亦可以安天下之民政貴有恆所施政事不可朝移夕革尤貴長久而不變辭尚體要或以言辭號令乎民尚乎有體然後理直而不煩有要然後辭約而不泛不惟好異不可為怪異之好商俗靡靡紂拒諫飾非惡聞其過故商人惟以靡靡相隨為俗利口惟賢惟以利口捷給為賢餘風未殄雖更革世變而靡靡利口之餘風猶未殄絶公其念哉畢公可不念哉我聞曰康王言我聞古人有言世祿之家世世受廩祿之家玩於富貴鮮克由禮少能行其禮節以蕩陵德以蕩然自恣陵滅其固有之德實悖天道禮與德皆天之道而實悖亂之敝化奢麗故其敝化為奢侈美麗之習者萬世同流雖相去萬世而同其流蓋末俗之弊古今所同兹殷庶士況此商之衆士皆大家世族席寵惟舊居於寵祿者非一日也怙侈滅義皆怙恃奢侈滅絶義理而不顧其所當為服美于人所衣之服皆以美麗於人驕淫矜誇為驕恣為淫過為矜伐夸大將由惡終將由惡以終而不變雖收放心周公君陳雖相繼教化收其怙侈滅義驕淫矜夸之放心間之惟艱然今日防間之使不復為惡者最為艱難資富能訓誠能因其資財之富而教訓之惟以永年則不復乘富足之資而恣侈靡淫佚之事以傷殘其生自然享壽考長年之樂惟德惟義所以為訓者不必他求惟因民心自有之德義時乃大訓是乃訓之大者不由古訓于何其訓此亦古人已行之訓欲訓民而不行此古人之訓如之何以為之訓乎王曰嗚呼父師康王嗟歎呼畢公尊稱之邦之安危周邦或安或危惟茲殷士惟在此殷士之化與不化不剛不柔公能不過於剛不過於柔寬猛相濟惟合於其中厥德允修則化民之德信乎修矣惟周公克愼厥始周公能謹於其始即毖殷頑民也惟君陳克和厥中君陳能和於其中即從容以和也惟公克成厥終惟畢公能成其化於終不過施勸懲之術使為士君子之歸三后協心周公君陳畢公同此化民之心同砥于道同至於化民成俗之道道洽政治故道化浹洽於天下而政自修澤潤生民餘波遺澤無不浸潤沾溉生民四夷左衽罔不咸賴由內而外生民既蒙澤潤之恩則東西南北之夷雖左衽具類無不皆依賴其德澤豫小子永膺多福自下而上既蒙潤澤之功則天下升平而我小子亦長受繁多之福矣公其惟時成周建無窮之基自尊而卑人君既受多福則畢公亦惟是成周之衆被化之故而邦本以安國祚以長可立無窮之基業亦有無窮之聞亦有無窮之美名聞於後世矣子孫訓其成式惟乂自前而後畢公既有令聞子孫亦順爾成法以為治矣嗚呼王歎而告罔曰弗克畢公無謂東郊之民難化而我不能勝任惟既厥心惟盡其心則無難罔曰民寡畢公又無謂東郊之民寡少而以易自處惟愼厥事惟謹其事則無忽欽若先王成烈敬愼文王武王之成烈而無替以休于前政以增美周公君陳前政而有加君牙第二十七康王之子是為昭王昭王之子是為穆王昭王南征不返穆王即位以司徒之職命君牙使敬敷五教故作此篇穆王命君牙為周大司徒穆王命君牙為周家大司徒之官以施教為命作君牙遂作此書君牙竹簡所標王若曰嗚呼君牙穆王嗟歎君以尊其身牙以呼其名惟乃祖乃父惟汝祖汝父在文武成康之時世篤忠貞世世篤厚忠正之節服勞王家以行其勤勞之事於王室厥有成績其有成功紀于太常周禮司勳凡有功者銘書於太常太常旗名畫日月者書績于太常以示其功日月同久而不息惟豫小子穆王遂言嗣守文武成康遺緒繼世守文武成康遺我後人之基緒亦惟先王之臣我亦思念先王時人臣克左右亂四方能左右輔弼以共治四方心之憂危深慮今日無如此之人輔我遂至其心憂悶危懼若蹈虎尾如蹈履於虎尾慮其反噬涉于春冰如涉渡春冰之薄慮其陷溺今命爾豫翼是以今日命爾君牙為我輔翼作股肱心膂君臣一體然豫為元首而汝實為足之股手之肱前之心後之膂膂旅纘乃舊服繼汝祖父亦當為司徒之舊事無忝祖考當盡其職無辱爾之祖父𢎞敷五典大敷布君臣父子兄弟夫婦朋友五常之訓式和民則用以和民之準則詩云天生蒸民有物有則如耳目視聽以聰明為則君止於仁臣止於忠父止於慈子止於孝此君臣父子之則也民自有其則在掌教者和之也爾身克正君牙之身能正而先盡其則罔敢弗正則民無敢不正民心罔中民心無中道未必皆盡其則惟爾之中惟於君牙之身取中夏暑雨小民惟曰怨恣民情可畏夏而或暑或兩天時之常小民惟怨歎咨嗟其上也冬祈寒冬而大寒亦天時之常小民亦惟曰怨咨小民亦怨歎咨嗟厥惟艱哉信其情難於調和矣思其艱以圖其易君牙能思其情之難於調和而正吾之身中吾之心圖以感發其易於感發者民乃寧則民乃安寧而怨咨不作嗚呼又歎丕顯哉文王謨大顯明者文王造周之謀丕承哉武王烈大繼伐功者武王之烈啓佑我後人以是謨烈開道佑助我後之人咸以正罔缺故能粹然一出於正無有虧缺天下之義理爾惟敬明乃訓爾君牙但當敬以發明汝教民之道用奉若于先王對揚文武之光命用以承順先王不墜其謨烈使我得對揚文武光明之命追配于前人爾君牙亦以追祖父之功而配合之王若曰君牙乃惟由先正舊典時式汝惟行祖父在先世為百官之長時故事載於典籍者可用是以為法式民之治亂在茲守法則治否則亂率乃祖考之攸行君牙今日果能率循祖父之所行昭乃辟之有乂則足以昭明汝君所有之治效而益顯冏命第二十八人主任人多於公卿大臣加意而褻近小臣則忽之不知古人所以養成君德於無玷者多在羣僕侍御之臣朝夕與之俱處故穆王正羣僕侍御之臣而命伯冏冏熲穆王命伯囧為周太僕正為周家太僕之長作囧命遂作此書囧命舊簡所題王若曰穆王之意若曰伯囧伯以呼其爵囧以呼其名惟豫弗克于德惟我不能于德嗣前人宅丕后繼文武成康之後居大君之位怵惕惟厲是以其心怵惕驚動惟恐至於傾覆而危厲中夜以興寢不安席中夜而坐思免厥愆思免其愆過昔在文武古之文王武王聰明齊聖聰無不聞明無不見齊言致一而不變聖言廣運而能通四德之兼備如此小大之臣咸懷忠良實本於小臣大臣皆懷忠直良善之行其侍御僕從罔匪正人雖其侍奉進御僕役從官之微無非正直之人以旦夕承弼厥辟相與奉承輔弼文武之君出入起居使文武出入起居之間罔有不欽無有不敬發號施令故發號施令之際罔有不臧無有不善下民祗若由是下民敬順號令萬邦咸休萬邦雖大皆有美化惟豫一人無良惟我一人無良善之德實賴左右前後有位之士實倚賴朝夕在我左右前後有職位之人也匡其不及正其不逮繩愆糾繆繩正其愆過糾核其謬誤格其非心正其非心俾克紹先烈使我能繼紹文武之功業今豫命汝作大正今我命汝作太僕之長正于羣僕侍御之臣以表正羣僕凡侍奉進御事主之臣懋乃后德使相與懋勉汝君修德交修不逮交修君所不及愼簡乃僚當謹愼簡擇其同僚之人無以巧言令色無用巧為言語以順從上意者善為顔色以媚悅人主者便辟側媚便僻則前却俯仰以為足恭側媚則為僻側之事以求媚於人便駢辟僻其惟吉士所用其惟吉德良善之士僕臣正苟僕御之臣皆正士厥后克正則其君能歸於正僕臣諛苟僕御之臣用諂諛厥后自聖則君自以為有聖德后德惟臣信夫君之有德惟僕臣之正承弼之得其道不德惟臣君之不德惟僕臣諛爾無昵于憸人爾伯囧誠不可昵近險佞之小人昵昵充耳目之官用之以充備耳目視聽之官朝夕在王左右承王之顧問者迪上以非先王之典乃啓迪上之人以非先王常法非人其吉若汝為大正乃不論其人之吉惟貨其吉惟以貨利交通者以為吉士而用之若時瘝厥官如是則病汝之官瘝關惟爾大弗克祗厥辟惟爾伯囧大不能敬其君惟豫汝辜惟我以不敬君之罪罪汝王曰嗚呼欽哉穆王歎謂汝當以敬為主永弼乃后于彞憲長輔汝君后使之由常法吕刑第二十九穆王當百年耄荒之餘慕唐堯無刑之化遂命太公之後齊侯為司寇因而訓迪夏禹贖刑之法以布告天下故作此篇此書出於吕侯之命所命何事乃為穆王訓迪夏禹贖刑之法布告天下吕命穆王命吕侯為司寇穆王訓夏贖刑因而訓諸夏以金作贖刑之法贖蜀作吕刑遂作此書吕刑竹簡舊標惟吕命史惟吕侯之是命者王享國百年耄荒穆王享國百年矣當耄期荒忽之年度作刑以詰四方詳度時宜作刑以詰治四方度鐸王曰穆王言若古有訓如古有大訓載三皇時事蚩尤惟始作亂蚩尤九黎國君上古之時風氣未開淳朴未散民知耕鑿而已安知所謂亂當知作亂自蚩尤始遂與黃帝戰阪泉延及于平民其禍延及平善之民罔不冦賊無不變為寇以盜人財為賊以害人事鴟義姦宄以鴟為義如鴟梟之擊搏又為外著之奸內藏之宄奪攘矯䖍為劫奪為攘竊又矯詐以助於人而至於䖍劉殺戮苗民弗用靈苗民即三苗亦蚩尤之後平民既漸染蚩尤為惡苗民又不用善以化之制以刑惟一切制之以刑惟作五虐之刑曰法惟於古人所立墨劓剕宫大辟五刑之中更加慘虐以為五虐之刑其忍如此乃謂之法殺戮無辜殺戮無罪之人爰始淫為劓刵椓黥於是始過為劓以去鼻刵以截耳椓去勢黥刻額劓藝刵餌㭬卓黥檠越兹麗刑并制有民於此陷刑三苗并以此刑制之更不分其輕重罔差有辭有罪者無辭無罪者有辭固有等差今三苗於有辭可明白之人更無等差一以刑施之民興胥漸所以民皆興起相漸染為惡泯泯棼棼泯泯然相似棼棼然相亂罔中于信無有中心能守信者以覆詛盟盟詛於鬼神又自覆敗之以見無信之甚覆福虐威庶戮三苗乃施暴虐之威遂至多所殺戮方告無辜于上民方告無罪被戮於天上帝監民上天監視下民罔有馨香德見三苗無有馨香之德被於民刑發聞惟腥但有虐刑發聞于上不勝腥穢而已聞問皇帝哀矜庶戮之不辜帝堯哀悼矜憐衆遭有苗殺戮之無罪者報虐以威乃以德威誅伐報苖民之暴虐遏絶苗民正絶苗民之辭無世在下使無有繼世在天下乃命重黎堯乃命重黎主天地之官絶地天通絶在地之民在天之神可以相通者罔有降格使民無有妖術以格于神人無有假其名字以降於民蓋將絶其生亂之階也羣后之逮在下明明棐常於是羣后諸侯及在下羣吏明顯然之明理以輔民五常之性則人道明而人心無所惑鰥寡無蓋由是鰥寡之情皆通於上無所掩蓋皇帝清問下民帝堯因屈己親問在下之民明審其疾苦鰥寡有辭于苗鰥寡窮民因明言有苗之罪惡德威惟畏堯於是以德為威其威非虐苗民自畏德明惟明以德為明其明非察之而苗民自將開明乃命三后乃命伯夷禹稷三后恤功于民因致憂民之功于民伯夷降典伯夷降下常行之禮以示民折民惟刑前以刑折服其邪心使畏刑而自趨於禮禹平水土禹為司空平水土以除害主名山川九州各有名山大川為辨其名如揚州山會稽川三江荆州山衡山川江漢稷降播種后稷降下布種之法農殖嘉穀使為農者皆得生殖嘉禾三后成功三后皆成其功業惟殷于民惟在富厚其民士制百姓于刑之中然後命士師隄防撿押制百姓以刑之中不失之重而過輕而不及以教祗德凡以教民敬於修德者穆穆在上所以教德不專於刑其君以穆穆誠敬之德居於上明明在下臣以明明顯著之德居於下灼于四方君臣之德既昭灼于四方罔不惟德之勤則感率四方之民無不惟德之是勉故乃明于刑之中故乃明示之以刑之中使不至於過輕不至於過重率乂于民棐彞是皆率循治民之道施於民以刑輔其常教而行之使之皆勤於德典獄由是當時之典獄者非訖于威非特訖其倚法為虐之威惟訖于富又惟絶其依勢取貨之富敬忌莫不致敬於刑之當用深忌於刑之所不可用罔有擇言在身然後片言所折純是無非純得無失一身渾然無非失可决擇惟克天德是能體無私之天德自作元命明死生夀天之命乃上天以是而制生人之大命者不在天而在我之自作配享在下典獄在下而與天為配合王曰嗟四方司政典獄嗟歎四方掌政事典獄之官而告之非爾惟作天牧非爾等代天以牧養民乎今爾何監今爾等將何所監視非時伯夷播刑之迪非監是伯夷之布刑以啓迪斯民使歸於禮乎其今爾何懲其今爾等將何所懲戒惟時苗民匪察于獄之麗惟是苗民不察民之陷於獄者有輕重一以重刑加之麗離罔擇吉人不擇吉善之人觀于五刑之中使觀察五刑輕重適中者用之惟時庶威奪貨惟是衆逞威以奪民貨賄者斷制五刑用以斷制五刑以亂無辜以擾亂無罪之人上帝不蠲上天不蠲潔其所為降咎于苗於是降下殃咎于苗苗民無辭于罰苗民亦自知其惡之不可掩其受天之責罰而無怨辭乃絶厥世乃滅絶其世不復育者王曰嗚呼念之哉嗟歎呼同姓諸侯戒之使以刑為念伯父伯兄同姓尊者仲叔季弟在弚列者幼子童孫在子孫之列者皆聽朕言皆聽我言庶有格命庶幾所受諸侯之命至於有終而不中絶今爾罔不由慰日勤今爾無不自用慰其能日勤於刑而不使妄加可也爾罔或戒不勤爾無以為有時不勤尚或可戒苟不勤於刑至妄加而後戒之則已有無辜而受戮者天齊于民俾我刑戮之用乃天以是整齊亂民使我主之一日非終一日之間不可終其事必詳審孰究如要囚服念五六日至于旬時而後可惟終在人苟欲善終其事在於得人爾尚敬逆天命爾諸侯敬順天命謹於用刑以奉我一人以奉承我一人也雖畏勿畏雖平時所畏今不可以畏之故重吾之法雖休勿休雖平時所與甚休者今不可以休之故輕吾之法惟敬五刑惟盡敬以用五刑以成三德便當重而重以成其德之剛當輕而輕以成其德之柔不輕不重以成其德之正直一人有慶人君因之以享其福兆民賴之兆民因之以賴其福其寧惟永天子樂於上萬民樂於下四海九州皆在和氣中此其安寧豈朝夕而已王曰吁來有邦有土又吁嗟呼來有國有土諸侯而告之告爾祥刑告爾諸侯慈祥之刑先王之刑非志於殺人也誅無道所以惠有道誅凶民所以保良民制法之意未有善於此者此所以謂之祥刑也在今爾安百姓在今爾諸侯欲安寧百姓何擇非人何所選擇不在於得人乎何敬非刑何所謹敬不在於用刑乎何度非及何所裁度豈非欲情與罪相及罪與法相及乎蓋情或不然而罪之狀乃然罪或不然而法之加乃然皆非所謂及也東坡乃以及如秦漢間所謂逮謂罪非已造為人所纍者曰及此最當謹即罪相連及之說兩造具備兩等人之辭皆至無一辭不具備造糙師聽五辭一人之見豈能若衆見之明一人之斷豈能若衆斷之公命衆人之聽兩造之辭分為五等五辭簡孚五辭皆得其要而可信正于五刑方可正以五刑或入墨或入劓或入剕宫大辟五刑不簡苟正以五刑不應夫獄之要辭是辭與法不相當也正于五罰則正以五罰使出金贖罪罪實而加以法謂之刑罪疑而贖以金謂之罰五罰不服苟情之輕出於過懼雖罰之金彼亦不肯服從正于五過則正以五過從赦可也五過之疵然有人實犯法而吾私縱之置於五過之地是五過之病其病為何惟官有以官吏請託而赦之者惟反有以報復私恩而赦之者惟內有以妻妾請求而赦之者惟貨有以賄賂鬻獄而赦之者惟來有以私相往來而赦之者其罪惟均於此五者有一焉其罪與犯者同其審克之惟審之致其詳斯能不至故出人罪審則究人之罪克則勝已之私刑罰之事惟能究人情勝已意者可以無失故曰審克五刑之疑有赦又不可懲故出人罪之弊至於故入人罪重而五刑不得其實而有疑則赦而從罰五罰之疑有赦輕而五罰不得其實而有疑則赦而為免其審克之惟審之致其詳斯能不至故入人罪簡孚有衆雖得獄辭之要而可信尤當與衆共聽之惟貌有稽衆人以為可信矣又當考之於貌理直者顔色自如有愧於中者必赧然於色周禮謂辭聽色聽氣聽是也無簡不聽苟不得其簡要之辭又不可徒以貌而聽具嚴天威刑者天討有罪所以委曲如此者亦嚴敬天威而已墨辟疑赦此即刑之疑者赦而從罰墨刺其額而涅之以墨如今黥配也墨刑有疑則赦之辟闢其罰百鍰其罰出金百鍰六兩為鍰百鍰六百兩所罰之金即今之銅古者金銀銅鐵皆謂金實其罪而後罰鍰還閲實其罪必檢閲核實其罪而後罰之劓辟疑赦劓截鼻之刑有疑則赦之其罰惟倍倍於墨罰出金二百鍰重一千二百兩閲實其罪檢閲核實其罪後赦剕辟疑赦剕刖足之刑有疑則赦之剕翡其罰倍差其罰倍二百鍰為四百鍰又差倍二百鍰即一百鍰四百加一百即是五百鍰出金三千兩閲實其罪解同上宫辟疑赦宫淫刑也男子則割勢婦人則幽閉宫刑有疑則赦之其罰六百鍰其罪當出金六百鍰重三千六百兩閲實其罪見上大辟疑赦大辟死刑有疑則赦其罰千鍰其罰金當出千鍰六千兩閲實其罪見上墨罰之屬千墨罰雖一而其類有一千條劓罰之屬千劓罰雖一而其類有一千條剕罰之屬五百剕罰雖一而其類有五百條宫罰之屬三百宫罰雖一而其類有三百條大辟之罰其屬二百大辟之罰雖一其類有二百條五刑之屬三千五刑條類凡有三千上下比罪然法有定條人無定情以情見之於法下無此條則上比重罪下比輕罪觀所犯當與誰同然後定其輕重之法如今律無明文則許用例也無僣亂辭不可紛亂僣差罪人之辭蓋情以辭而見勿用不行苟於條例無裁決不行雖勿用之可也惟察惟法惟欲內察其情外合其法內外兩盡情法兩推其審克之其詳審者乃能之上刑適輕下服人所犯者上刑而情適輕則使服從下刑下刑適重上服人所犯者下刑而情適重則使服從上刑輕重諸罰有權至諸罰之用亦當原人情以權輕重之宜刑罰世輕世重平國用中典亂國用重典新國用輕典是刑罰之用必因乎時以為輕重惟齊非齊情既有輕重時既有治亂安得齊一其法吾惟欲齊其非可齊之法有倫有要自有倫理而不亂自有樞要而不煩知所以權變之說則知所謂倫要矣罰懲非死罰人之金特以懲戒非至於死人極于病人尚極於病困況於刑乎非佞折獄昨諂佞可折斷刑獄惟良折獄惟良善可折斷刑獄罔非在中然後輕重無不合於中理察辭于差情以辭見前後之辭差斷獄者能審必得其情非從惟從既得其情不從其為辭惟從其本情哀敬折獄哀則不忍敬則不忽不忍則不至苛用其法不忽則不至酷用其法惟以哀矜敬謹聽斷刑獄而勿喜明啓刑書於是盡已之明以開啓法書胥占相與衆人占考之咸庶中正則刑罰庶幾合刑之中得罪之正其刑其罰其審克之刑罰信乎難處惟詳審者能之獄成而孚及訊鞠囚辭其案已成而可信輸而孚復以信於已者輸於君使君亦有所信記曰正以獄之成告於大司寇大司寇以獄之成告於王是也其刑上備既以其刑上之於君必須備録前後辭語情欵有并兩刑又須并有輕重兩端之刑使天子更加詳審或降重從輕并併王曰嗚呼敬之哉王歎當以敬而用刑者官伯族姓其百官之長與王同族姓者乎朕言多懼刑者姓命所係朕雖言之亦多憂懼不敢輕言朕敬于刑惟朕心敬謹於刑是以發之於言多懼也有德惟刑必有德方可使為明刑之官今天相民今天以刑輔相其民使歸於善作配在下典獄者為天之配合於下亦當以刑弼教明清于單辭當明此心如燭清此心如水以聽偏辭盡一人之自陳無衆佐辨白尤難聽也民之亂民所以治也罔不中聽獄之兩辭又本於臣無不以中道聽兩家在獄爭競之辭無或私家于獄之兩辭無或私于其家而黷貨妄決獄之兩辭獄貨非寶以折獄得人貨賄不足以為寶惟府辜功但如府庫聚財以聚罪惡於一身反以罪人為功耳報以庶尤天於是報應以庶尤百殃俱至永畏惟罰用刑者可不長畏天罰所當長久深畏者惟此天罰非天不中非天不以中道待夫人而過為酷罰以毒夫人惟人在命惟以人之為人在乎性命今私家鬻獄不狥公理滅人性命是自貽天罰天罰不極庶民天罰有時過暴不適其中以加於庶民非天之私也罔有令政在于天下亦在我無有善政在乎天下而使歸於善王曰嗚呼嗣孫又歎呼諸侯繼世之孫而告之今往何監自今以往汝何所監法非德于民之中得非在於以德而發民之中乎民受天地之中以生皆有此中惟資於有德以啓迪之耳尚明聽之哉爾嗣孫庶幾明聽我之言哲人惟刑知哲之人能用刑者以其所見之明不至妄用無疆之辭自然有無窮之美譽屬于五極豈非明于用刑皆附著於五刑之極處所謂極乃總要之地屬祝咸中有慶用法咸得其中則自天陰襲其慶受王嘉師民心本善故曰嘉師爾嗣孫受人君之善衆以治者監于兹祥刑可不監觀我此慈祥之刑之訓乎刑本使民以為善故曰祥刑尚書句解卷十二
