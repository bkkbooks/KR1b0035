body:
  text: 尚書句解卷六元朱祖義撰泰誓上第一泰誓三篇者是武王代紂大㑹誓衆之辭史官隨其先後而記之上篇序既言一月戊午中篇又言戊午王次于河朔則知上中二篇同日而作上篇作於河南諸侯方大會孟津將渡之時中篇作於河朔孟津已渡之後至下篇作於戊午之明日故篇首以時厥明别之惟十有一年周自虞芮質成諸侯並附文王遂受命稱王至九年大統未集而卒武王三年服畢乃於十有一年武王伐殷武王喪畢始伐殷觀兵孟津以卜諸侯伐殷之心諸侯僉同乃退以示弱一月戊午至十三年正月二十八日戊午師渡孟津更與諸侯期㑹以師衆渡孟津而共伐紂作泰誓三篇誓衆將渡作上篇已渡作中篇渡之明日作下篇泰誓舊簡標題惟十有三年春正月戊午即是序所謂十有一年一月戊午也前言十一此言十三蓋傳寫之誤也周以十一月建子為正月言春者蓋紀改正朔以所建之月為春也大㑹于孟津大㑹諸侯於孟津而將渡王曰武王誓衆言嗟我友邦冢君嗟歎我同志之邦大君諸侯越我御事庶事及我周治事之臣與衆士之賤者明聽誓明聽我誓言惟天地萬物父母惟天地化生萬物為之父母惟人萬物之靈人稟五行之秀氣格五常之正性為萬物之最虛亶聰明天地於人之中又擇誠有此聰明之資者作元后使為大君司牧生民元后作民父母大君又為民之父母今商王受弗敬上天武王數紂之罪以見上天之意紂不敬上天之付托降災下民降災罪於下民沈湎冒色溺淫於酒貪冒于色敢行暴虐敢行凶暴虐殺無辜罪人以族以罪加人誅及族類官人以世以官使人延及于世惟宫室臺榭陂池侈服修所居宫室臺則積土為之榭又臺上有屋者陂則障水使不流池則掘地以停水侈服則華其躬凡此皆役民之力斂民之財以為之以殘害于爾萬姓以此殘害于爾萬民焚炙忠良忠良加以炮烙之刑使不敢言刳剔孕婦孕婦則刲刳其腹剔去肉至骨以視其胎皇天震怒惟紂惡積不可掩罪大不可解故天怒其所為命我文考乃命我文德之父文王肅將天威敬行天威命以伐之大勳未集大功未有所成肆豫小子發武王自稱小子發武王名故我於十有一年以爾友邦冢君與爾同志曰友長君諸侯觀政于商共觀商政欲紂改過而歸於善惟受罔有悛心惟受遲至十二年之久無悛改之心乃夷居弗事上帝神祇乃平居不祀天地神祇遺厥先宗廟弗祀又遺弃先世宗廟而不祀犧牲粢盛凡國家所蓄色純之犧牛羊豕之牲黍稷曰粢在器曰盛既于凶盜盡為凶人所盜乃曰方且自肆而言吾有民有命我下有人民可賴以安上有天命可恃以存罔懲其侮更不懲創侮慢之心天佑下民武王既數紂罪故遂言我今日所以伐罪救民之意於是上天佑助下民作之君作之師命我作君以治之作師以教之惟其克相上帝惟我今日能相助上天寵綏四方寵愛綏安四方之民有罪無罪紂之有罪當順上帝之意而伐之若其無罪當順上帝之意而赦之或伐或赦但視上天之志如何豫曷敢有越厥志我何敢有違上帝之志而妄行哉同力度德大抵征戰之事力同則料度其德而有德者勝同德度義德同則料度其義而有義者勝受有臣億萬今受有臣十千十萬惟億萬心其心不一豫有臣三千惟一心心一所以見力與德義紂皆不我敵也商罪貫盈紂罪惡如繩之貫物繩亦盈滿天命誅之故天命我誅之豫弗順天我若不順天誅之厥罪惟鈞其得罪於天與紂同豫小子夙夜祗懼我於是早夜祗敬畏懼不敢安居受命文考受命于我文德之父文王類于上帝以物之類天者祀天也宜于冢土祭社曰宜冢土社神也以爾有衆遂以爾有衆之諸侯底天之罰致天之罰於紂天矜于民上天常矜憐民民之所欲天必從之今民欲罰紂天必從而罰之爾尚弼豫一人爾有邦冢君御事庶事庶幾輔弼我一人掃除紂之暴虐永清四海以長清四海如源清則流清今欲去紂之惡是清其源而天下皆清矣時哉弗可失今我伐紂正是天人合同之時不可違失也泰誓中第二惟戊午上篇同此日王次于河朔武王渡孟津止於河之北羣后以師畢㑹羣諸侯以衆盡㑹於武王所止之處王乃徇師而誓曰武王乃巡衆而誓言嗚呼嗟歎西土有衆周都豐鎬地在西從武王渡河者皆西方諸侯故言西土有衆咸聽朕言皆聽我言我聞吉人為善惟日不足聞古人言善人為善日日憂其不足凶人為不善亦惟日不足凶惡之人為不善亦日日憂其不足今商王受力行無度受力行無法度之事播棄黎老如播榖而散之散棄面黎色之老成人昵比罪人親近有罪逋逃之人昵逆淫酗肆虐淫色酗酒肆行暴虐之威酗煦臣下化之臣下皆習紂惡朋家作仇分為朋黨互相結為仇讎脅權相滅以權勢相脅更相殄滅無辜籲天橫及無辜之民皆呼天告寃穢德彰聞穢汙之德顯聞于天惟天惠民惟辟奉天天惠愛斯民君奉天愛民有夏桀弗克若天流毒下國桀不能順天愛民流虐毒于下國天乃佑命成湯天乃眷佑大命成湯降黜夏命降下黜棄夏之天命惟受罪浮于桀受罪又過于桀剝喪元良剝落喪失殷王元子之良善如微子賊虐諫輔賊虐殺害諫正輔弼之臣如比干謂已有天命自謂已有天命足恃謂敬不足行自謂恭敬之事不足行謂祭無益自謂祭祀為無益而不修謂暴無傷自謂暴虐為無傷而不已厥監惟不逺在彼夏王可監為戒者不逺在桀為惡而湯伐之是也天其以豫乂民天今以我乂治斯民朕夢協朕卜我得吉夢與我吉卜相合襲于休祥密有休祥之兆戎商必克以戎兵誅紂理必可勝受有億兆夷人離心離德紂有億兆平人皆離心德豫有亂臣十人同心同德我有治亂之臣十人皆與我同心德雖有周親紂於億兆雖有至親心德既離必將叛之不如仁人不如我亂臣皆仁人也天視自我民視天聽自我民聽況天以我民所視為視以我民所聽為聽仁人既歸於我則天心歸於我必矣百姓有過在豫一人百姓在紂湯火中其過豈不在我一人乎今朕必往今我必往伐紂我武惟揚侵于之疆舉我威武侵紂疆界取彼凶殘取彼凶殘之紂我伐用張以張大我伐功于湯有光紂既黜則於湯之道為有光以紂喪失湯之道勗哉夫子罔或無畏勉將士不可無畏懼之心寧執非敵寧執非我敢敵之志百姓懍懍今百姓罹紂虐政懍懍危懼若崩厥角如崩摧其角無所容顧嗚呼乃一德一心歎汝將士當一其心德人無異志立定厥功立定其功之必成惟克永世斯能為長世無窮之計泰誓下第三時厥明時戊午之明日己未王乃大巡六師武王自河北趨商郊乃大巡六軍明誓衆士明明誓告衆士王曰嗚呼王歎而言我西土君子我西土友邦冢君御事庶士在河北者皆君子天有顯道天有顯然不可掩之道厥類惟彰善惡禍福各以類應道甚彰明今商王受狎侮五常今紂輕狎侮慢五常之道荒怠弗敬荒淫怠棄不以敬而行之自絶于天皆紂自絶于天非天絶紂結怨于民紂自結怨於民非民怨紂斫朝涉之脛紂見冬月有朝涉水者謂其脛耐寒斫脛視之斫斫脛脛剖賢人之心見比干忠諫謂其心異於人剖開而視之作威殺戮作為刑威殺戮無辜毒痡四海而其毒遍病於四海痡鋪崇信姦回尊信姦猾回邪之人放黜師保放棄退黜師保之任屏棄典刑屏去棄絶前世常法囚奴正士拘囚奴戮正直之士郊社不修郊祀天社祀地紂則壞而不修宗廟不享宗廟以奉先王紂則廢而不享作竒技淫巧但作竒異伎藝凡巧於為淫者以恱婦人以恱妲己上帝弗順故上天不順其所為祝降時喪於是斷絶降下喪亡之非於紂爾其孜孜爾衆士當孜孜不怠奉豫一人助我一人恭行天罰敬行大罰討紂古人有言曰嘗聞古人之言撫我則后虐我則讎民心無常撫恤我則戴為君虐害我則視為讎獨夫受今紂寡助孤立謂之獨夫洪惟作威方大為威虐以害民乃汝世讎乃與汝民世世為讎樹德務滋大抵封殖有德之人如殖樹必栽培灌溉使之繁滋除惡務本除去罪惡之人如除草必芟夷藴崇務絶根本肆豫小子誕以爾衆士故我大以爾衆士殄殱乃讎殄絶殱滅汝世讎殱音尖爾衆士其尚迪果毅爾衆士庶幾各進於果敢勇毅之地以登乃辟以成汝君之功功多有厚賞奏功多則我有厚賞不迪有顯戮不進則我肆諸市朝有顯明之戮嗚呼嗟歎惟我文考惟我文德之父文王若日月之照臨德如日月之照臨光于四方顯于西土逺則光四方近則顯西土惟我有周誕受多方故我周大受多方之歸往而有天下豫克受非豫武今我勝紂非我能武惟朕文考無罪惟我文考未嘗得罪於天天佑助我周家受克豫紂若勝我非朕文考有罪非我文考得罪於天惟豫小子無良惟我小子無良善之德所以我國家不能克終其令緒牧誓第四牧野乃誓臨戰之時也讀典謨如鼓春風雍容於揖遜之中讀諸誓如覩秋氣肅殺使人為之戰栗夫春與秋氣象雖不侔而天所以生物則一聖人之心亦豈有二致時焉而已矣武王戎車三百兩戎車兵車也一車兩輪考車以兩言古者兵車一乘甲士三人步卒七十二人三百乘則共二萬二千五百人此指武王之師非兼言諸侯之師也虎賁三百人兵車外又有虎賁三百人乃驍勇之士其猛如虎之奔蓋在王左右為侍衛者與受戰于牧野作牧誓臨戰遂作此書牧誓史官標題時甲子昧爽武王以戊午明日己未發自河北次五日甲子暗昧未分之際將明未明之時王朝至于商郊牧野武王早朝至商郊之牧野乃誓誓衆王左杖黃鉞右秉白旄以麾武王左手杖黃鉞右手執白旄以指麾而言所以肅其進退刺擊之節曰逖矣西土之人言逺矣諸侯衆士皆西土之人以慰勞其行役之逺王曰嗟我友邦冢君嗟歎我同志之諸侯御事司徒司馬司空治事之三卿亞旅衆大夫之次於卿者師氏大夫以兵守門者千夫長統千人之帥百夫長統百人之帥及庸蜀羌髳微盧彭濮人及此八國之人乃西南夷與江漢之夷文王為西伯化行江漢之域故來助周伐紂稱爾戈武王既歷衆所誓人於是使之舉爾之戈比爾干近爾之盾立爾矛矛亦㦸之屬長二丈執之以立于地豫其誓聽我誓告汝士王曰誓曰古人有言曰牝雞無晨古人言母雞無鳴晨之理牝雞之晨惟家之索母雞鳴晨則物反常為夭家必索而盡今商王受惟婦言是用紂惟妲已之言是用是牝雞而鳴晨昏棄厥肆祀弗答冝其昏於事神則棄其所常陳之祭祀而其不能報本昏棄厥遺王父母弟不迪王父母之昆弟母弟同母弟皆棄其骨肉不案之以道乃惟四方之多罪逋逃乃聚四方之多罪而逋走逃亡者是崇是長是信是使於是尊崇之推長之親信之任使之是以為大夫卿士於是或以為大夫為卿士俾暴虐于百姓使此等人肆暴虐于百姓以姦宄于商邑以為姦為宄于商之都邑今豫發稱名惟恭行天之罰以恭敬而行天之罰今日之事征戰之事不愆于六步七步其坐作進退之法不過六步七步乃止齊焉乃止而整齊其衆不可輕進夫子勗哉凡爾將士勉哉不愆于四伐五伐六伐七伐其攻擊刺殺之際少不得過四五多不得過六七乃止齊焉整齊其衆不可令過殺勗哉夫子勉哉將士尚桓桓庶幾奮桓桓之威武如虎如貔如熊如羆其勇猛如虎貔熊羆于商郊在於商郊弗迓克奔紂之衆士或有不敵我師能來奔於我汝又不可迎擊之以役西土當收用以役於西土勗哉夫子勉戰將士前後反覆其文所以致諄諄誓戒之意爾所弗勗爾將士其有不能致勉者其于爾躬有戮其于爾身有誅戮武成第五武功既成則無事於用武蓋聖人之武不用於殘民害衆而用於禁亂止暴商紂既黜奚以武為故歸馬放牛示不復用豈如後世窮兵黷武無有休息之日哉武王伐殷往伐歸獸史官敘自往伐之始至歸獸之後識其政事記録其始終設施之政事作武成遂作此書武成竹簡標題惟一月壬辰十有三年正月二日壬辰旁死魄魄是月之輪廓初三日則生明魄死初二日則近於死魄越翼日癸巳遇明日初三日癸巳王朝步自周武王早朝步行自鎬京之周而東于征伐商而往伐商至其月二十八日戊午師至孟津渡孟津而行至二月初四日甲子武王滅紂厥四月哉生明其年閏三月至四月三日辛卯月生明王來自商武王自商來歸至于豐文王所居之地乃偃武修文偃息武功修舉文事歸馬于華山之陽放牛于桃林之野華山之南桃林之野皆近豐地示天下弗服示天下以今既偃武不復服牛乘馬丁未四月十九祀于周廟告祭周先祖廟即后稷至文王邦甸侯衛近而諸侯之邦甸服逺而侯服衛服駿奔走皆大奔走執豆籩執豆籩以助祭越三日庚戌自四月十九日過二日至二十三日庚戌柴望大告武成武王燔柴祭天望祀山川大告天地以武功成既生魄月既望則魄生明死乃四月十八日也武王於十九日祭廟二十二日柴望皆是生魄之后行事又盡此生魄已后之日庶邦冢君暨百工受命于周使衆邦諸侯與百官皆受命於周王若曰武王之意若曰嗚呼嗟歎羣后呼羣諸侯而告惟先王建邦啓土我周王業自后稷在唐虞際封於邰建立此邦國開啓此疆土公劉克篤前烈后稷曽孫公劉復能修后稷功業至于大王肇基王迹至太王又后稷十二世孫去邠邑岐民以為仁人從如歸市而王者之迹始基乎此王季其勤王家王季能纘太王之業勤於王家我文考文王至我文德之父文王克成厥勳能成其功誕膺天命大受天之眷命以撫方夏以撫安中夏大邦畏其力大邦諸侯則畏其力小邦懷其德小邦諸侯懷慕其德惟九年大統未集文王自受命至沒九年未能一統天下豫小子其承厥志武王謙稱我小子繼其志砥商之罪致商紂之罪惡告于皇天后土以告天神地祇所過名山大川與所過名山大川之鬼神曰惟有道曽孫周王發惟有道之人曽孫周王發將有大正于商將大正商紂之罪而伐之今商王受無道暴殄天物紂無道暴虐殄絶天所生之物使不得遂其生害虐蒸民以刑法虐害天所生衆民為天下逋逃主凡有逋罪逃亡者皆往依紂而紂則主之萃淵藪聚衆惡如淵聚魚藪聚獸豫小子既獲仁人我小子既得仁人而用之敢祗承上帝敢祗承上帝之命以遏亂略以遏絶商紂為亂之謀略華夏蠻貊內而華夏之民外而蠻貊之邦罔不率俾無不相率以為已使恭天成命而敬上天一定不可易之命以決伐紂之舉肆豫東征故我興師自豐鎬西來以東征綏厥士女安慰天下士女罹紂之惡者惟其士女惟其士女見周師之來篚厥𤣥黃所以盡盛𤣥黃之幣于筐篚中以迎我師昭我周王且昭顯我有周當為天下主者天休震動以天常有休祥著見震動華夏蠻貊之衆用附我大邑周使之歸附我大邑周惟爾有神惟爾天地山川神祇尚克相豫庶幾相助於我以濟兆民使我克商而拯濟兆民於塗炭無作神羞不可棄我而不保取敗衄以為神羞既戊午於是十有三年正月二十八日戊午師逾孟津王兵以過孟津癸亥自正月十九日己未離河北至二月三日癸亥凡五日行四百里至朝歌赴敵其速也陳于商郊遂分布行陳於商郊牧野俟天休命時天行雨至雨者天地神人和同之應即為休命也甲子昧爽明日甲子明暗未分之時欲明未明之際受率其旅若林紂率衆來多若林木之盛㑹于牧野㑹聚牧野與武王戰罔有敵于我師無有足以敵于我師前徒倒戈紂之徒衆居前者皆自倒其戈攻于後以北反以攻其在後之人奔北以走自相屠戮血流漂杵遂至血流漂杵雖殺人多皆紂師自相屠戮而周師實未嘗血刃此豈武王使之然哉紂罪惡貫盈天所不容故至此極孟子所謂盡信書不如無書深疑以至仁伐至不仁必無血流漂杵之事其意恐學者傳之失真以武王牧野之戰殺人誠如是之多後世嗜殺人之主必指武王為口實故為此拔本塞源之論孟子誠有功於武王也要之血流漂杵實是紂衆自相攻擊也故血流至多當時必有此理未可以孟子之說而疑其無是事也一戎衣天下大定武王所以能一著戎衣而天下遂至大定乃反商政乃反商紂虐政政由舊用成湯之舊政釋箕子囚紂囚箕子為奴隸武王反其所為釋放之封比干墓比干忠諌紂怒而殺之武王反其所為而禮封其墓式商容閭式車上橫木男子立乘有所敬則俯而憑式商容為紂所貶退處私室武王反其所為過容門閭憑式而敬之散鹿臺之財鹿臺貨財紂斂於民也武王反其所為而散布之發巨橋之粟巨橋穀粟紂取於民也武王反其所為而發之大賚于四海而萬姓恱服以之大賚于四海之民而萬姓所以心恱誠服列爵惟五列諸侯之爵為公侯伯子男之五等封建分土惟三分諸侯之土為三等公侯百里伯七十里子男五十里建官惟賢建官如三公三孤之任則取其賢而有德者位事惟能位如百執事之列則取其能而有才者重民五教重民君臣父子兄弟夫婦朋友五教施之而不敢輕惟食喪祭食者民之天喪以篤於孝祭以報本反始莫不重之而不敢忽惇信明義天下有忠信者從而惇崇之有義士者從而顯明之崇德報功有德者崇而尊之有功者祿而報之垂拱而天下治武王創業垂統盡在是矣夫何為哉垂衣拱手而天下自治也尚書句解卷六
