body:
  text: 尚書句解卷七元朱祖義撰洪範第六此篇以洪範名乃箕子歷陳治天下之大法如彞倫即九疇九疇之一以五行言五行之一以水言則五行者九疇之本水者五行之本水有逆順則五行因之而有汨與治也五行有汨與治則九疇亦因之而有斁與敘也豈天果有物不以畀鯀而獨以錫禹哉武王勝殷勝商殺受誅紂立武庚立紂子武庚奉殷祀以箕子歸釋箕子囚使歸于周箕殷封之國子爵也作洪範遂作洪範之書洪範此二字史官舊題古者序自為一篇故每篇首揭其題以為一篇之目孔安國引序各冠其篇首因存而不去故今書諸篇皆重言本目也惟十有三祀二月甲子武王滅紂之後王訪于箕子武王往就箕子訪問治道王乃言武王言曰嗚呼箕子歎而箕子惟天陰騭下民惟天陰有以定下民騭陟相協厥居相而助之使合於道自然居之而安日用飲食不知其默與是道㑹者我不知其彞倫攸敘惟我不知九疇之常倫所敘如何箕子乃言曰答武王而言我聞在昔鯀陻洪水惟我有聞在昔鯀之治水謂土勝水以土陻塞之不行蓋水者五行之本水既塞而失其本陻音因汨陳其五行所以亂陳其五行而不以其序帝乃震怒不畀洪範九疇天怒不與鯀洪範九疇之道非有物而不與也五行九疇之本五行既亂而失其本也彞倫攸斁常倫所以斁敗者即天不與也斁妬鯀則殛死鯀既殛死禹乃嗣興禹繼父而興天乃錫禹洪範九疇天錫禹以洪範九疇之道非有物以與之也禹之治水能行其所無事水由地中行而五行皆得其性則其本立矣彞倫攸敘九疇之常倫所以次敘即天賜也初一曰五行初一謂五行者實日用常行之道九疇皆自是出不言用者以五者散在九疇之內所謂敬用至嚮用無非五行之用也次二曰敬用五事次二謂人君欲修己者不可不以敬用五者之事次三曰農用八政次三謂君欲厚民之生者不可不用八政次四曰協用五紀次四謂嵗月日星辰各有象可紀考合天時者不可不用五紀次五曰建用皇極次五謂君欲有所建立以示民不可不用大中之道次六曰乂用三德次六謂君欲因時致治不可不用剛柔正直之三德次七曰明用稽疑次七謂君欲釋已之疑惑不可不明用其卜筮以考之次八曰念用庶徵次八謂君當思用其衆徵之休咎以驗已之得失次九曰嚮用五福次九謂君欲民知所慕而趨於中必用五福以勸之威用六極欲民知所畏而不敢失於中必用六極以威之一五行九疇之一箕子陳日用之五行一曰水二曰火三曰木四曰金五曰土此列五行之名水曰潤下水性濕故謂之潤下火曰炎上火性燥故謂之炎上木曰曲直木之生或曲或直木之常性也金曰從革金就鍛從人變革則從革者金之常性也土爰稼穡土性可以稼穡然水火之性皆自然而然至於土必用人力耕耨耘耔然後於是乎可以稼穡潤下作鹹炎上作苦由其性而作成之則有自然之味非五行有成體即有成味也作而成之然後有味故箕子所以必言作鹹作苦作酸作辛作甘也蓋水之發源未嘗鹹也流而至海凝結既久然後鹹之味始成豈非潤下之所作乎大之始然未嘗苦也炎炎不已焦熯既久然後苦之味始成豈非炎上之所作乎曲直作酸木之初生未嘗酸也根而幹幹而枝枝而葉葉而花花而實既實然後酸之味成豈非曲直之所作乎從革作辛金之在礦未嘗辛也既從革而器始新久而舊舊則生鏽於上而辛辣之味始成豈非從革之所作乎稼穡作甘土之生稼穡也其實甘則其甘之味豈非稼穡之所作也二五事九疇之二箕子陳人君之五事一曰貌容貌二曰言言語三曰視目之所視四曰聽耳之所聽五曰思心之所思貌曰恭貌以接人不可不恭敬乎人言曰從言以明理不可不順從於理視曰明視欲及逺故貴乎明聽曰聰聽欲在德故貴乎聰思曰睿思欲其能通故貴乎睿恭作肅貌所以待人而能恭則可以作成敬肅之德從作乂言能從理義則可作成乂治之德明作晢視而明則洞達無蔽可作而成智哲之德晢哲聰作謀聽聰則審諦無惑作而成善謀之德睿作聖思而能睿則無所不通作而成克念之聖三八政九疇之三箕子陳先王厚民之八政一曰食謂務農重穀之政二曰貨謂阜通貨財之政三曰祀謂報本反始之政四曰司空設司空度土居民之政五曰司徒設司徒敬敷五教之政六曰司冦設司冦立法懲奸之政七曰賓賓者交際酬酢之政如冠昏喪祭鄉相見之類八曰師師者寓兵於農修武備之政如鄉遂教閲之法四五紀九疇之四箕子陳五者乃大事之絰紀一曰歲嵗星所次每嵗歷一辰十二嵗一周天二曰月月昱乎夜月行於天日十三度有竒一月一周天三曰日日昱乎晝日行於天一日一度嵗一周天四月星辰即嵗月日所行之次也星即二十八宿其度周天三百六十五四分度之一辰即十二辰訾娵降婁大梁實沈鶉首鶉火鶉尾夀星大火析木星紀𤣥枵之類應十二月五曰厯數謂嵗日月星辰其行各有盈縮進退遲速長短之不同然皆不離於數故以厯紀其數因以是數推考其行度以驗其當否故次五謂之厯數五皇極九疇之五箕子陳皇極之道皇建其有極人君大建立性中所固有之中道斂時五福能大建中道則能斂集是五福使備於吾身用敷錫厥庶民然後使民用中得福即是聖人敷布五福以與衆民惟時厥庶民惟是庶民于汝極往就汝極錫汝保極與汝共守其中凡厥庶民凡下而衆民無有淫朋無有過黨人無有比德上而公卿大夫無有阿比之德惟皇作極皆大為中道之歸凡厥庶民衆庶有猷智足有謀而偏於謀有為材足有為而偏於為有守正足以有守而偏於守汝則念之汝當念而錫用之使歸於中不協于極又有責之以善則未至合于中道不罹于咎歸之于惡則又未麗于罪咎是在乎可上可下之間皇則受之人君當大其度量以受之而康而色又康安和悅汝之顔色誘掖之曰豫攸好德彼苟改過遷善而告我曰豫所好在德汝則錫之福汝則使之用中而得福即是汝與之福時人斯其惟皇之極故是人於此乎始入歸於中道無虐煢獨然後無虐煢獨之人不及於中者當使改而及於中煢瓊而畏髙明無畏髙明之人過中者當使俯而歸于中人之有能有為有材能而偏於能有作為而偏於為者使羞其行使能者進其為之行為者進其能之行兼全而歸中而邦其昌邦國得此人而用之豈不昌盛乎凡厥正人大凡正人之道既富方穀既先富之使有常産以養常心方可使之入於善汝弗能使有好于而家然則富之至矣汝猶不謂使其有好德之心于汝國家時人斯其辜如是之人於是乎所為無非辜罪于其無好德于其永無好德之心矣汝雖錫之福汝雖欲使之趨中而錫與之福其作汝用咎彼反謂汝用咎惡以誤之是則下愚不移其可化乎無偏無陂今人君建中以示民當處心無不平不正之私陂祕遵王之義必循先王正義而行之無有作好無以己私意自作好遵王之道必循先王正道而行之無有作惡無以己之私意自作惡遵王之路必循先王正路而行之是猶有待於遵而後適中無偏無黨至於無不平於己無蔽惡於人王道蕩蕩則無事於遵而王道自蕩蕩而廣大無黨無偏無黨於人無偏於己王道平平則王道平平而夷易平駢無反無側無背弛無傾邪王道正直則王道自正直而公平㑹其有極將見王者出與物㑹則酬酢應變有此中歸其有極歸而處己則寂然不動有此中曰於是自言皇極之敷言吾所以建大中之道布為言以訓民是彞是訓乃以是常行之理為是訓于帝其訓是乃得於天以為訓凡厥庶民極之敷言是訓是行衆民因君感發其自有之極亦以是極敷布為言遞相訓戒而期於必行以近天子之光殆若朝夕親近穆穆之光而密承丁寧之訓矣曰斯民稱誦之曰天子作民父母天子教我以是極信其為民之父母以為天下王為天下所歸往也六三德九疇之六箕子陳三德之用一曰正直不剛不柔之德二曰剛克剛德之勝三曰柔克柔德之勝平康正直人君處天下平安無事之時當以正直之德待之彊弗友剛克處强梁弗友順之世當以剛德之勝待之夑友柔克處夑和友順之世當以柔德之勝者待之沈潛剛克然剛勝則暴故必沈伏潛藏其威以抑其剛德之偏勝而使合於中髙明柔克柔勝則懦故必髙明振奮其德以揚其柔德之偏勝而使合於中惟辟作福惟君得以作其賞善之福惟辟作威惟君得以作其罰惡之威惟辟玉食惟君得享玉食之奉欲君操利勢以用三德也臣無有作福作威玉食臣無有僭竊乎此臣之有作福作威玉食臣而有僭竊乎此其害于而家則內必害乎汝之室家凶于而國外必凶于汝之邦國人用側頗僻在位之人因以側而不正頗而不平僻而不中頗坡民用僭忒在下之人因僭越差忒不復名分之守矣忒慝七稽疑九疇之七箕子陳稽考所疑之策擇建立卜筮人選擇建立掌龜卜蓍筮之人乃命卜筮乃命以卜筮之事龜占曰卜策占曰筮曰雨此以龜卜視其龜兆有霏微似雨而下者曰霽龜兆舒豁似雨止者曰蒙龜兆蒙暗曰驛龜兆希疏不連屬如絡繹然曰克龜兆交錯相侵入如欲相勝者曰貞此揲蓍而筮其始揲也內卦靜而正曰貞曰悔其再揲外卦動而過曰悔凡七凡此七者卜五龜兆則雨霽蒙驛克五者為用占用二蓍占用貞悔二者之體衍忒無非推衍其義欲知差忒立時人作卜筮凡立是人作卜筮之官三人占則從二人之言蓋從衆也周官太卜掌三兆之法三易之法則卜筮復有三法必並建三人使各以法占視其吉凶之多寡以為之從違也汝則有大疑汝武王或舉大事有所疑謀及乃心先謀度於汝心謀及卿士又謀之在朝卿士謀及庶人又謀之天下庶人謀及卜筮然後謀之卜筮汝則從謀順於心龜從卜之順筮從揲蓍而順卿士從卿士順庶民從庶民順是之謂大同此之謂大同身其康彊故事之所舉在吾身則有康安强盛之喜子孫其逢吉子孫則從福慶之吉汝則從龜從筮從三者順卿士逆庶民逆二者不從吉以從多逆少故吉卿士從龜從筮從三者順汝則逆庶民逆二者不從吉亦以從多逆少故吉庶民從龜從筮從三者順汝則逆卿士逆吉亦以從多逆少故吉汝則從龜從二者順筮逆卿士逆庶民逆三者不從作內吉內而作冠昏喪祭之事則吉作外凶外而作征伐遷國則凶以從少逆多也龜筮共違于人如人謀則從而鬼謀則逆用靜吉靜而止其謀則吉用作凶作而遂其謀則凶箕子意稽疑以龜筮為主若龜筮從則無不吉耳八庶徵九疇之八箕子陳衆證驗之事曰雨以潤物曰暘以照物曰燠以長物曰寒以成物曰風以動物曰時五者無不順其事五者來備五者之來既備而無缺各以其敘各不失其時敘庶草蕃廡衆草必蕃滋而豐廡其他可知廡侮一極備凶五者之中苟有一事極備如多雨多𤾉凶一極無凶有一事極無如無雨無𤾉亦凶曰休徵言休美之驗有五在君之五事如何曰肅時雨若君之貌恭而作肅則時雨順之非淫雨也曰乂時𤾉若君之言從而作乂則時𤾉順之非亢暘也曰晢時燠若君之視明而作晢則時燠順之曰謀時寒若君之聽聰而作謀則時寒順之曰聖時風若君之思睿而作聖則時風順之欲知己德之修觀此五者之時若可見矣曰咎徵言咎惡之驗有五在君之五事如何曰狂恆雨若貌之不恭則為狂故常雨順之曰僭恆暘若言之不從則為僭故常暘順之曰豫恆燠若視之不明則為豫故常燠順之曰急恆寒若聽之不聰則為急故常寒順之曰蒙恆風若思之不睿則為蒙故常風順之人君欲知己之咎惡觀此五者之恆若可見矣曰箕子又曰不惟人君五事可以感雨𤾉風燠寒休咎之證王省惟嵗王者所省察者兼總萬事如嵗之總日月卿士惟月卿士分居列位以治其詳如月運行以成嵗師尹惟日衆正官之吏各治其職如日運行以成嵗嵗月日時無易王與卿士師尹各得其職如嵗月日時既無差易則五者之休證應之百穀用成年豐而百穀成乂用明事治而得其明俊民用章天下有道賢者出而用彰顯家用平康賢者既用則國家太平而安康日月嵗時既易王與卿士師尹各失其職如日月嵗時之差易則五者之咎證應之百穀用不成嵗饑而穀不成乂用昏不明治道自然不明俊民用微賢者隱於側微家用不寧國家自然不寧庶民惟星衆民之微猶星在天星有好風箕星東方木宿也風中央士氣木克士故從土所好而好風星有好雨畢星西方金宿也雨東方木氣金克木故從木之所好而好雨日月之行星之所好雖不同而日月之行有常度民之所好雖不同而卿士師尹之治有常法則有冬有夏故日之行也春分行赤道夏至而北秋分行青道冬至而南月之行也立春東行青道立秋西行白道立冬北行黑道立夏南行赤道此日月之常度不徇乎星之所好亦猶彼卿士之職各自有常法不徇乎民之所好也月之從星月苟失道妄行東從箕西從畢猶卿士而從乎民之所欲則以風雨則箕有揚沙之風畢有滂沱之雨猶政教失常以從民欲所以亂也九五福箕子於九疇之末陳五福之美一曰夀享年之永二曰富資財豐足三曰康寧身心安靜無事四曰攸好德所好在德五曰考終命成全終命之數而不死於非命六極窮極之苦有六一曰凶短折因凶而至短折若好勇鬭狠以至夭死非正命而死皆是二曰疾有惡疾三曰憂多憂患不樂其生四曰貧困於財五曰惡為人凶惡六曰弱為人無依倚則不能自立武王既勝殷此孔子序分器亡書武王既已勝殷邦諸侯制邦國以封有功之諸侯班宗彞班以宗廟彞尊以為有國重器作分器作分器之書言諸侯尊卑各有分也旅獒第七西旅一獒之獻微也武王受之若未甚害召公極言而力誡之誠慮自此玩物而喪志故作此書西旅獻獒西戎有旅國慕武王威德獻犬髙四尺曰獒獒音敖太保作旅獒召公居太保之職作旅獒之書以戒武王旅獒竹簡所標題惟克商武王勝商之後遂通道于九夷八蠻道路通于夷蠻來享來王非一西旅砥貢厥獒故西旅亦致貢獒犬太保乃作旅獒召公作旅獒書用訓于王以訓武王曰言嗚呼嗟歎明王慎德古者明哲之王謹慎修德四夷咸賓四方之夷皆使賓服無有逺邇無逺無近畢獻方物盡獻方土所有之物惟服食器用可以為衣服飲食器用者王乃昭德之致于異姓之邦王乃昭明己德足致逺方之來貢遂以頒賜于疏而異姓侯國無替厥服使無廢其事上之誠分寶玉于伯叔之國分逺方所貢寶玉于親而同姓伯叔之國時庸展親是用施其親親之道人不易物人皆一心事上不變易其心於分之親疏賜之貴賤惟德其物惟以德視物不以物視物德盛不狎侮君德盛大則不狎易侮慢於人狎侮君子罔以盡其心君子勞心治人狎侮之則無以盡其心狎侮小人罔以盡其力小人勞力以治於人狎侮則無以盡其力不役耳目不役耳於聲不役目於色百度惟貞湛然無欲百為之法度自然皆歸於至正玩人喪德苟玩弄人則為薄德之人而必喪失其德玩物喪志愛玩於物則為溺物之人而必喪失其志志以道寧今王在己之志當以道安之使聲色貨財不能惑言以道接在人之言當以道接之使詖淫邪遁不能入不作無益害有益不為無益之事以害有益之事功乃成然後事之有益者其功乃成不貴異物賤用物不貴重逺方奇異之物而輕賤斯民常用之物民乃足然後民之常用乃給足犬馬非其土性不畜況犬馬非其土地所冝不可畜養珍禽奇獸不育于國珍異之禽奇怪之獸不養育于國不寶逺物則逺人格不以逺方難得之物為寶則蠻夷見其不貪必心悅來服所寶惟賢則邇人安所寶惟賢才任位福及生民近而中國之人皆得其安嗚呼嗟歎夙夜罔或不勤早夜無或至於不勤不矜細行苟不愛惜細行謂獒為小物而受之終纍大德終害在己純全之天德為山九仭譬如為山髙至九仭山將成矣八尺曰仭功虧一簣一簣之土未進則虧損將成之全功允迪兹謂武王信能蹈行此言生民保厥居則君無玩好而生民皆得保厥居惟乃世王而有周之子孫亦可以世世惟王矣巢伯來朝此亡書序南方逺國巢伯以武王克商聞風來朝芮伯作旅巢命圻內芮國伯爵之諸侯入為王卿士陳王威德作書以命巢君故謂之旅巢命其書在旅獒之下書既亡序無所屬孔安國附於此芮汭金縢第八武王有疾周公作冊書以告太王王季文王欲以身代武王之死既事之後史官乃以其書藏於金縢匱中至武王沒後周公當國三監流言成王以風雷之變啓金縢之匱因見所禱之策史官以其出於金縢匱中故其書謂之金縢縢緘也蓋藏書於匱其匱以金縢之若金鎖鑰之類故曰金縢武王有疾武王有疾病周公作金縢金縢之書金縢舊簡所標既克商二年既克商之二年王有疾弗豫武王有疾病不悅豫二公曰太公召公也我其為王穆卜我其為武王敬卜於鬼神以觀吉凶周公曰未可以戚我先王言未可以龜卜祝之鬼神用憂戚我先王公乃自以為功周公乃自以請命為己事為三壇同墠築土為壇除地為墠為三壇坐北面南以禮缺王同墠一地而為之為壇於南方北面又為一壇於南方北面周公立焉公向三王而立植璧秉圭置璧於壇執圭於手以禮神乃告太王王季文王告三王欲其請命于天許其代武王死史乃冊祝曰祝史之官執公所為冊書惟爾元孫某缺示三王之長孫某成王讀金縢之冊至發字云某史因記之遘厲虐疾遇危厲暴虐之重疾若爾三王是有丕子之責于天如爾三王有責于天必須長子死以償其責以旦代某之身則請以旦代武王身豫仁若考我之仁德如我父文王能多材多藝能多材力多伎藝能事鬼神是則能事先王乃元孫不若旦多材多藝不能事鬼神乃長缺不能事鬼神死乃命于帝庭乃可受命于天帝之庭以有天下敷佑四方言能布德教以佑助四方之民用能定爾子孫于下地用能安定爾三王之子孫于下地為天子四方之民罔不祗畏下民無不敬而畏之嗚呼嗟歎無墜天之降寶命武王不死則不隕墜上天所降有天下之寶命我先王亦永有依歸則宗廟血食而我三王神靈亦可永逺有依托歸宿今我即命于元龜今我就受三王之命於大龜之卜爾之許我爾三王若許我代武王死我其以璧與圭我則以璧與圭歸俟爾命歸家俟爾三王肯令代死之命爾不許我爾三王苟不許我代武王死我乃屏璧與圭屏去圭璧不復事三王矣屏上乃卜三龜一習吉祝史宣冊書畢乃以龜之三兆卜之三者一同相因而吉啓籥見書於是開啓鎖鑰觀所藏卜筮書乃并是吉乃并是吉兆公曰言公體視此兆體王其罔害王必無害不至於死豫小子新命于三王我小子因卜而新受命于三王惟永終是圗已許武王不死可為周家永逺終久是圗兹攸俟於此當有所待其死命能念豫一人我死三王必能念我一人武王假之以年公歸公自壇墠之所而歸乃納冊于金縢之匱中祝史乃納禱死之冊於黃金所縢之匱中王翼日乃瘳武王於納冊之明日疾乃瘳愈武王既喪疾瘳後四年武王死喪去管叔及其羣弟武王同母弟十人長伯邑考次武王次管叔次周公次蔡叔霍叔管叔以其為兄不得位冢宰而周公以弟居已上故與羣弟蔡叔霍叔乃流言于國乃宣播其言流入鎬京國中若流水然曰公將不利于孺子言周公將不利便於稚子必奪成王之位周公乃告二公曰周公乃告太公召公言我之弗辟我若不能用法誅管蔡辟音闢我無以告我先王則我心愧無以告先王周公居東二年周公於是居東征伐至於二年則罪人斯得則罪之三叔斯為成王所得而誅之于後公乃為詩以貽王其後公乃作詩以貽成王名之曰鴟梟詩名鴟梟其中有無毁我室之辭謂已之東征惟思王室不安亦如鳥之惜巢王亦未敢誚公王見之亦未敢誚責周公秋大熟是嵗之秋百穀大熟未穫未曽刈穫天大雷電以風天忽雷電大作又繼以風禾盡偃禾盡為風偃仆於田畝中大木斯拔以至大木亦為所拔邦人大恐周邦之人觀此天變大恐懼王與大夫盡辨成王與大夫盡服皮辨以質素應天之變以啓金縢之書將啓匱取卜筮之書命龜以卜休咎未卜之間乃得周公所自以為功乃得周公往者所自以請命為己事代武王之說欲代武王之死之說於金縢匱中二公及王太公召公及成王乃問諸史乃問前日諸史從周公冊祝者與百執事與前日百執事從周公奔走服事者對曰信同辭應曰信有是事噫恨辭公命我勿敢言周公當時命我勿敢言矣而我言之豈不失信以負周公乎此所以有歎恨不滿之辭王執書以泣王大悟執冊書以泣曰其勿穆卜言今不須敬卜我已知過昔公勤勞王家昔周公勤勞王室如此其至惟豫沖人弗及知惟我幼沖人不及知此事今天動威今天動風雷之威使我啓緘而卜因得此書以彰周公之德彰顯周公之德惟朕小子其新逆我小子今改過自新迎公以歸我國家禮亦冝之國家褒崇賢者之禮亦冝如此王出郊王出郊迎周公天乃雨反風天乃降雨反回風勢禾則盡起禾盡起不復偃二公命邦人太公召公乃命國人凡大木所偃禾為大木所偃仆者盡起而築之盡扶起禾築之使殖嵗則大熟是年禾大豐熟大誥第九武王既崩周公以冢宰居攝百官總己以聽冢宰管叔以周公之兄不平其事乃與蔡霍二叔倡為流言謂公將不利於孺子乃挾武庚以叛王室而淮夷亦繼以叛周公於是自往東征將黜絶有商之命先以其征伐之意大誥於天下故其書謂之大誥武王崩三監及淮夷叛管蔡霍為三監監武庚治殷民乃挾武庚及淮夷叛周公相成王周公為成王之相將黜殷作大誥遂作大誥之書大誥竹簡所標王若曰成王意如此言猷以黜商之謀大誥爾多邦大誥爾多邦諸侯越爾御事及爾治事之臣弗弔我不為天所憫恤天降割于我家故天降下凶害於我周家使武王遽喪不少延不少延長其命洪惟我幼沖人大自思惟我乃幼小童沖之人嗣無疆大歷服嗣守無窮大歷年久之天下乃莫大之事弗造哲我尚未能深造知人之哲迪民康以啓迪民於康安之地矧曰其有能格知天命況天道深逺其能至於天而知其命哉已豫惟小子已矣乎我小子若涉淵水今如涉渡淵水豫惟往求朕攸濟我惟日夜往求我所以濟艱之道敷賁敷布賁飾其治敷前人受命以敷布𢎞張前人所受之天命兹不忘大功於此不忘前人大功豫不敢閉于天降威我豈敢閉塞上天所降威于三監而不伐之乎用寧王遺我大寶龜於是用安天下之王武王所遺我大寶龜而卜之紹天明即命天吉凶雖明非龜為紹介𫝊命人莫曉以紹介上天之明就受其命曰龜告有大艱于西土今羣叔流言有艱難于西土西土人亦不靜西土人亦惶惑不安越兹蠢於此蠢蠢而動殷小腆祿父力小富厚誕敢紀其敘大敢紀其既亡之敘意圗復興商業天降威敢妄意如此者亦見天降威於周而武王死知我國有疵知我國有此疵病民不康民將不安曰故敢妄言豫復我當恢復舊業反鄙我周邦反以我周家為商之都鄙今蠢今翼日今武庚蠢動於商郊今之明日民獻有十夫豫翼民之賢者有十夫來為我輔翼以豫敉寧武圗功以為我撫安武事所圗回之功敉撫也寧安也我有大事休則我舉兵我大事可謂美矣朕卜并吉我卜為二龜又皆并吉肆豫告我友邦君故我告我同志之國君諸侯越尹氏及庶官之正者庶士御事上中下衆士為王治事者曰告之曰豫得吉卜我已得吉卜豫惟以爾庶邦我今惟以爾衆國諸侯于伐殷逋播臣往伐殷之逋亡播蕩之臣武庚爾庶邦君奈何爾衆國君諸侯越庶士御事及衆士治事之臣罔不反曰無不以言復於我曰艱大興師伐殷其事至艱至大民不靜亦惟在王宫邦君室今西土之民所以不安者雖由武庚之叛其源亦惟在於羣叔以骨肉之親離問王室釁端實兆於王之宫與邦君之室也越豫小子考翼自謂於我小子當自反以成其敬道不可征不可輕舉征伐之事王害不違卜王曷不違卜而勿征邪肆豫沖人故我幼沖之人永思艱長思所以艱大之說曰遂言嗚呼嗟歎允蠢鰥寡國叛而我征之信蠢動其鰥寡無告之民哀哉可哀也哉豫造天役造為也我為天之所役使遺大投艱于朕身天實以事之甚大遺於我身事之甚艱投於我身越豫沖人於我幼沖之人不卭自恤豈容於我身而自恤之乎卬昂義爾邦君宜爾國君諸侯越爾多士及爾上中下之多士尹氏御事庶官之正為王治事之臣綏豫曰皆當安慰我曰無毖于恤無大畏謹東征之役為朝廷憂恤之事而至於退縮不進不可不成乃寧考圗功惟當仗義以往不可不成汝安天下之父武王勤勞所謀之功已豫惟小子已矣乎我小子不敢替上帝命不敢廢上天東征之命天休于寧王況天往日有休美之命命我安天下之王武王興我小邦周興起自我小邦周之諸侯而為天子寧王惟卜用武王尚且惟卜是用凡事不敢妄舉克綏受兹命故能安定天下受此大命今天其相民今日天有意於誅叛人以助我民矧亦惟卜用況我亦惟卜是用得吉兆故往伐之何可聽爾違卜之言而自沮邪嗚呼嗟歎天明畏天道甚明明而可畏弼我丕丕基今卜并吉是輔成我大大之基業王曰成王曰爾惟舊人爾邦君御事皆舊有位人爾丕克逺省爾大能逺逺思省爾知寧王若勤哉爾知我安寧天下之武王當時建立若之何其勤哉天閟毖我成功所今日武庚之亂乃天密有以謹我成功之所豫不敢不極卒寧王圗事我不敢不盡終武王勤勞所謀之事肆豫大化誘我友邦君故我大訓化誘掖我同志之邦君諸侯天棐忱辭天亦冥冥之中輔我化誘諸侯至誠之言其考我民其考察我民如十夫豫翼即天之所輔也豫曷其不于前寧人圗功攸終我何敢不誅武庚而於前安天下之武王謀其功之所終乎天亦惟用勤毖我民今武庚之亂天亦惟用勤勞毖謹我民使知憂恤若有疾如人有疾去其疾則身安除其患則民可安豫曷敢不于前寧人攸受休畢我何敢不於武王所受休命而畢其事乎王曰成王又更端以告曰若昔朕其逝如我昔者初欲東征之時仗義決伐我其往之久矣朕言艱日思所以遲遲未行者我以爾等言難之故日念於心故至今耳若考作室我思今日正如父欲作室家既砥法既致其髙下向背之法厥子乃弗肯堂其子乃不肯為之堂基矧肯構況肯結構其屋乎厥父菑又如耕田其父菑而去草厥子乃弗肯播其子不肯播種矧肯穫況肯俟成熟而刈穫乎厥考翼今我武王定天下大業立經陳紀已敬其事如作室有法治田已菑矣今三監武庚之亂我不能討平以安社稷則是不肯堂不肯播況望其顯設藩飾制禮作條以文太平如子之構如穫乎使武王之靈於此時見之其肯曰其肯自謂豫有後弗棄基我有後而終不棄我之基業乎肆豫曷敢不越卭敉寧王大命惟其如此故我何敢不以我身撫循武王之大命謂伐武庚安周室也若兄考譬如為人父兄猶成王為人君乃有友伐厥子乃有朋友伐擊其子猶四國作亂害西土之民民養其勸弗救為厮養如奴隸者方且坐視武庚為民害而不救可乎王曰王又更端以告邦君嗚呼歎言肆哉肆陳也欲其陳力決行爾庶邦君越爾御事爾邦君及治事之臣爽邦由哲爽明邦國使無疑謀者由於知人之哲亦惟十人迪知上帝命惟彼十人獨能啓迪以知天命所在毅然而至輔我以往越天棐忱爾時罔敢易法謂武王之初以至誠為天所輔爾于彼時尚不敢改易其武王所班之法度矧今天降戾于周邦況今天降下災戾于周邦而武王死惟大艱人惟大艱險之人如三監武庚之徒誕鄰胥伐于厥室得以乘釁而大鄰近相殺伐於其所居之室爾亦不知天命不易爾豈不知天命歸周有不可改易之理邪豫永念曰我亦當深思逺慮而言天惟喪殷若穡夫天惟喪亡殷家如穡夫之治田畝去惡草則恐其害嘉穀武庚作亂是惡草之本根未除豫曷敢不終朕畝我何敢不芟夷藴崇以終其田畝之事滅武庚以終其安天下之功哉天亦惟休于前寧人今滅武庚可以必勝者天亦以此休美于前寧人武王豫曷其極我後人何能至此極至也卜敢弗于從卜之既吉敢不往從之率寧人有指疆土今我循守安天下之武王指我疆土所至不容坐受其侵略矧今卜并吉況今卜之龜而三兆并吉肆朕誕以爾東征故我大以爾庶邦東征天命不僣今日天命已一定決不僣差卜陳惟若兹卜之所陳又如此汝不可以不從微子之命第十微子與紂同母而為兄在商以子爵食邑於微故謂微子武王克商微子痛社稷無主乃持祭器造軍門肉袒面縛左牽羊右抱茅膝行而前以告武王乃釋微子使復其位至武庚作亂成王殺之然後始封微子於宋以續殷後故作微子之書以命之成王既黜殷命廢點殷命而絶其爵殺武庚誅殺武庚命微子啓代殷後命微子名啓代殷後奉祭祀作微子之命此篇書微子之命舊簡所標王若曰成王之意若曰猷以道告之殷王元子其母未立為后生微子既立為后生紂紂為嫡而立微子其庶兄也故成王呼微子為殷王帝乙之長子惟稽古考之古典崇德象賢當尊崇前代聖王之有德者於其子孫之中擇其賢能似先王者為侯以奉祭祀統承先王使繼承先王之統緒修其禮物修明先王禮物正朔服色車旗制度皆如其舊作賔于王家為賔於周家以客禮待之有不臣之義與國咸休與周國齊休美永世無窮長世無窮嗚呼嗟歎乃祖成湯克齊聖廣淵汝視湯能齊則純一不雜聖則大而化之寬洪為廣沈潛為淵皇天眷佑上天於是眷顧佑助誕受厥命遂大受天命有天下撫民以寬撫安其民以寬仁之政除其邪虐盡除夏桀不正不仁之惡政功加于時故安民之功加被於當時之民德垂後裔在己之德垂及於後世之苖裔爾惟踐修厥猷爾微子能踐履修明其道舊有令聞舊有美譽恪慎克孝誠恪戒謹能盡孝道肅恭神人齊肅恭敬幽不忽神明不忽人豫嘉乃德我實嘉美汝德曰篤不忘謂汝德實篤厚而不可忘上帝時歆上帝於是歆享下民祗協下民於是敬和庸建爾于上公用是建立汝以上公之位尹兹東夏以正此東夏之民宋在王室之東故謂之東夏欽哉敬哉往敷乃訓往就宋國常敷布汝訓迪斯民之道慎乃服命謹慎汝上公九命之服居諸侯之職率由典常循行典祀常法不可一毫僭差以蕃王室以蕃輔我王家𢎞乃烈祖恢𢎞汝有功烈之祖成湯而發揮其道德律乃有民以法整齊汝所有之民而使不越教令永綏厥位庶可長安處上公之位毗豫一人以毗輔我一人毗音皮世世享德後嗣因汝侯國世世享汝之盛德萬邦作式他國皆以汝為法式俾我有周無斁使我周家與汝親密無有厭斁之事嗚呼嗟歎往哉惟休往就宋國當思所以休美其職無替朕命無廢我命汝之言唐叔得禾此亡書序唐叔成王母弟封於晉於其食邑內得禾異畝同穎異畝隴而同穎穗獻諸天子以為瑞故取而貢於天子王命唐叔歸周公于東成王以為周公之德所感而致君臣有和合之象時周公東征未返遂命唐叔以其禾迎周公自東而歸作歸禾遂作歸禾之書周公既得命禾周公既得成王所命以歸之禾旅天子之命乃陳天子所以命己之意作嘉禾遂作嘉禾之書謂是禾之生本乎君之有嘉德也尚書句解卷七
