body:
  text: 尚書句解卷四元朱祖義撰湯誓第一讀此篇見聖人處君臣之變時中之義不可以常理論也有天地男女而後有君臣名分確乎不可踰越一有踰越人紀不立矣然天生民而立之君正為司牧吾民設乃有怙冨貴之權謂天下莫吾敵借是以肆其惡使生民塗炭無所告訴則人紀不立抑又甚焉是則湯伐桀之舉本於應天順人誠有所不容巳也故作湯誓書伊尹相湯伐桀伊尹輔相湯伐桀升自陑升道從陑陑而遂與桀戰于鳴條之野遂與桀戰于桀所都安邑之旁鳴條之野作湯誓湯於此誓師故作湯誓書湯誓王曰格爾衆庶至爾亳邑衆庶悉聽朕言盡聽我之誓言非台小子敢行稱亂不是我小子敢行舉亂有夏多罪桀之多罪天命殛之天命我誅殛之今爾有衆今爾亳邑所有衆民安於無事憚伐桀之勞汝曰汝等乃言我后不恤我衆我君湯不矜恤我亳邑衆民舍我穡事舍我稼穡之事而割正夏而割我以正有夏之罪予惟聞汝衆言我惟聞亳邑衆言如此予畏上帝我實畏懼上帝不敢不正不敢不往正夏桀之罪今汝其曰今汝亳邑之人恃我自固乃曰夏罪其如台夏桀罪惡其如我何夏玉率遏衆力殊不知夏桀方且與其臣相率遏絶衆民之力以征役之煩率割夏邑又相率割剥夏邑之賦税有衆率怠弗協故有夏之衆皆相率怠惰而不和叶曰相語曰時日曷喪桀何時何日喪亡乎予及汝皆亡我欲與汝殺身與之俱亡夏徳若兹夏王惡徳如此今朕必往今我必往伐之無疑爾尚輔予一人爾亳邑之民庶幾輔佐我一人致天之罰行天之罰予其大賚汝功成事畢我其大賚賜汝爾無不信爾無以朕言不可信朕不食言我不食其言謂非空言無實以言之不行如食之消盡也爾不從誓言爾或不從我誓言予則孥戮汝我則囚孥汝而戮辱之罔有攸赦無有所赦湯旣勝夏此乃夏社疑至臣扈三篇亡書序湯旣勝夏為天子欲遷其社欲遷夏社稷為商都不可臣扈謂湯必以夏之後為商賔則夏之社稷可遷於夏後所封之地不可遷於商都作夏社疑至臣扈始作夏社言其欲遷中作疑至疑其不可終作臣扈以臣扈之言而止夏師敗績此又典寳亡篇序夏師旣大崩曰敗績湯遂從之湯遂任其所往從而迫之遂伐三朡桀走三朡國在定陶湯遂伐三朡俘厥寶玉取其祭天地諸神之寶玉誼伯仲伯作典寶誼伯仲伯之臣作典寳之書言寶玉若非國之常寶湯亦不取仲虺之誥第二湯旣勝夏而歸念堯舜禹揖遜授受而已始以征伐得天下恐後世以為口實仲虺慮其憂愧無已必有自沮之心而無日新之徳故作誥以釋湯之慙始言天厭夏徳而眷湯不容釋中言民之懐商而戴商為已舊終言成湯創業垂統必思所以永保天命無非所以釋湯之慙也此正仲虺作誥之意也湯歸自夏湯自夏歸商至于大坰至于大坰之地仲虺作誥仲虺作誥以告湯虺音卉仲虺之誥古史之所題成湯放桀于南巢伐桀功成故號成湯南巢地名在廬江六縣東有居巢城成湯伐桀不遂殺之故放之於南巢之地惟有慙徳以臣伐君遂慙其徳之不及古曰乃言予恐來世以台為口實我恐後世亂臣賊子借我以藉口仲虺乃作誥曰仲虺乃作誥以開釋湯曰嗚呼嗟歎之辭惟天生民有欲天生民皆有性情而有欲無主乃亂苟無主以治之則人人務足其欲而爭端生必至於亂惟天生聦明時乂天將生聦明之君是治之有夏昬徳桀昬蒙其徳虐用其民民墜塗炭民危險若陷泥墜火天乃錫王勇智天乃與湯以勇使足有㫁以知使足有謀表正萬邦為儀表以正萬邦纉禹舊服繼禹有舊日弼成之五服茲率厥典於此率循大禹舊典奉若天命奉順天命以為之主夏王有罪桀有罪惡民心棄之矯誣上天矯詐誣罔以天命我以布命于下布命令于天下帝用不臧上帝不善其所為式商受命用商王受天命用爽厥師用開明其衆使知矯誣之言不足信簡賢附勢奈何時人忽湯之賢依桀之勢猶不之悟寔繁有徒實繁衆其所有徒黨肈我邦于有夏我商家始有邦國於有夏之時其徒黨欲害之若苗之有莠如苗有莠皆欲耡去若粟之有秕粟有秕皆欲簸揚而去之秕比小大戰戰我商小大之人戰戰憂恐罔不懼于非辜無不懼桀以非罪見滅矧予之徳言足聽聞况我盛徳之言足聽聞于天下宜其尤疾之而欲去之也惟王不邇聲色惟王不邇聲樂女色不殖貨利不生殖貨賄財利徳懋懋官人能勉於修徳我則勉勵以官功懋懋賞人能勉於立功我則勸勉以賞用人惟已用人之權專於己改過不吝過失則改初不吝惜克寛克仁能寛容能仁愛彰信兆民此所以能明信於天下兆民皆願其為君乃葛伯仇餉乃有葛國伯爵諸侯不祀湯使亳衆往為之耕童子以黍肉餉耕者葛伯乃殺而奪之與餉田之人為仇讎餉式亮反初征自葛故湯初征伐自葛始東征西夷怨東面往征則西夷怨其來之後南征北狄怨南面往征則北狄怨其來之後曰其怨詞曰奚獨後予何先彼而獨後於我攸徂之民湯所往之民室家相慶室家皆相慶賀曰喜而言徯予后待我君后來其蘇我君旣來則自此可蘇醒民之戴商由此觀民歸戴商家厥惟舊哉其來舊哉非一日也佑賢輔徳大抵天下常理興亡皆自取賢者人佑之徳者人輔之顯忠遂良忠者人顯之良者人遂之是為善者自取其所推尊兼弱攻昧弱者人兼之昧者人攻之取亂侮亡亂者人取之亡者人侮之是不善自取其所侵陵推亡固存人君惟能順理之常因其有可亡之道則推而亡之因其有可存之道則固而存之邦乃其昌則邦國必昌盛矣徳日親徳苟日新而無斁萬邦惟懷則萬邦皆懷慕我徳志自滿苟有自足之志以為徳止此而不復修九族乃離故雖親親而九族亦離散王懋昭大徳今王當懋勉昭明其盛大之徳建中于民建立大中之道以示民以義制事事各有義以義制事事得其冝以禮制心心自有禮以禮制心心得其正垂裕後昆以禮義垂法於後嗣豈不綽綽然有餘裕哉予聞曰仲虺謂我聞古人之言曰能自得師者王能自強不息克自抑畏而得師法者可以為王謂人莫已若者亡矜己以忌人亡之道也好問則裕有疑好問則徳優裕有餘自用則小自用己善訑訑拒人所見狹小嗚呼仲虺又嗟歎云愼厥終今日惟當謹慎其終惟其始亦如其始殖有禮於有禮者封殖之覆昏暴昏暴者覆亡之欽崇天道天道福善禍滛湯能欽崇體而行之永保天命斯可以長保天之命湯誥第三此篇成湯勝夏而歸至亳邑四方畢朝新君故湯誕誥所以伐夏之意故作此書湯旣黜夏命旣勝夏而黜廢其命復歸于亳復歸于新都亳邑作湯誥作湯誥以誕告多方湯誥竹簡標題王歸自克夏湯旣勝夏自彼而歸至于亳至亳邑誕告萬方大告萬方諸侯王曰湯言嗟爾萬方有衆嗟歎爾萬方有衆明聽予一人誥明聽我一人誥惟皇上帝惟至大之上天降𠂻于下民降生𠂻善之性于天下之民若有恒性順民所有常善之性克綏厥猷惟后使安於其道無勉強之態者惟在君夏王滅徳作威夏桀喪滅己徳造作威惡以敷虐于爾萬方百姓以布虐政于爾萬方百姓爾萬方百姓罹其凶害爾等被其凶暴之虐弗忍荼毒不能堪忍如荼苦螫毒並告無辜于上下神祇並皆稱寃以告無罪於天地神祇天道福善禍淫天之常道善則福淫則禍降災于夏故天降下災異于桀以彰厥罪以彰顯其罪肆台小子故我小子將天命明威奉將天所命之明威不敢赦討桀罪不敢赦敢用𤣥牡用黒色元牡牛敢昭告于上天神后敢以是告于上帝神后神后地祇也請罪有夏請加罪于有夏聿求元聖於是遂求大聖如伊尹與之戮力與之勉力以與爾有衆請命以與爾有生之衆告天伐桀乞生命上天孚佑下民上天果然信而佑助下民罪人黜伏桀知其為有罪之人退伏逺屏竄于南巢天命弗僭天命福善禍淫無有僭差賁若草木賁飾光華如草木天且生殖之如此兆民允殖則天下兆民信上天生殖之矣俾予一人今使我一人輯寧爾邦家綏輯安寧爾邦家之衆兹朕未知獲戾于上下此我未知得罪于天地神祇否慄慄危懼我所以慄慄然憂危恐懼若將隕于深淵如將隕墜于深淵中凡我造邦凡我今日始新造爾衆邦之諸侯無從匪彞無從非常法者無即慆淫無就慆淫而至於過慆絛各守爾典各守爾常法以承天休以受上天休福爾有善爾有善可稱朕弗敢蔽朕當懋官懋賞以旌爾善不敢隱蔽罪當朕躬罪當在朕一身不敢自赦不敢自恕惟簡在上帝之心言簡別又在乎上天之心其爾萬方有罪在予一人在我一人不能率爾衆歸善予一人有罪無以爾萬方我罪乃自取非爾萬方之事嗚呼湯又嗟歎言尚克時忱爾萬方有衆庶幾能惟我此言是信乃亦有終非特我國家可保有終汝亦可終享安榮之福咎單作明居咎單臣名作明居之書亡此篇正次湯誥之下百篇之序此類有四周公作無逸伊尹作咸有一徳周公作立政皆直言所作之人不言所作之意以經文分明故略之漢孔氏以意度此篇謂咎單主土地之官作書明居民之法此亦因字以求文也故存之單善伊訓第四太甲初即位伊尹告以乃祖成湯之成徳故作是書謂之訓者以其有諄諄儆戒之意也成湯旣没成湯旣崩太甲元年太甲繼湯而立之元年伊尹作伊訓伊尹乃作伊訓之書以告太甲肆命又作肆命之書亡徂后亦亡伊訓舊簡標題惟元祀太甲即位元年十有二月乙丑日辰伊尹祠于先王禱祠於先王廟奉嗣王祗見厥祖奉太甲敬見其祖成湯告即位之事侯甸羣后咸在侯服甸服諸侯皆在奔喪同欲覲見新君百官緫己時太甲宅憂不言故百官皆緫其己之職事以聽冢宰聽命於太宰伊尹伊尹乃明言烈祖之成徳明言有功烈之祖成湯艱難創業之成徳以訓于王曰以訓告于王曰嗚呼嗟歎古有夏先后古者有夏先君禹方懋厥徳方勉其徳未㡬罔有天災已見無有日月薄蝕之天災山川鬼神山川之間鬼神亦莫不寧亦無不安其居曁鳥獸魚鼈咸若及微物皆得以順其性于其子孫弗率于其子孫桀一不率循乃祖之徳皇天降災皇天旣降下灾咎假手于我有命借手于我有天命之成湯造攻自鳴條始攻戰自鳴條桀於此始亡朕哉自亳朕始自亳邑湯於此始興惟我商王成湯布昭聖武顯然示人以大而化之之武而不殺代虐以寛代夏虐政以吾至寛兆民允懷兆民信而懷之今王嗣厥徳今太甲繼湯修徳罔不在初無不在其初而謹之立愛惟親立愛親之教使天下無不愛親惟在上之人愛親始立敬惟長立敬長之教使天下無不敬其長惟在上之敬長始始于家邦愛敬之道始于家及于國終于四海終至于四海矣嗚呼嗟歎先王肈修人紀先王成湯始修明君臣父子夫婦長幼朋友之人紀至桀而廢之從諫弗咈故從諫言而不咈逆所以修明人紀之道先民時若先賢之言是順所以參求人紀之道居上克明出就國則居上能明於修人紀為下克忠入朝桀則為下能忠於盡人紀與人不求備緩以待其歸於人紀檢身若不及急以責其歸於人紀以至于有萬邦由是自七十里以至於有萬邦而為君兹惟艱哉此事豈不艱難敷求哲人敷布廣求賢哲之人俾輔于爾後嗣使輔弼于爾後世子孫制官刑又制為誅責有官君子之刑儆于有位以儆戒于有位之人曰其刑曰敢有恒舞于宫敢有常舞于宫窒中而無節約者酣歌于室沈湎于酒狂歌于家而無忌憚時謂巫風是名巫覡風俗敢有殉于貨色敢有以身從貨從色不知有身恒于遊畋常于遊遨常于畋獵無有窮已時謂淫風是名淫過之風俗敢有侮聖言侮玩聖人之言而不敬逆忠直逆拒忠直之人不從其言逺耆徳踈逺耆老有徳比頑童親比頑愚小童時謂亂風是謂悖亂之風惟兹三風十愆惟此三風緫有十愆過巫風二淫風亂風各四卿士有一于身家必喪卿士有一在其身家必至于喪邦君有一于身國必亡邦君有一在身其國必亡臣下不匡為臣見君有此愆過坐視不能匡正其刑墨則以墨刑刑之具訓于蒙士豈特以此訓有官君子亦且以此訓童蒙之士可也嗚呼尹又歎言嗣王祗厥身太甲繼湯為王當祗敬其身念哉以乃祖為念聖謨洋洋乃祖聖謀之垂後者洋洋乎其大嘉言孔彰乃祖善言示於後者甚至於彰明惟上帝不常天之去就不常作善降之百祥為善則天降百祥治可常享作不善降之百殃苟為不善天降百殃禍亂隨之爾惟徳罔小萬邦惟慶爾為徳無所謂小雖小萬邦皆頼其休慶爾惟不徳罔大墜厥宗不徳無所謂大雖大亦覆墜宗祀肆命徂后肆命伊尹陳上天之命以為戒徂后伊尹陳往古之君以為戒二書亡於秦火其次當在此太甲上第五餘篇皆因事名篇獨太甲非作於一日所主又非一事自初立至放逐至歸亳終始三年皆伊尹太甲反復之言史官於歸亳後緫敘其終始作此三篇太甲旣立旣立為王不明昏迷不明不能用伊尹之訓伊尹放諸桐伊尹放之於湯所葬之桐宫使朝夕密邇先王而思所以貽我後人之意然湯於桀則放之伊尹於太甲豈亦放之哉蓋非有摧折激厲以生其憂患之心則終不可止遷之桐而命之曰放乃示以將廢而不得立彼必憤悱而入於善此放之所以訓之也三年終喪三年復歸于亳果能悔過遷善於是自桐宫復歸亳邑思庸思用伊尹之言伊尹作太甲三篇故伊尹作此三篇太甲古文自此起惟嗣王不惠于阿衡惟太甲不順于阿衡之言伊尹時為冢宰尊曰阿衡言為人君所倚以取平也伊尹作書曰伊尹作書進戒先王顧諟天之明命先王成湯顧省是天之明命以承上下神祇以承天地神祇社稷宗廟以至社稷宗廟罔不祗肅無不致其祗敬嚴肅天監厥徳故天監觀成湯之徳用集大命用集大命于湯之身撫綏萬方俾之撫安萬邦為民之主惟尹躬克左右厥辟宅師尹之身又能左右輔翼其君成湯奄宅此天下之衆肆嗣王丕承基緒故太甲得以大繼承基業惟尹躬先見于西邑夏尹之身先見亳之西所都安邑有夏之君自周有終自周備其治身治國之道能保其終相亦惟終輔相亦保其終其後嗣王桀也罔克有終無能保其終相亦罔終輔相亦無善終嗣王戒哉太甲不可不以為戒祗爾厥辟當敬爾君道辟不辟苟為君不盡君道忝厥祖忝辱其祖成湯王惟庸奈何太甲惟以尹言為常談罔念聞而心未嘗念耳未嘗聞伊尹乃言曰尹乃復言先王昧爽丕顯湯每當晦而未明之時大明其徳坐以待旦坐以待明旦旁求俊彦廣求賢俊美彦之士啓迪後人使之開啓道進後世子孫無越厥命以自覆今無逺越湯付託之命自取覆亡愼乃儉徳惟謹修汝節儉之徳惟懷永圖懐念長久之圖若虞機張譬如虞人取獸弩牙旣張往省括于度則釋必退而省察矢末合於準望之處然後釋放之則發無不中欽厥止太甲常敬所止之處率乃祖攸行止在率循爾祖成湯所行惟朕以懌則我心喜悦其無負先王付託萬世有辭王亦可萬世有稱美之辭王未克變太甲猶安於不善未能變於善伊尹曰伊尹乃言兹乃不義此乃悠行不義之事習與性成循習不改其與性俱成所謂習慣成自然予不狎于弗順我今不可使狎於不順之人營于桐宫於是營造桐宫於成湯所葬之地密邇先王其訓使密邇成湯之訓起其哀思而絶其私慾無俾世迷無使終其世迷而不反王徂桐宫居憂太甲往桐宫居喪克終允徳果能修其誠信之徳以自終太甲中第六惟三祀三年喪畢十有二月朔初一日伊尹以冕服奉嗣王歸于亳尹以衮冕吉服奉太甲自桐歸亳踐天子位作書曰喜而作書民非后民非君罔克胥匡以生無能相守其正以生后非民罔以辟四方君非民無以君臨四方皇天眷佑有商皇天眷顧佑助我商俾嗣王克終厥徳使大甲能終其徳實萬世無疆之休實為萬世無窮休美王拜手稽首曰太甲於是手至首為拜手首至地為稽首以謝前過曰予小子不明于徳我小子不明于徳喪其良心自厎不類自至於不善欲敗度以私欲敗壞其法度縱敗禮以縱肆敗壞其禮節以速戾于厥躬以自速罪戻于其身天作孽天作災孽猶可違違避自作孽自作災孽不可逭逭逃旣往背師保之訓往者違背伊尹教訓弗克于厥初不能修徳於初尚賴匡救之徳今庶㡬賴伊尹正救之徳圖惟厥終圖謀以善其終伊尹拜手稽首曰尹亦拜手稽首荅其致恭之禮曰修厥身人君誠能正心誠意以修其身體允徳協于下信其有徳合于羣下之心惟明后然後可為明徳之君先王子惠困窮湯推父母愛子之情惠愛困窮無告之民民服厥命民服其命令罔有不恱無不喜恱並其有邦厥鄰以至與湯相並有國為鄰之人乃曰亦言徯我后待我君湯后來無罰湯來可免刑罰之苦王懋乃徳今太甲欲懋勉其徳視乃厥祖當觀乃祖湯之已行無時豫怠無時敢有逸豫怠惰之心奉先思孝奉先必思盡孝所以不忘祖也接下思恭接下必思盡恭所以不絶物也視逺惟明欲視逺惟盡明聽徳惟聦欲聽徳惟盡聦朕承王之休無斁是則我承王之休美無厭斁矣斁亦太甲下第七伊尹申誥于王曰尹重誥于太甲嗚呼嗟難惟天無親克敬惟親天無私親能敬則天親之民罔常懷懷于有仁民本無常懷歸于有仁徳之王鬼神無常享鬼神本無常享享于克誠享于克誠之人天位艱哉以是數者而觀則君處天位豈不難哉徳惟治有徳則治否徳亂無徳則亂與治同道罔不興人君與治世同道則無有不興與亂同事罔不亡與亂世同事無有不亡終始慎厥與終始所為能謹其所與與治同道不與亂同事惟明明后斯為明明之君先王惟時懋敬厥徳湯惟是懋勉恭敬修其徳克配上帝故其徳能配合上帝與天同大今王嗣有令緒今太甲繼湯有令善之基緒尚監兹哉庶㡬監視乎此率而行之若升髙譬欲升髙必自下自下而升若陟遐譬欲陟逺必自邇必自近而陟莫不以漸進無輕民事惟難無輕忽民事必思其難無安厥位惟危無安處其位必思其危愼終于始謹終如始有言逆于汝心有言拂逆汝心不可遽怒必求諸道必以其言而求諸道果合於道則固忠直之言也雖逆心則當從之有言遜于汝志有言遜順汝志不可遽喜必求諸非道必以其言求諸非道果非道則固謟諛之言也雖順志當拒之嗚呼尹又歎言弗慮胡獲事而不思何所得弗為胡成事而不為何所成一人元良萬邦以貞所以一人大善則萬邦以正君罔以辯言亂舊政惟君不以人臣辯口之言紊亂先王之舊政臣罔以寵利居成功人臣不以寵禄為可貪以成功自居而不知退邦其永孚于休則君盡君道臣盡臣道我商家可以信有休羙於無窮矣咸有一徳第八伊尹示太甲以𫝊心之要故咸有一徳之書作焉太甲克終允徳徳固一矣然人心無常一念苟差則前日之尤徳安保其不變苟伊尹告歸之際猶以為慮一徳其大矣乎在堯舜為執中武王為皇極夫子為一貫子思為中庸孟子為浩然之氣實一物也明乎一徳之理推而為用人已一也君民一也幽明古今終始無適非一伊尹心欲太甲君臣咸有純一之徳故以名篇伊尹作咸有一徳作史者旣言伊尹復政厥辟將告歸乃陳戒于徳紀之已顯矣故夫子直敘之曰伊尹作咸有一徳咸有一徳書於序下皆揭篇名蓋常體也伊尹旣復政厥辟尹以冕服奉太甲歸亳旣復還政事於其君將告歸將告老而歸乃陳戒于徳乃陳戒之以一徳欲其終始不變曰嗚呼言而至嗟歎天難諶命靡常天難信者以禍福興亡之命無常常厥徳保厥位惟常其在己之徳一而不變可永保其天位厥徳匪常九有以亡苟其徳無常則九域我所有者亦亡矣夏王弗克庸徳桀不常其徳慢神虐民幽則慢忽其神明則虐害其民皇天弗保故天棄而不保監于萬方於是監觀四方之衆啓迪有命將擇其足以有天命者開啓導迪之眷求一徳眷顧求其有一徳者俾作神主使為神天之主惟尹躬曁湯尹之身與湯咸有一徳皆有一徳克享天心能當天心受天明命故湯受天明命以有九有之師以有九州之衆爰革夏正遂改革夏之命以歸于正非天私我有商非天私我商家惟天佑于一徳天所助在一徳非商求于下民非商家求于下民惟民歸于一徳民所歸在一徳徳惟一一而不變動罔不吉則動作無不吉徳二三動罔不凶多變則動作無不凶惟吉凶不僭在人或吉或凶之不差在人所修如何惟天降災祥在徳天或降災或降祥在徳之一與二三今嗣王新服厥命今太甲繼湯為王新服天命如衣被其服在身惟新厥徳惟當新己之徳終始惟一誠能終始惟一不變時乃日新是乃所以日新之道任官惟賢材任官以輔徳惟在擇賢材而用左右惟其人朝夕親密在左右惟在得其人臣為上為徳然後臣之所以為上者以其為君之徳期於致君者也為上去聲為下為民臣之所以為下以其為民期於澤民其難其愼人君任君民之責如此則君之擇人當難於未用之先不可以為易而妄進也謹於己用之後不可以為忽而小人或間之也惟和惟一惟所用皆君子則自然君臣之間可否相濟而惟和道同志合而為一矣徳無常師徳有仁義禮智信不同固無一定之師也主善為師然有似仁不仁似義不義惟主於善者可以為師善無常主人有長於仁而短於義工於禮而拙於智固無一定之主協于克一惟合於純一不變者可以為善之主俾萬姓咸曰由是發號施令可使萬姓皆稱誦曰大哉王言大哉王者之言又曰又稱誦不己曰一哉王心純一不變是為王者之心克綏先王之禄冝其宗廟饗之子孫保之而先王之禄自吾一徳而安永厎烝民之生各安居樂業而烝民之生自吾一徳而致嗚呼嗟歎七世之廟天子七廟三昭三穆與太祖廟可以觀徳親盡則毁其廟所以親盡不毁者以其有徳也非可以觀徳乎萬夫之長君一身為萬民之長長上聲可以觀政萬民心悦誠服無敢異議者以其政之善也非可以觀政乎后非民罔使君不得民則無所使民非后罔事民不得君則無所事無自廣以狹人人君無自以己為廣大而狹乎人苟以下民之微而狹小之匹夫匹婦則一夫一婦苟有寸善可使不獲自盡不得自盡其能矣民主罔與成厥功將見人主孤立寡聞誰與共成其功乎沃丁旣𦵏伊尹于亳此下皆逸書書亡序存沃丁太甲子伊尹旣没沃丁以三公禮𦵏于亳邑咎單遂訓伊尹事其臣咎單遂訓述伊尹平生之事作沃丁亡伊陟相太戊伊陟伊尹子太戊沃丁弟伊陟相佑太戊亳有祥亳邑有殀祥桑榖共生于朝二木共生于朝朝非生木之處伊陟賛于巫咸伊陟怪之以賛告于巫咸作咸乂四篇亡蓋告巫咸以自治之說太戊賛于伊陟太戊又以喿榖之災賛告于伊陟作伊陟原命二篇書亡原是臣名以言命原也仲丁遷于嚻仲丁太戊子自亳遷嚻作仲丁述遷都之義作仲丁之書亡河亶甲居相又仲丁之弟自嚻遷于相作河亶甲亡𫐠遷都之義祖乙圮于耿祖乙乂河亶甲之子遷居耿其後耿地為水所毁圮音痞作祖乙言為水所圮壞之事作祖乙之書亡尚書句解卷四
