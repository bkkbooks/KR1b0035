body:
  text: 尚書句解卷十元朱祖義撰君奭第十八周公召公輔相成王營洛邑洛邑既成周公復子明辟二公之心皆欲去矣成王既於洛誥中留周公召公不説周公之留周公又留召公故作比篇召公為保召公為大保文王世子曰保也者謹其身而輔翼之使歸於道也周公為師周公為太師文王世子曰師也者教之以事而俞諸徳也相成王為左右二公輔相成王實為之左右手如舜所謂臣作朕殷肱耳目召公不說召公欲告老而歸不悦周公之留周公作君奭周公於是作此書以留召公君奭舊簡楺題周公若曰公意若曰君奭奭以呼其名君以尊其身弗弔天不憫弔殷家弔的天降喪于殷天遂降下喪亡之道于殷殷既墜厥命殷家既隕墜其天命我有周既受我周家既受天命我不敢知曰我不敢知而言厥基永孚于休其周家基業長信有休祥否若天棐忱周既順天之道天亦輔周之誠我亦不敢知曰我亦不敢知而言其終岀于不祥其周家終有不祥否嗚呼君嗟歎呼君以告已曰往日汝已曽言時我人事是在我不在天我亦不敢寧于上帝命故我亦不敢以得上天之命為安弗永逺念天威乃不永逺思念上天之威越我民罔尤違乃使我民無尤怨違戾惟人亦惟在盡人事而已在我後嗣子孫在我成王之後子孫大弗克恭上下大不能恭敬天地遏佚前人光遏絶佚失文武光明之徳在家不知我退老在家有所不知天命不易則天命不可輕易天難諶天難信諶忱乃其墜命周家乃至隕墜其命弗克經歴不能經歴於久逺嗣前人恭明徳今欲使成王繼文武而敬行其明徳在今予小子旦當任其責非克有正非能别有正道以訓成王迪惟前人光所以啓迪之者惟以文武光明之徳施于我沖子施其訓于我沖㓜之子成王又曰天不可信周公既言天難忱於此而又言天本不可信我道惟寧王徳延我言惟安天下之王武王之徳可以延天徳及於後人天不庸釋于文王受命故天不用忘文王其初所受之天命遂延及武王又延及成王而不替也公曰君奭周公又呼召公而告之我聞在昔成湯既受命我聞在古成湯既受天命為君時則有若伊尹其時則有如伊尹輔佐成湯之徳格于皇天足以感格上天在太甲太丁子成湯孫時則有若保衡伊尹居保衡之職衆頼以安平在太戊太甲之孫時則有若伊陟臣扈格于上帝伊尹子陟與臣扈輔相太戊之徳足以感格子上天巫咸乂王家又有巫咸冶王家之事在祖乙河亶甲之子太戊之曽孫時則有若巫賢其時則有如人臣名巫賢在武丁盤庚弟小乙之子名武丁號髙宗時則有若甘盤其時有如甘盤率惟兹有陳此巫賢甘盤皆率循前代諸臣有功業陳列於上者保乂有殷用以保安乂治殷之天下故殷禮陟配天所以殷家得舉祀天之禮升配于天為天子多歴年所子孫至於長有天下天惟純佑命天於是純一佑助眷命商家則商實百姓故使商家人材富盛内而百官族姓之中有如前五六大臣者王人罔不秉徳明恤以至凡在王朝之人無不秉持其徳以明其憂國之事小臣屏侯甸外而小臣亦無不籓屏與侯甸之服屏餅矧咸奔走況又皆奔走服役也惟兹惟徳稱惟於此惟徳之是舉用乂厥辟以乂治其君之事辟壁故一人有事于四方故一人苟有所施為於四方若卜筮如卜龜筮蓍罔不是孚四方之民無不是而信之公曰君奭又呼召公告之天壽平格天所以壽商家使之長久者以君臣能和平其民使至於善保乂有殷故乂安治有殷天下而夀其國脉有殷嗣天滅威其後嗣紂不能平格不為天所保所乂故天㓕之以威今汝永念今召公若能長以商家享國長短為念且留輔成王則有固命則周家享堅固之天命厥亂明我新造邦其治功當顯明於我新造之邦時新作洛邑成王新即辟公曰君奭又呼召公告之在昔上帝割在昔上帝割絶殷命申勸寧王之徳又重勤勉武王修徳其集大命于厥躬乃衆集有天下之大命于武王之身惟文王尚克修和我有夏惟文王當來庶幾能修治夑和我所有之諸夏者亦惟得五人之用亦惟有若虢叔王季之子有若閎夭有若散宜生有若泰顚有若南宫括五人相與輔賛也又曰公又言無能往來使當時無此五人往來反覆兹迪彞教於此啓迪文王以五當之教文王蔑徳降于國人文王亦無徳降及於國人亦惟純佑秉徳亦惟天純一佑助文王故生此五賢佐皆是乗持其徳之人迪知天威明知上天可畏之威所在乃惟時昭文王於是昭顯文王之徳迪見冒聞于上帝遒迪文王使其徳著見於上覆冒於下遂能升聞於上天惟時受有殷命哉文王於是受有殷之天命武王惟兹四人至武王時虢叔死惟得此四人尚迪有禄猶尚啓迪武王使終有天禄後暨武王其後遂與武王俱起誕將天威大行天威咸劉厥敵皆殺其敵如紂者惟兹四人昭武王惟冒丕單稱徳此四人又昭顯武王之徳使覆冒於天下大盡稱頌武王之徳今在予小子旦若游大川今旦身任重責如游大川之中險而難濟予往暨汝奭我自今以往與汝召公奭其濟小子其濟渡小子成王於大川之中同未在位輔賛之誠亦如成王未在位之時誕無我責其任甚重大無責我留汝收罔朂不及召公倘果於去國收藏韜晦無能勉其所不及耇造徳不降則是國之老臣造徳在躬不肯降下及民耉苟我則鳴鳥不聞我則不聞鳴鳯之祥矧曰其有能格其敢言有至治之極公曰嗚呼君稱召公而告之肆其監于兹當監視於此我受命無疆惟休我周受天命雖有無窮之休美亦大惟艱亦大有艱難之事告君乃猷裕我今告召公當謀寛裕其心不可褊窄我不以後人迷我與汝共輔成王一出於正則後人循守不至迷惑公曰前人敷乃心乃悉命汝周公謂文武昔日敷布其心腹之言悉命於汝作汝民極使汝作起汝民之中道曰汝明朂偶王故周公又告召公以汝當明明勉力與我匹合輔佐成王在亶乗兹大命於於誠信行此武王大命惟文王徳惟法文王之徳丕承無疆之恤且勊留以大承今日國家無疆界之憂恤公曰君尊稱召公為君告汝朕允謂我告汝皆中心之信然者保奭又稱其官呼其名而告之其汝克敬汝聽我言須克敬不輕忽以予監于殷喪大否以我所言監視殷家之喪亡大可鄙惡否缶肆念我天威遂念我國家今已平治然天威可畏予不允惟若兹誥予若不信何故如此惟多言告汝予惟曰我意惟言襄我二人所以賛襄欲成文武二人之功汝有合哉汝當與我合心協力言曰而汝乃有言曰在時二人天休滋至在是文武二人之時聖徳上感於天天之休美多至於時惟時二人弗戡惟是文武受之有所不勝其汝克敬徳汝今惟能敬修其徳明我俊民顯明我國家或有俊民在下未舉者以待他日之代已在讓後人于丕時在讓後人于昌大之時若今日欲去未可也嗚呼又嗟嘆告召公篤棐時二人我式克至于今日休我與汝厚輔文武二人故我周家用至于今日之休美我咸成文王功于不怠我二人猶當皆勉力成文王未成之功不可倦怠丕冒海隅出日必使周家之治大覆冒于海隅日出之邦罔不率俾無不率從惟我所使公曰君周公又更端呼召公為君而言予不惠若兹多誥予若不順於理何為如此多誥予惟用閔于天越民我惟用閔念天之於民未嘗不愛之汝不可便退而不念此也公曰嗚呼君又歎而尊召公告之惟乃知民徳惟汝知斯民之徳亦罔不能厥初亦無不能勤其始惟其終惟善終則難亦如召公善終如始也祗若兹汝惟敬順我此言往敬用治自今以往以敬而用治乃是終始如一矣蔡仲之命第十九武王崩周公攝政羣叔流言挾武庚作亂周公以王命正三叔之罪囚蔡叔于郭鄰其子仲克庸祗徳周公告諸王而封之蔡以續蔡叔之後故作此篇蔡叔既没没死也王命蔡仲踐諸侯位成王命蔡仲履諸侯之位行諸侯之事作蔡仲之命作此書以告之蔡仲之命舊簡所題惟周公位冢宰公居太宰之位正百工董正百官羣叔流言管叔蔡叔霍叔流言於國曰公將不利於孺子乃致辟管叔于商管叔罪重以法誅殺囚蔡叔于郭鄰蔡叔罪輕於管叔止囚於中國之外地名郭鄰囚者制其出入以車七乗古者一里之地出車一乗乃七里之地身未死不可使不食必有以養之降霍叔于庶人霍叔罪又輕於蔡叔止降而為庶人三年不齒三年之間不得與兄弔敘齒列三年後則齒之矣蔡仲克庸祗徳蔡叔子仲能用敬修一己之徳周公以為卿士周公舉以為己所封國之卿士叔卒蔡叔死乃命諸王公以蔡仲命之於王邦之蔡周之於蔡繼父之國王若曰公以王命告謂成王之意言曰小子胡小子者年尚少胡仲之名惟爾率徳改行惟爾循文武之徳改蔡叔之行克愼厥猷能謹行其道肆予命爾侯于東土故我命爾于王室之東為守土諸侯往即乃封敬哉往就汝所封之國其可不敬哉爾尚葢前人之愆爾庶幾欲掩葢前人之過惟忠惟孝惟忠孝可掩父之罪爾乃邁迹自身又勉仲逺汝父所行之迹當自汝身始克勤無怠又將之以勤而無怠惰以垂憲乃後用能垂法於後世葢蔡叔已不足去率乃祖文王之彞訓當率循爾祖文王之常訓無若爾考之違王命莫復如爾父蔡叔之違背王命皇天無親勿謂汝父有罪天不輔汝葢皇天無親疎惟徳是輔有徳者必輔之民心無常勿謂汝父有罪民不懷汝葢民心無常惟惠之懷有恩惠則懷恭為善不同天下之善多端為善雖不同同歸于治而同歸於致治為惡不同天下之惡雖不同同歸于亂而同歸於致亂爾其戒哉善惡一分治亂立應可不戒哉愼厥初謹其始之所行可為善不可為惡惟厥終為善於始又為善於終終以不困終不困廢而歸於治不惟厥終為善於始而不為善於終終以困窮則終於力困計窮而歸於亂矣懋乃攸績勉汝所立功績睦乃四鄰和睦汝四鄰之國以蕃王室勉汝之功則蕃屏王室在此矣以和兄弟和汝四鄰則和兄弟之國在此康濟小民於康安小民之居濟成小民之業者率自中當率循大中之道而行之無作聰明亂舊章無作一己聰明喜功生事以紊亂舊日之章程詳乃視聽詳審汝之視聽不可視非禮之事不可聽無稽之言罔以側言改厥度無以邪側之言改易其法度則予一人汝嘉予將汝嘉美而不汝棄矣王曰嗚呼小子胡嗟歎呼名而告之汝往哉汝自今以往無荒棄朕命無荒忽以棄我之言成王東伐淮夷此孔子序成王政之書謂淮夷叛成王東伐之也遂踐奄遂烕奄國作成王政史官作成王政一篇書成平也平淮夷以為王者政令也書亡成王既踐奄此孔子序將蒲姑之書謂成王既滅奄國將遷其君于蒲姑將徙奄君於蒲姑之地使之邇王室之化周公告召公周公以遷奄君於蒲姑之意告召公作將蒲姑遂作將蒲姑一篇書亡多方第二十成王當伐奄之後歸于鎬京告四國多方併及天下諸侯謂周家得殷之天下實出於天命非以人力取之故作此篇成王歸自奄成王自伐奄國而歸在宗周歸在鎬京謂之宗周宗尊也言周家為天下所尊誥庶邦以諸侯來朝於鎬京因而誥衆邦之諸侯作多方遂作此篇多方舊簡所題惟五月丁亥記其日王來自奄自伐奄國而來至于宗周至於鎬京周公曰公言王若曰周公以王命言猷猷道也告爾四國多方以道告管蔡商奄四國及四方諸侯惟爾殷侯尹民併告爾殷國諸侯與正民之官我惟大降爾命我惟大降下教命告汝以周家得殷天下實出天命非以人力取之者屢矣爾罔不知汝等無不知之洪惟圖天之命今汝等人惟圖度天命妄料天命未必在周弗永寅念于祀乃相扇復叛不能長永敬念爾侯國有宗廟社稷之祀自取誅夷則夷宗絶祀惟帝降格于夏豈不見當時天降災異至于夏桀使之知畏而改過有夏誕厥逸夏桀大為逸樂不肯慼言于民不肯出憂戚之言于民乃大淫昏乃大淫亂昏蒙不克終日勸于帝之迪不能終一日勉行天道乃爾攸聞此有夏之徳乃爾之所聞厥圖帝之命桀亦以己意圖度天命謂天命必在於己不克開于民之麗乃不能開示民之所附麗者葢君仁則仁君義則義君之所行即民之所附麗者也麗離乃大降罰乃大下刑罰之威崇亂有夏以増重其亂于有夏之國因甲于内亂天下亂因始于内先亂不克靈承于旅不能以善道承順衆民使趨於善罔丕惟進之恭洪舒于民不能大淮進用恭徳之人以大舒緩於天下之民謂迫促之也亦惟有夏之民叨懫日欽桀於有夏之民凡貪叨而憤懫者曰日而欽敬之叨韜懫致劓割夏邑使之在位在職割害天下如劓鼻然劓乂天惟時求民主天於是别求可為民主者乃大降顯休命于成湯乃大降下明美之命於湯刑殄有夏使用刑以殄絶有夏惟天不畀純則天之不畀於夏者亦純一而不變矣乃惟以爾多方之義民不克永于多享乃惟桀用爾多方有義之民則易斥絶不能長永與之多享於民上謂不使久於其位也惟夏之恭多士惟桀所敬用之衆大不克明保享于民大不能明保享于民之道徒安受寵榮不能治民乃胥惟虐于民乃相與為暴虐以加于民至于百為甚至百端所為大不克開皆不能開明謂事事暗昧乃惟成湯湯興克以爾多方能用多方之衆簡代夏作民主大代夏為民主愼厥麗乃勸謹修民之所附麗者在於善以為民之勸厥民刑用勸其民取法於湯亦取勸勉於善以至于帝乙自湯以至帝乙罔不明徳愼罰家法相傳無不明顯其徳謹用其罰亦克用勸民亦能勉於善要囚殄戮多罪亦克用勸雖多罪之人要勒拘於獄而殄戮之民服其刑之當亦能用至勸勉要腰開釋無辜亦克用勸無罪之人開解釋放之亦能用至於勸謂商之賢君皆能勉民於善刑之釋之無有不勉於善今至于爾辟爾君紂也辟壁弗克以爾多方享天之命失民心遂失天命是不能用民以受天命嗚呼王若曰周公先自歎而後稱王命誥告爾多方謂我為誥文以告爾多方諸侯非天庸釋有夏非天庸釋有殷桀與紂所以亡者非天用廢夏殷而不祐之也乃惟爾辟紂也以爾多方大淫圖天之命用爾多方大為淫泆之事以圖度天命謂天命之在我屑有辭其罪惡所以屑屑有可舉之辭也乃惟有夏此詳言天釋有夏之君桀圖厥政不集于享圖謀政事不成于享天命之意天降時喪故天降是喪亡於桀有邦間之使能有邦國者間而代之謂湯伐夏乃惟爾商後王此詳言天釋爾君紂逸厥逸逸其所逸葢淫泆之事非人君所當為者紂乃逸之圖厥政故所圖謀其政不蠲烝不能蠲潔其身以進於善天惟降時喪故天降是喪亡於紂惟聖罔念作狂為聖人不能念念於為善則為狂人惟狂克念作聖為狂人能念念為善則為聖人天惟五年紂狂甚矣天猶以為萬一克念亦可以聖故遲以五年之久須暇之子孫須待寛暇此湯子孫如紂庶其改悔念於善之此也猶言之人也之徳也誕作民主奈何五年之間雖紂大為民主罔可念聽無一言之可念無一善之可聞天惟求爾多方天惟是求於多方之中視其有徳者大動以威開厥顧天大震動以天威以開迪其能顧諟天意者將以用之惟爾多方罔堪顧之而爾多方又無有能顧天者惟我周王謂文武靈承于旅善承奉于衆民克堪用徳能任用於有徳惟典神天故可以主神天之祀為天子天惟式教我用休天於是陰誘文武以休美凡諸福之物可致之祥畢至簡畀殷命大畀與以殷命尹爾多方使正爾多方之衆而為君今我曷敢多誥今我何敢多為誥命以告汝我惟大降爾四國民命我惟大降爾四國民之生命謂汝等屢叛義當誅滅我以不忍殺故與汝等生命爾曷不忱裕之于爾多方爾曷不深信我命奉行之以寛裕饒益於多方爾曷不夾介乂我周王爾何不夾輔介助治道於我周王也享天之命以享受上天之命今爾尚宅爾宅據汝罪在誅戮我周撫汝以恩使汝尚猶居爾所有之宅畋爾田治爾所有之田畋田爾曷不惠王熙天之命爾何不順從王政以明天之命爾乃迪屢不靖爾今乃行其惡屢為不靖之行爾心未愛是汝心未知自愛爾乃不大宅天命爾乃不肯大安其天命之當然爾乃屑播天命爾乃屑屑播棄其天命爾乃自作不典爾乃自為不常之事圖忱于正乃欲謀信其正道而行之安有是理我惟時其教誥之我惟時時教汝告汝我惟時其戰要囚之告教不從又時時驚戰汝以要勒拘囚之威使知畏要腰至于再至于三誥教要囚再三如此乃有不用我降爾命乃有不用我所降與汝之生命復敢叛逆我乃其大罰殛之我乃大罰誅殛於汝非我有周秉徳不康寧非我周家秉持其徳不務安康而殛殺汝乃惟爾自速辜乃汝再叛自召其罪王曰嗚呼王又嗟言猷告爾有方多士以道著告天下暨殷多士及殷衆士今爾奔走臣我監五祀今爾等多士自周公東征奔走臣服於我所立之監已五年矣監為諸侯監民者越惟有胥伯小大多正及汝等多事其中有衆胥之長與小官之正大官之正爾罔不克臬無有不能守法者臬齧自作不和爾惟和哉汝室家之内如父子兄弟或為不和汝當有以和之以汝為官長能守法當以正率人也爾邑克明汝若能此則汝所君之邑必能至於明矣爾惟克勤乃事亦由汝能勤其事之所致爾尚不忌于凶徳汝庶幾不諱忌乎凶惡之徳謂無凶惡可諱忌也亦則以穆穆在乃位亦是汝能用至敬而在位克閲于乃邑謀介汝能閲視汝邑而治之謀以介助於王室爾乃自時洛邑汝多士乃自此洛邑改過遷善尚永力畋爾田庶幾可以永逺盡力以治爾所有之田天惟畀矜爾天亦將畀與爾以福而憐矜爾我有周惟其大介賚爾我周亦惟大介助爾修徳而賜賚爾迪簡在王庭汝修徳既成我又將行簡擢之典列在王庭為官尚爾事加汝以職事有服在大僚使有所服行於大僚不特食邑於洛而已王曰嗚呼多士又歎而呼多士告之爾不克勸忱我命汝等若不能勸勉以誠信行我教命爾亦則惟不克享則是汝等不能奉上凡民惟曰不享凡民亦將化汝所為惟曰不復享上爾乃惟逸惟頗則是汝等自為縱逸自為頗僻頗坡大逺王命大逺棄於王命則惟爾多方探天之威是爾多方之士自探取天之威罰我則致天之罰我於是致行天罰於爾身離逖爾土又將逺徙使不得享土田之樂王曰王既以恩誘之又以威懼之又繳前説而曰我不惟多誥我本不欲多為言語告汝我惟祗告爾命我惟敬告汝以命葢前言有簡在王庭之賞又有離逖爾土之罰乃是汝禍福之所由分又曰言既竞又告之時惟爾初不克敬于和我所以東征者非我之罪乃是爾等於其初不能敬修為和至乖戾犯我則無我怨皆是汝等自取不當怨我立政第二十一周公戒成王以用人之事不曰用人而以立政名篇葢謂得人則政自立周公作立政立政周公若曰公意若曰拜手稽首致敬盡禮解見召誥告嗣天子王矣告成王以任人之道以其繼天子為王與㓜小不同用咸戒于王盡皆舉任人之道戒成王曰王左右常伯在王左右朝夕親近者大則有常伯牧民之長常任任事之公卿準人守法之有司綴衣小則有綴衣掌王衣服虎賁以武力事王皆當謹任之賁奔周公曰嗚呼歎言休兹知恤鮮哉美此用人之道能知以此為憂而不輕於任用者亦少鮮蘚古之人迪惟有夏古之人能行於此而以任用之道為憂者惟有夏之君禹乃有室大競乃有夏所以大強盛者籲俊尊上帝能呼招賢俊使處天職治天事而尊事上天之命在此迪知忱恂于九徳之行於是行知人之明以誠信在九徳之人乃敢告教厥后故有夏之臣方敢進用人之戒於君曰言拜手稽首后矣我致恭盡禮大能明於任周以盡君道者曰宅乃事惟曰居乃事之職者以有常任之才宅乃牧居乃牧之職者必有常伯之才宅乃準居乃準之職者必有凖人之才兹惟后矣三宅各得其人此乃可盡為君之道謀面用丕訓徳又謀之於人面之於已以求夫大順徳之人則乃宅人然後可以宅人兹乃三宅無義民桀不能以禹為法於此三宅之中無有義民知義理者桀徳惟乃弗作桀徳於是不能興作使徳日起而大有功往任是惟暴徳罔後自是以往任用皆暴亂凶徳之人宜滅亡而無後也亦越成湯陟及湯升為天子丕釐上帝之耿命大能保上帝之明命而不失者乃用三有宅乃在於用已用之三宅人乃事乃牧乃凖也克即宅各就其職以供乃事曰三有俊又論未用之三俊可待此三者之用者克即俊果能就其俊謂其才副所稱説嚴惟丕式成湯之時既用其人又嚴而思之大以其人為法克用三宅三俊所以能用三宅三俊之賢其在商邑故宅俊在商邑用協于厥邑近而商邑之民用和協于其邑其在四方宅俊在四方用丕式見徳逺而四方之民用大法其所見之徳嗚呼公又歎言其在受徳暋其在紂徳昏蒙暋敏惟羞刑暴徳之人所進皆淫刑暴徳之人同于厥邦與之同治其國乃惟庶習逸徳之人同于厥政又與衆慣習於縱逸之徳者共治政事帝欽罰之天於是敬罰之見天不輕罰也乃伻我有夏紂既喪國天乃使我周冇華夏之國伻絣式商受命周既得國乃法成湯所以受天命之心在於用宅俊之賢奄甸萬姓以盡治萬姓亦越文王武王及文王之興克知三有宅心能知己用三宅之心灼見三有俊心灼見㸦用三俊之心以敬事上帝上天生賢之意文武能當其意矣此乃敬事上天之命立民長伯故立夫民長伯之官即常伯也以治民為職立政任人立夫政任人之官即常任也以治事為職準夫牧立夫凖夫牧之官即準人也雖以平法為職不專任法以齊民又有仁政以養民作三事任此三職者所以為此三事也此三職在夏謂之乃事乃牧乃凖在文武謂之民長伯政任人準夫牧至成王謂之常伯常任凖人葢時既不同官名亦隨時而變虎賁以武力衞王者賁奔綴衣掌王衣服者趣馬掌馬者趣七口小尹小官之長左右攜僕在王左右執持器物之臣百司若司裘司服之屬庶府若内府大府之屬以見文武之時近而在國室朝廷之上者無不得人也大都小伯大都之内有小伯以愛養民民於都鄙亦如朝廷常伯藝人以才藝任事於都邑亦如朝廷常任表臣執法於都鄙以表倡其民亦如王朝凖人百司在都鄙之百官有司大史即周禮大史掌邦之六典八法八則之貳者都鄙亦有之尹伯正民之長官庶常吉士衆有常職之善士葢統包都邑之衆官以見文武之時都邑之間皆得人司徒司馬司空亞旅外而侯國大國三卿如司徒司馬司空與夫為亞夫者為旅士者亦無不得人夷微盧烝三亳阪尹逺而蠻夷之内屬如夷微盧三國之衆及三亳之地歸文武者與凡阪險之地者文武皆置官以严正之其官亦無不得人阪反文王惟克厥宅心文王能善處其心詐偽不能亂邪佞不能惑乃克立茲常事司牧人乃能立此常事之官即任事之臣若常任是也立比司牧人即養民之官若前所謂常伯也以克俊有徳此兩官皆是能俊而有徳者文王罔攸兼于庶言庶獄庶愼文王既得人而任之故無所兼于衆謀謨議論之職衆聽斷獄之事衆機密謹重之事惟有司之牧夫惟以委之在朝而有司存者與在外而養民者是訓用違事在有司牧夫有當用而從有不當用而違文王皆一一順之庶獄庶愼文王罔敢知于兹文王非特罔知且罔敢知非特兼之不敢且知之亦不敢以見文王用人之專亦越武王亦及武王率惟敉功欲率循思惟文王敉寧天下之功敉亡俾不敢替厥義徳必不敢廢文王之義徳如爰整其旅以過徂莒即為敉寧之功率惟謀欲率循思惟文王逺大之謀從容徳必有以從文王含容之徳如三分天下有其二以服事殷即為逺大之謀以並受此丕丕基卒其伐功則武王之義徳即文王之義徳偃武修文則武王之容徳即文王之容徳故文武並受此大而又大之基業嗚呼周公歎言孺子王矣孺子今已為王矣繼自今我其立政自今以始政必由我而立立事常任也準人即凖人牧夫常伯也我其克灼知厥若亦必自我能灼知其順行之所在丕乃俾亂然後乃大使之為治相我受民相助我所受民於天和我庶獄庶愼和諧我衆刑獄衆謹愼之事時則勿有間之是則不以已間之即罔攸兼罔敢知之意自一話一言自是雖一話言之須我則末惟成徳之彦我則終思夫成徳之俊彦而用之以乂我受民以治我所受民於天嗚呼公又歎言予旦已受人之徽言予旦所言皆是聽受人之美言咸告孺子王矣今皆告孺子使知為王之重矣繼自今文子文孫繼自今以往凡為文王之子孫者其勿誤于庶獄庶愼皆不誤于庶獄以人命所係不誤于庶謹以機密所關惟正是乂之惟擇正直之士是冶之自古商人自昔商王亦越我周文王立政與我周文王所以立政者立事牧夫凖人其於立事牧夫準人三宅之官則克宅之則能居之於位克由繹之則能紬繹反覆審而又審惟恐非人兹乃俾乂於此乃可使之為治國則罔有立政為國家而不能有以立其政者用憸人不訓于徳以其用憸佞之人不順于徳者憸纎是罔顯在厥世故人主於是亦無顯名在其世繼自今立政繼自今以往所以立政事者其勿以憸人其勿以憸佞之人其惟吉士惟用吉徳之士用勱相我國家用之使勉力相助我國家今文子文孫今文王之子孫孺子王矣如成王已為王矣其勿誤于庶獄不可誤于庶獄人命所係惟有司之牧夫惟謹擇有司牧夫主於養民者使任夫刑罰至畏之中有至愛者存其克詰爾戎兵兵亦刑之大者成王又當自治爾戎兵之事不可分其權於人以陟禹之迹故兵權所用惟升大禹治水舊迹止乎五服之内以窮兵逺討為戒方行天下而兵威所及始行乎天下之廣至于海表以至四海之外罔有不服無有不服以覲文王之耿光由此可見文王明徳之光所及者逺耿古幸反以揚武王之大烈可以發揚武王之大功葢武王定天下今成王復能撫萬邦足發其潛徳之光嗚呼公又歎言繼自今後王立政繼自今成王而後凡繼王立政事者其惟克用常人其惟能用有常徳之人好竒立異者不可用周公若曰公之意若曰太史即周禮太史掌邦之六典者法八則其職在於掌法司寇蘇公為武王之司寇者蘇忿生其職在於用法式敬爾由獄用能敬其所用之刑獄以長我王國故時無寃民而王國之祚於是長久也兹式有愼今我於此亦惟用能敬愼刑罰以列用中罰凡獄訟之用皆條列其罪狀不欲加之以刑而必用罰非特用罰必用中罰不至於過不至於不及尚書句解卷十
