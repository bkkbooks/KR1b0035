  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0035_WYG_013-1a, image: WYG0062/WYG0062-0991c.png}
body:
  text: 尚書句解卷十三元朱祖義撰文侯之命第三十幽王為犬戎所殺平王東遷文侯扞王于艱有大功平王錫之以秬鬯圭瓉故作此篇平王錫晉文侯秬鬯圭瓉晉文侯乃唐叔之後也名仇字義和薨謚文侯有功王室平王予之以秬鬯圭瓉使得祭祀此諸侯之盛禮非有大功不足以當此曰平王錫是知禮樂自天子出秬黑黍鬯鬱金香草以鬱金釀和黒黍為酒圭瓉以玉為勺柄所以酌鬱鬯祼地以求神也秬巨鬯暢瓉才但反作文侯之命遂作此書文侯之命竹簡所題王若曰父義和天子稱同姓諸侯曰伯父叔父親之也義和文侯之字不名而字尊之也丕顯文武言大顯明之徳者文玉武王克慎明徳能謹慎修明其徳昭升于上其徳上則昭然登升于天敷聞在下下則敷布其聲聞于民惟時上帝集厥命于文王惟是上天集其命於文王之身以有天下亦惟先正克左右昭事厥辟亦由先世為百官之長如周召毛畢居其左右顯然承事其君越小大謀猷故其或謀小事或謀大事罔不率從人無不相率順從平王謂今日之難由無賢臣所致也肆先祖懷在位故我之先祖自成康以下安然在天位為天子嗚呼閔予小子平王歎傷我小子嗣造天丕愆今日繼幽王而立乃遭天降大咎幽王為犬戎所殺殄資澤于下民殄絶斯民所資藉之徳澤而不加于下民侵戎我國家純所以夷狄得侵伐我王國如此之大即我御事即今我治事之臣罔或耆壽無或有老成更事者俊在厥服與俊而有才徳者在位服其事予則罔克予又無能不足勝任曰我之所言惟祖惟父惟同姓在祖父行者是頼其伊恤朕躬其誰能憂我身之陷於天變而力救之歟嗚呼有績予一人歎同姓諸侯在祖父之行者誠有功在我一人永綏在位我庶幾得長安在位父義和平王又呼而告汝克昭乃顯祖汝能昭明汝顯祖唐叔之訓汝肈刑文武汝之身始能法文武之道用㑹紹乃辟用能會合繼續汝君於文武而無愧追孝于前文人使繼志述事追孝於前文徳之人汝多修扞我于艱戰功曰多汝文侯多所修治以扞衛我於艱難之中若汝予嘉如汝者我實嘉善其功績王曰父義和又呼而告其歸視爾師其歸晉國臨視爾之衆民寧爾邦安寧爾之邦國用賚爾秬鬯一卣賚予以秬鬯一中尊使得以祭祀其祖葢非上之賜則諸侯不敢用此禮卣由彤弓一赤色弓一彤矢百赤色矢百盧弓一黒色弓一盧矢百黒色矢百諸侯蒙弓矢之賜始得專征伐馬四匹馬四匹為一乗父往哉父以尊之往之汝國柔逺能邇欲懷柔逺人當自能懷邇人始惠康小民惠愛安康小民無荒寧無荒忽自安簡恤爾都簡閲其士惠愛憂恤其民於爾都國之中用成爾顯徳成爾明徳費誓第三十一伯禽諸侯其書得附帝王之後以精於治兵庶幾王道孔子存之費魯東郊之地伯禽方就侯國徐戎淮夷遽興兵侵伐伯禽誓師於費以禦之也魯侯伯禽魯國諸侯名伯禽周公之子宅曲阜始居魯國曲阜之地徐戎並興徐戎淮夷並興兵侵伐魯東郊不開二種作亂於魯東境故魯東郊外捍禦之門閉而不開作費誓伯禽誓師作此書費泌費誓竹簡所標公曰伯禽言嗟人無譁聽命咨嗟衆人無喧譁靜以聽我命徂兹淮夷徐戎並興往者居此淮浦之夷徐州之戎並興為寇善敹乃甲胄善簡擇汝甲以衛身胄以衛首敹聊敿乃干干楯也安國謂施汝楯紛紛如綬而小繫於楯持之以為飾敿矯無敢不弔無有一事敢不極其至弔的備乃弓矢古者毎一弓百矢其數欲備足鍛乃戈矛戈矛以金為刃則鍛鍊之礪乃鋒刃凡有鋒刃皆磨礪之無敢不善無有一事敢不盡善今惟淫舍牿牛馬軍中牛以負載馬以駕車今惟行軍所在必大放舍所牿之牛馬而牧之牿梏杜乃擭擭者郊野之民設機捕獸必杜塞之擭胡化反敜乃穽穽者掘地以陷獸當窒斂之敜捻穽阱無敢傷牿無敢以擭與穽傷損我所牿之牛馬也牿之傷汝則有常刑不杜不斂傷所牿牛馬汝郊野之民皆有常刑馬牛其風馬迎風而馳牛順風而走相奔逐也臣妾逋逃男賤為臣女賤為妾或因罪而逃走勿敢越逐皆不得踰越軍壘求逐之祗復之其有得牛馬臣妾者敬而還之有此隊奔至它隊者敬而還之我商賚汝我當商度其功而賞賚爾乃越逐不復乃有踰越軍伍逐牛馬臣妾而不復還汝則有常刑汝軍民皆有常刑無敢寇攘軍人無敢為寇攘劫掠踰垣牆或有踰過垣牆竊馬牛誘臣妾竊人馬牛説誘人臣妾汝則有常刑汝軍人有常刑甲戌日也我惟征徐戎我惟征伐徐戎征者正也正其罪也峙乃糗糧凡在軍者儲峙汝之糗糧乾糧也或謂熬大豆及米或謂熬米麥其實則一糗去九反無敢不逮無敢有不及者苟有不及則軍必乏食戰必不力汝則有大刑則加汝以大刑死罪魯人三郊三遂大國三軍故三郊三遂郊即郷也國外為郊鄉外為遂謂魯人居於郊遂者峙乃楨榦儲峙汝築城之具所立之木謂之楨當旁障土者謂之榦甲戌我惟築我惟築城壘夫伯禽以甲戌日征徐戎復以是日築城壘慮其或不可勝而預為捍禦之計且攻且守是為萬全之策也無敢不供無敢有不供應者苟不供此楨榦有妨版築之功使徂征之舉或有疎失捍禦無策一敗塗地為害非常汝則有無餘刑非殺隊伍皆有刑責犯者多不可勝誅故不殺也魯人三郊三遂峙乃芻茭居於郊遂者各儲峙芻茭以供牛馬茭交無敢不多汝則有大刑芻茭不繼則車疲馬劣亦能致敗故供之不多亦服大刑秦誓第三十二秦穆公之貪利苟得至於喪師一辱悔過孔子取其書附於帝王之后以其能改過遷善帝王之門户也由此而進夫帝王亦不逺矣秦穆公伐鄭穆公始與晉文公伐鄭鄭與秦盟秦使杞子輩戊之杞子使告于秦曰鄭人使我掌北門之管潜師以來國可得也穆公訪諸蹇叔蹇叔不可穆公於是召孟明視西乞術白乙丙伐鄭晉襄公帥師敗諸崤師經於崤崤晉境也是時晉文公死襄公初立謂國有大喪而秦越境伐鄭師行不告襄公乃俟其師還帥師戰於崤澠敗其師而獲三帥崤爻還歸文嬴為三帥請使歸就戮于秦三帥還歸穆公素服郊迎嚮師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也穆公於此痛自懲艾作秦誓作此書秦誓舊簡所題公曰穆公曰嗟我士聽無譁嗟哉我朝廷之士當靜聽我誓無或喧謀予誓告汝羣言之首我誓告汝以羣言之先者莫先於悔過之言古人有言曰古人所言即羣言之首也民訖自若是多盤民之常情使人盡順己之所為則多樂如穆公違蹇叔而用孟明是樂孟明順己而惡蹇叔咈己矣其亦何異於民責人斯無難至於責人之咈己肆談無忌髙論不顧更無所難如穆公責蹇叔之咈己信無難色惟受責俾如流及受人之責使言者肆口而發如水流出吾甘心受之是惟艱哉是為難也如穆公當時受蹇叔之責豈不難哉我心之憂穆公自謂我前自不能受責至於敗衂其心懷憂思欲改過自新日月逾邁若弗云來深恐日月疾行不復再來而我改過無日惟古之謀人則曰未就予忌蹇叔執古義與我謀則曰未能就我闢土之功我實忌而惡之惟今之謀人姑將以為親杞子孟明等循今日一時之利與我謀我則姑且親而信之雖則云然穆公謂我所陳已過其言雖如此尚猷詢兹黄髮庶幾今所謀者皆詢問此黄髮之老如蹇叔者則罔所愆則終無所過失畨畨良士老成良善之士畨波旅力既愆雖筋力既衰目力耳力手力足力皆無用矣我尚有之我庶幾欲有此人而用之方是理也仡仡勇夫射御不違至若武勇之夫雖射弓御馬皆中法度而不違仡訖我尚不欲我庶幾不欲此等人惟截截善諞言其有察察然徒恃小惠又善為巧説之辭諞駢俾君子易辭使君子為之昡惑遷心改慮變易已之辭以從其言我皇多有之此等人我何暇多有之昧昧我思之我今日因敗衂之後昧昧然專一其志慮思其所以成敗之説如有一介臣如有一介然有守之臣斷斷猗無他技觀其外則斷斷然守善確乎不拔雖無他技能猗助語也其心休休焉其如有容究其中則休休自得無一毫妬賢害能之意其如能有所含容停蓄曰其如謂其中恢洪不可以定名也人之有技其見人之有技能也若已有之如己之有此技能人之彦聖人有美徳至於大而化之之聖其心好之其心好此人之善不啻如自其口岀不止如口之所言葢口之稱揚者有限而心之好慕者無窮啻耻是能容之是能容人之善者也以保我子孫用此人於朝廷則安國家定社稷綿大業於無窮其安保我子孫為如何黎民亦職有利哉不惟子孫蒙休為衆民者亦將于此而有利人之有技冒疾以惡之其有徒矜一己之長不能兼天下之善於人之技能則冒蔽疾害以惡之人之彦聖人有彦聖之徳而違之違背而抑遏之俾不達使不得達其名行其志是不能容如此之人胷懷卑陋豈能兼容天下之人以不能保我子孫用之則矜己制人敗喪國家亦何能安保我之子孫黎民亦曰殆哉衆民亦安得不危哉邦之杌隉杌兀隉齧曰由一人邦之所以杌隉而危殆者非他也乃由用一人之冒疾者也邦之榮懷亦尚一人之慶邦之所以榮華而懷安者非他也亦頼一人之慶謂用一人能容衆其安慶自然及之穆公悔過而思欲用者惟一人所不欲用者亦一人可謂悔過得其要矣夫子録之豈不在此也哉尚書句解卷十三
