body:
  text: 尚書句解卷八元朱祖義撰康誥第十一康叔文王子武王周公之弟成王叔父也武王克商立紂子武庚於衞乃紂之故都代殷後以治餘民武王崩管蔡挾武庚叛周公東征誅管蔡黜殷命然後以其餘民封康叔為衛侯告戒之辭至於再三史官録之以古者竹簡編書辭多非一簡所能載於是分為康誥酒誥梓材三篇成王既伐管叔蔡叔武王克商封弟叔鮮於管叔度於蔡監紂子武庚治餘民武王崩管蔡挾武庚以叛成王既伐二叔以殷餘民封康叔以殷餘民封康叔於衞都為衞侯作康誥首以書主於告康叔故謂康誥酒誥次以書説紂淫酒而民化之今日當有所禁止故云酒誥梓材終以書有若作梓材之言故取二字以名篇謂之梓材皆所以告康叔故共序康誥舊簡標題惟三月周公攝政七年之三月哉生魄月始明死魄生即十六日周公初基周公初造基址作新大邑于東國洛作新大邑都于王室東國洛汭之地四方民大和㑹四方民皆大和悦而來會侯甸男邦采衞侯甸男之邦及采與衞五服之諸侯皆在焉百工與所屬百官播民和播率其民之和悦者見士于周見而服其役事于周邦周公咸勤公因其來皆撫摩勞來而勤之乃洪大誥治乃推廣前日大誥諸侯以治東征之役者諭臣民王若曰周公謂成王之意若曰孟侯呼康叔為長侯朕其弟乃我之弟小子封㓜小之子名封惟乃丕顯考文王惟汝大明之父文王克明徳愼罰能明其徳以化民謹其罰以防民不敢侮鰥寡不敢侮慢鰥寡無告之民庸庸因其可用用之祗祗可敬敬之威威可刑刑之顯民以此至公之道昭示於民用肇造我區夏用能始造我周家區域之中夏越我一二邦以修於我西土一二侯邦歸順與我共修共治我西土惟時怙冒終則罄西土皆怙恃依賴其覆冒之恩聞于上帝由是其徳升聞于天帝休天於是嘉美之天乃大命文王殪戎殷天乃大命文王殪滅戎殷殪翳誕受厥命大受其天命越厥邦厥民及其國之民惟時敘皆得其敘無有不滿之望乃寡兄朂汝少得如此之兄武王又能勉懋繼文王而有天下肆汝小子封故汝小子名封在兹東土今得在此王室之東為守土之諸侯王曰嗚呼封呼康叔名汝念哉汝當念上文所陳文武積累之艱難今民將在祗遹乃文考今治商民大槩在敬述汝文德之父文王所為紹聞衣徳言紹而繼行其所聞衣而佩服其徳言衣去聲往敷求于殷先哲王往即乃封又敷布遍求殷家先哲之王所行善政善教用保乂民用以安治商之餘民汝丕逺惟商耇成人汝又大逺思惟商之老成人宅心知訓所以能處心而知訓民之道者别求聞由古先哲王又别徧求以審聞由行夏商以上古先智哲之王之道用康保民合是二者用安保康民𢎞于天所聞所求廣而充之一槩以天理若徳裕乃身順天賦自然之徳使綽然有餘裕於汝身不廢在王命則康叔所能仰副成王丁寧之意而在上之命可以不廢矣王曰嗚呼小子封嗟歎㓜小之子名封恫瘝乃身商民未化如有痛疚在汝之身恫通瘝官敬哉可不敬哉天畏棐忱天威雖可畏常輔人至誠民情大可見觀民情向背大可見天之輔不輔小人難保小民之情無常難安往盡乃心往汝衞國惟盡汝之心無康好逸豫無敢安然好為逸樂遊豫之事乃其乂民乃可以治民我聞曰我聞古人之言怨不在大民怨不在於大亦不在小亦不在於小皆足以召亂惠不惠惟順其所不順而逆民之事不敢為懋不懋勉其所不勉而在己之職不敢怠忽而後可以無怨矣已汝惟小子已矣乎汝惟㓜小之子乃服惟𢎞王應保殷民今汝所服行惟在於𢎞大王道以應殷民所欲而保安亦惟助王宅天命亦以輔助成王安處天命作新民作新商民舊俗王曰嗚呼封又歎而呼叔名敬明乃罰康叔雖封於衞實以衞侯為周司冦故成王戒以敬謹明審汝所用之罰人有小罪非眚乙人有罪小於甲然非如無目為眚而過誤為之乃惟終終於為惡不肯改悔自作不典式爾自為不合典常之事且曰法固當爾有厥罪小雖乙有罪小於甲乃不可不殺乃罪輕情重不可不殺乃有大罪非終乃甲人有罪大於乙然非終於為惡不悛乃惟眚災適爾乃如無目誤為天災適然如此既道極厥辜雖盡道以責之信所犯重而極其罪時乃不可殺是乃罪重情輕不可殺王曰嗚呼封又呼名以告有敘治有次敘時乃大明服於是大明政事之次序而行之惟民其勅懋和則民自然相勅正勸勉以趨於至和若有疾如汝身有病務調治之今推去病之術以去民惡惟民其畢棄咎則民盡棄惡而歸善若保赤子如赤子常加保抱撫養之恩今推保赤子之情以保民惟民其康乂則民皆躋治安之域非汝封刑人殺人刑殺固自有法非汝封得刑人殺人也無或刑人殺人然雖非汝得刑殺而汝為司冦又不可使刑殺不出於汝而假之或人也非汝封又曰劓刵人無或劓刵人又曰非汝封可以自劓刵人亦不可使劓刵人之事或出於他人而不出於汝封劓藝刵音餌王曰外事王所言皆叔為司冦所當謹之刑此言謹衞國之刑故以紂事列之汝陳時臬司王國之刑汝身任其責至外而衞國之事汝但當設是法官以治之臬齧師兹殷罰有倫治之之道則師兹殷先王罰之有倫叙者又曰要囚服念五六日又言囚辭考覈已得其要未可遽決當佩服思念至五六日至于旬時至於一旬十日又至一時三月丕蔽要囚然後大斷其囚獄之要辭王曰汝陳時臬事又言汝陳是刑法之事以治民罰蔽殷彞其罰必斷以殷之常法此周善矣用其義刑義殺然所斷又須用其刑之合於義殺之而合於義者勿庸以次汝封不可使法司觀望於汝遂屈法以就汝意乃汝盡遜乃汝所用刑殺盡順殷之常法曰時敘人言皆有次序矣惟曰未有遜事汝則言未有遜順之事已汝惟小子已矣乎汝康叔為㓜小之子未其有若汝封之心朕心朕徳惟乃知未有如汝心之明我心我徳惟汝知之謂我意先教化後刑罰凡民自得罪凡民自為不善得罪於天下者冦攘姦宄以其竊取為冦強取為攘外為奸媚以取人物為姦内懷詐欺以取人物為宄殺越人于貨殺人至死又違道毆人取人之貨財暋不畏死皆強而不畏死暋敏罔弗憝人無不惡之憝音隊王曰封又呼康叔名而言元惡大憝此等人實為大惡大可惡者矧惟不孝不友況如不孝不友尤可惡如下文所言子弗祗服厥父事為人子不能敬行其父之事大傷厥考心大傷害其父心于父不能字厥子為人父不能字育其子乃疾厥子乃疾惡其子于弟弗念天顯為人弟不思念天倫之明分乃弗克恭厥兄乃不能敬其兄兄亦不念鞠子哀為兄亦不矜念父母鞠養㓜子之可哀憐大不友于弟大不友愛其弟惟弔兹是皆上之教化有未至而民至於此弔的不于我政人得罪乃以為此皆凡民自得罪非于我政之人得罪天惟與我民彞大泯亂至於天之所與我民父子兄弟之常倫大泯絶壞亂曰且言乃其速由文王作罰刑汝其速用文王當時所作之罰刑兹無赦以如此亂常者無得赦之不率大戛是雖大戛害於民而民愈不率教矣戛結矧惟外庶子訓人況在外土為庶子而訓人者惟厥正人與乎為正人之官者越小臣諸節及小臣有符節者乃别播敷乃相與别出私意以播敷其教令造民大譽百端造作違道以要民之大譽弗念弗庸曽不念不用常道以訓民瘝厥君則上以病君之道時乃引惡下以長民之惡惟朕憝若此等人皆朕所惡已汝乃其速由兹義率殺已而汝乃速由此義皆誅殺之亦惟君惟長抑不思是亦汝康叔之為君庶子等為長不能厥家人不能先正其家人使父子有親長㓜有序越厥小臣外正乃與其小臣及在外為正人之官者惟威惟虐更相視效肆為刑威暴虐大放王命大廢棄其王命乃非徳用乂此乃非以徳而治民汝亦罔不克敬典今汝康叔當無不能敬行五常之道乃由裕民乃可以寛裕待民之自化惟文王之敬忌思文王當時所敬者在徳所忌者在刑罰乃裕民乃能寛裕待民之化曰我惟有及自言我思有及於文王之敬忌則予一人以懌則我一人心悦矣王曰封呼康叔言爽惟民未嘗不明者民之性迪吉康惟在上之人導迪於吉善安康之地我時其惟殷先哲王徳我時其惟法商家哲王之徳用康乂民作求可用以安治斯民者則作起而求之矧今民罔迪不適況今之民無有導迪而不往於善者不迪則罔政在厥邦不能導迪則是無善政在其國王曰王又呼叔告之封予惟不可不監我惟不可不監視古人已行之迹告汝徳之説告汝以明徳之説于罰之行與其謹罰之行今惟民不靜今民自武庚蠢動不安靜之後未戾厥心至今心未有所定止迪屢未同雖迪導之屢矣猶未和同純一爽惟天其罰殛我是我不能助上帝以綏四方用思天必降罰以誅殛我殛音棘我其不怨我其何敢以怨天哉惟厥罪無在大惟其罪初不在大以其生於微細也亦無在多亦不在於多以其生於寡少也矧曰況曰其尚顯聞于天由小必至大由少必至多積之不已尚將顯然聞於上天王曰嗚呼封敬哉王又呼康叔使敬下所言無作怨無作成民怨勿用非謀非彞不可用狂妄不謀之言與竒異不常之事蔽時忱斷以是誠丕則敏徳則可大法古人敏疾修德之心用康乃心用此以安汝心不汨外物顧乃徳用此以省汝徳而無失徳之累逺乃猷用此以逺汝謀不狥目前之利裕乃以民寧則優游睱豫不事督促而民乃自此安矣不汝瑕殄我何從求汝瑖疵而殄絶於汝王曰嗚呼肆汝小子封此肆字承上文而言上文自無作怨以下其事甚大故又嗟歎以見其事果大遂言肆汝小子封惟命不于常當知我命汝之言不能不常告汝汝念哉汝當念之不忘無我殄享無於我殄絶其奉上之意明乃服命明汝所服孟侯之命髙乃聽髙汝之耳以聽先王之格言用康乂民用此以安治其民王若曰此書前言王若曰後言王若曰中皆言王曰所以見成公之言謂成王之意若曰往哉往汝衞國封呼叔名勿替敬典當勿廢我在前敬典之命而敬行五常之道以治民聽朕告汝聽我所以告汝之言乃以殷民世享則汝以殷民世世享有衞國由子及孫矣酒誥第十二紂好淫樂為長夜飲民化之無不沈湎于酒觀泰誓謂淫酗肆虐臣下化之則上下皆湎於酒可知矣今紂雖滅而餘習則未殄成王以其餘民封康叔所最急者此耳酒誥竹簡所標題王若曰亦周公之言謂王之意若曰明大命于妹邦妹衞地紂所都故名妹邦康叔今日不可不明施至大之教命于此邦以禁民崇飲乃穆考文王汝豈不知汝敬徳之父穆穆文王肇國在西土當日繼王季始有國在西方岐地之時厥誥毖庶邦庶士所以作誥我庶衆國之君及上中下之衆士越少正御事及官之副貳如小司馬小司冦之類及諸治事之官朝夕曰其朝夕訓飲惟言祀兹酒祭祀則用此酒非祭祀不可非時而飲酒惟天降命况天之降命肇我民惟元祀始使我民造酒者惟大祭用之天降威奈何天降下威者我民用大亂喪徳以我民放僻邪侈用大亂喪亡其徳亦罔非酒惟行亦無非以酒為行所行常在酒也越小大邦用喪及小邦大邦用以喪亡國家者亦罔非酒惟辜亦無非因酒得辜罪文王誥教小子文王又誥教民之㓜小子孫曰有正有事汝上則有官長以治汝之失下則有務農之事無彞酒無常飲酒越庶國飲惟祀惟文王教庶邦教民者如此故當時衆國飲酒惟在祭祀之時徳將無醉又須以徳將之不至於醉惟曰惟各自訓其民曰我民迪小子我民皆當訓迪㓜小子孫惟土物愛能惟土産秫稻之物是愛則不敢糜爛秫稻為酒漿厥心臧不貪酒以喪徳其心自善聦聽祖考之彞訓故當時為民子孫者皆能聦耳以聽祖父之常訓不敢湎酒越小大徳於是斯民尊卑長㓜之徳小子惟一與㓜小子孫皆純一其徳無二三之失矣妹土嗣爾股肱純今妹土之人當繼續其手足之力純一其心無有怠惰作輟之意其藝黍稷以種藝黍稷奔走事厥考厥長奔走服勞不敢少憚以事其父其兄肇牽車牛逺服賈農事之餘始牽其車與牛逺近以行其商賈之事賈音古用孝養厥父母取其嬴以盡孝養其父母厥父母慶其父母得子之養私相慶喜自洗腆致用酒方可用洗潔腆厚以酒致其用無害洗跣庶士有正今衞國之臣如衆士有正長以統之者越庶伯君子及衆正之長君子其爾典聽朕教其與爾康叔能常聽我教訓之言爾大克羞耇惟君爾大能進用老成人為之則足以盡為君之道爾乃飲食醉飽爾乃可行養老之禮而飲食醉飽無害丕惟曰成王於是大思惟所告康叔曰爾克永觀省爾若能長永自觀自省作稽中徳動必考於大中之徳爾尚克羞饋祀爾庶幾能進其饋食以祭祖考爾乃自介用逸因祭用酒自娛無聽以自助而用為逸樂也兹乃允惟王正事之臣此乃信為王家以正其處事之臣兹亦惟天若元徳此乃惟天順汝天徳降福佑助永不忘在王家使汝長保富貴不忘在王家矣王曰封成王呼叔我西土棐徂邦君我文王當日在西土以教化棐輔往日之國君御事小子及諸治事之臣與民㓜小子孫尚克用文王教皆庶幾能用文王之教命不腆于酒不敢厚飲于酒故我至于今克受殷之命所以我周家至今能受殷命有天下王曰封王呼叔言我聞惟曰我聞之於古惟曰在昔殷先哲王在昔商之先有智哲之王迪畏天顯小民能啓迪敬畏之道上則畏天之顯道下則畏小人之難保經徳秉哲惟務經常其徳而不敢少變徳秉其哲而不使少惑自成湯咸至于帝乙故自成湯以至帝乙成王畏相所以成王業惟在畏輔相之人惟御事厥棐有恭故當時凡為治事之臣者其輔君皆有恭敬之誠心不敢自暇自逸夙夜在公不敢少自寛暇少自安逸矧曰其敢崇飲無敢崇厚於飲酒越在外服乃在王畿之外服行其事者侯甸男衞邦伯即侯甸男衞西國之君長越在内服及其王畿之内服行其事者百僚庶尹即百官之僚屬與衆官之尹正惟亞惟服宗工與其副貳之人與其服事尊官之人越百姓里居及百官族姓致仕居鄉里之人罔敢湎于酒不惟不敢亦不暇無敢沈酒不惟不敢亦不暇不敢則有所畏而不縱不暇則誘之為亦不為矣惟助成王徳所以不暇惟在佑助成就王者之徳顯越尹人祗辟使明於正人敬法之道我聞亦惟曰成王又謂我聞於今亦惟曰在今後嗣王酣身在今惟後嗣之王紂酣醉於其身厥命罔顯于民故機務皆失其條理其命令不顯著於其民祗保越怨不易但安於作怨之事而不改易大誓謂結怨於民是也誕惟厥縱淫泆于非彞又大為恣縱以侵淫泆蕩於非常詭異之事用燕喪威儀用燕樂而喪失為君威儀民罔不䀌傷心民聞之無不䀌然痛傷於心痛其將亡也䀌赩惟荒腆于酒紂曽不自覺方且荒亂厚於飲酒不惟自息乃逸厥心疾狠不克畏死不特不能自正其淫泆之失而其心且忿疾狠戾雖死亡在前不能畏也狠下懇切辜在商邑惟造作辜罪在所都之邑越殷國滅無罹雖於殷國滅亡曽無憂之之心詩所謂逢此百罹是也弗惟徳馨香祀更不思惟有馨香之祭祀登聞于天以升聞于上天誕惟民怨方且大與民結怨庶羣自酒與衆羣臣相從於酒腥聞在上腥穢聞于上天故天降喪于殷所以上天降下喪亡之禍于殷罔愛于殷惟逸無有愛惜殷家之意者惟其逸樂過度故也天非虐由是觀之殷之亡者非天虐於紂也惟民自速辜惟紂自召其辜罪耳言民以其無君之徳與凡民等耳猶孟子言獨夫也王曰封王又呼叔而語之予不惟若兹多誥我不但徒然如此多誥於汝古人有言曰葢古人之言曰人無於水監人無監視於水水可監形之妍醜而已至於政之醇疵國之休戚非水之所可監也當於民監當監視於民則可以見成否今惟殷墜厥命今惟商人湎酒之故隕墜其天命正今日所當監者我其可不大監撫于時故我其可不大以此為監而撫安天下於此時哉予惟曰成王謂我今惟言曰汝劼毖殷獻臣汝康叔當堅固毖謹殷都賢臣劼苦八反侯甸男衞及汝為孟侯所統侯甸男衞之國君當謹固之此正如文王毖庶邦庶正葢毖愼之使不湎于酒矧太史友内史友殷賢臣及所統諸侯既毖愼之況太史之官掌六典八法八則内史之官掌八柄之法乃汝康叔之所親友者乎越獻臣百宗工及其賢者為百官尊者可不固愼之乎矧惟爾事内史太史賢臣百宗工既固愼之況與汝康叔共事之人服休服采服休謂居尊官而暇逸者服采謂居卑官而治事者可不固愼之乎矧惟若疇服休服采既固愼之況如爾之疇匹圻父薄違如司馬掌九畿之法故謂之圻父父者尊之為父也有違王命者圻父薄迫而誅伐之圻音祈農父若保司徒掌教稼穡以厚民生故謂農父當順民而保安之宏父定辟司空掌度地以居民謂之宏父當定民居之法此三卿可不固愼之乎辟必矧汝剛制于酒自殷賢臣至衞三卿皆康叔所當毖愼者況於汝身其可不剛以制其縱酒之失乎厥或告曰其或有人告於汝曰羣飲有人犀聚飲酒汝勿佚汝當擒捕勿令逃佚佚亦盡執拘以歸于周盡執拘以歸周家予其殺我將殺之又惟殷之迪諸臣成王又恐康叔縱殺故又告以羣飲固可殺若殷紂所導迪諸臣惟工乃湎于酒及百官有沈湎于酒者此化紂之惡未能遽革勿庸殺之姑惟教之汝勿庸殺之且惟教之曰有司明享國家所以有官主此酒者本以明潔為享祀之用非為羣飲設乃不用我教辭如此教之乃有不明我教之之辭惟我一人弗恤則是於我一人之言曽不知恤肆為淫湎弗蠲乃事時同于殺不自蠲潔其職事於其始可與朋羣飲之人同其殺也王曰封汝典聽朕毖汝能常聽我戒愼之言而不湎于酒勿辯乃司民湎于酒勿使汝司民之官乃沈湎于酒而不自知也先儒以辨訓使必有自來梓材第十三此篇葢管蔡武庚既誅餘黨猶有存者成王欲使康叔匿瑕含垢以徳化之無事於刑故此告之篇名梓材葢篇内有若作梓材之喻史官取以為編簡之别梓材竹簡標題王曰成王言封呼康叔名以厥庶民當以其國内之庶民暨厥臣與其國内之臣達大家通達其徳意志慮於大家大家即卿大夫之家孟子所謂巨室也以厥臣達王又以其國内之臣通達國之情偽於王惟邦君如此則國家之情上通於王下通於大家邦君之責盡矣汝若恒汝康叔若能順民之常性越曰於是自言我有師師成王前告我以勿庸殺之姑惟教之我今所以順其常性而教化之非我自為我實有所師法司徒司馬司空尹旅則爾國三卿及庶官之長與衆大夫曰亦皆自言予罔厲殺人我所以不敢暴厲而殺人者亦厥君先敬勞非我自能爾也亦其君不以殺人為事能先以恭敬勞來為事肆徂厥敬勞故我徂往而其心能以恭敬勞來為事肆往姦宄故我又往而治民於内為姦外為宄者殺人歴人宥殺人者與既殺人而逃走所過歴之家者皆赦宥之肆亦見厥君此非我自能爾故亦是我見其君事戕敗人宥於從事為戕賊禍敗之人尚且宥之此正謂王者言於上諸侯法之諸侯行於上為卿大夫法之也戕墻王啓監諸侯各監其一國王者所以啓建監國之侯者厥亂為民其治主於為民而已曰而其戒飭諸侯惟曰無胥戕無胥虐無相戕虐無相暴害至于敬寡至民之鰥寡當恭敬之而不慢至于屬婦婦女當有以連屬之不離合由以容合并用是四事以含容斯民王其效邦君成王言王所以責效於邦君越御士及治事之臣厥命曷以其命果何用哉引養引恬惟欲長養民長安民而已恬甜自古王若兹監自古王者皆如此啓監以牧民罔攸辟無所事於刑辟惟曰成王又謂我意惟曰若稽田今康叔為君監民譬如治田既勤敷菑前既以勤力徧布菑去其草而稂莠不能害苖惟其陳修今惟當陳設其所修治之事如糞壤之類為厥疆畎又為其疆畔如田塍之類為其溝畎如田間通水小溝之類康一可不體此稽田之義務除商民之穢惡分而正之使善惡不得混處者乎若作室家又如人之作室家既勤垣墉前既勤力立垣墻城墉而内外有限可以禦侮惟其塗暨茨今惟當塗暨泥飾惟當茨葢康叔體此作室之義經理疆域申晝郊圻猶恐有如徐夷淮奄相煽成亂若作梓材又如人治梓木之材以為器用既勤樸斵前既勤力為坏撲而斵削之矣樸朴惟其塗丹雘今惟當塗朱色之雘以為之采飾康叔可不體此梓材之理修明典章建立綱紀以維持播飾其治道乎雘烏郭反今王惟曰周公又謂成王之意惟曰先王既勤用明徳先王文武既已勤用明徳於上懷為夾懷來諸侯使為夾輔庶邦享故庶邦朝享于下亦皆相親比作兄弟方來如兄弟之密方方而來亦既用明徳亦盡用明徳后式典今我君成王惟法先王之舊典集庶邦丕享合衆邦大來享上亦如先王之時上下皆用徳皇天既付中國民況皇天既畀付中國之民越厥疆土于先王及其中國之疆土于先王肆王惟徳用故嗣王惟徳化是用和懌先後迷民以和悦先迷民紂之民後迷民武庚之民用懌先王受命如此則所行之政仰合先王之心所以能慰悦先王所受命于天而有天下者可以長保而無替矣已若兹監周公既舉成王之意詳告康叔於是又歎曰已矣乎今當如此監民惟曰惟常自言欲至于萬年欲至萬年之久惟王子子孫孫永保民及王之子孫長共保斯民而已此惟王如禹貢言厥貢羽毛惟木之惟同謂羽毛及木也召誥第十四此篇乃成王欲宅洛邑使召公相宅因作誥以進戒成王也昔武王克商遷九鼎於洛邑是時欲都洛而卒不果遷至成王周公乃成武王之志建都洛邑而所營洛有二所瀍水之西則建以為都而居九鼎謂之郟鄏又謂之東都又謂之王城取其天下之中四方朝貢道里均焉瀍水之東則以遷頑民謂之成周又謂之東郊取其密邇王室可以馴服其心焉然則洛邑既成成王果都此乎曰成王實都鎬京特來往朝諸侯祀清廟於此詩魚藻刺幽王曰王在在鎬是幽王猶居鎬京則成王實都鎬可知矣宣王車攻之詩曰復㑹諸侯於東都宣王於此㑹諸侯則成王亦於此㑹諸侯可知矣及平王東遷乃都洛邑而洛邑成於成王周公復辟在營洛之後召公欲成王知所以謹其始故作此篇召邵成王在豐豐文王所都文王之廟在焉時成王所以在豐者欲宅洛邑以欲居洛邑告文王廟以宅洛之意使召公先相宅乃使召公先周公而往洛相視所居作召誥召公遂作此書以告成王召誥竹簡標題惟二月既望周公攝政七年二月乙亥朔十六日既望實得庚寅越六日乙未過六日是二十一日乙未王朝步自周成王早朝行自鎬京則至于豐豐至鎬京二十五里故朝發鎬京則可至豐不待淹日也文王宗廟在豐時營洛邑故至豐告其事惟太保先周公相宅惟太保召公乃先周公而行往洛地相視所居之地越若來於是順成王之命而來三月惟丙午朏三月初三日丙午月生明之日朏斐越三日戊申過三日是月之五日其辰得戊申太保朝至于洛卜宅召公乃早朝至於洛用龜卜其所居是太保自二十一日離豐歴十四日至洛卜宅厥既得卜其卜既吉則經營於是經營規畫其朝市宗廟郊社之位越三日庚戌太保乃以庶殷攻位于洛汭召公乃以衆殷民治其所經營之位于洛水之汭越五日甲寅位成攻之五日乃月之十一日其辰甲寅所攻之位其規模皆成若翼日乙卯明日乃十二日乙卯周公朝至于洛周公早朝至洛則達觀于新邑營乃徧觀新邑太保之所營越三日丁巳過三日乃月之十四日丁巳用牲于郊用牲于郊以禮天地告營洛之事牛二牲用牛二越翼日戊午過明日戊午月之十五日乃社于新邑乃祭社于新邑告以營洛之事牛一羊一豕一牲各用一越七日甲子過七日乃月之二十一日甲子周公乃朝用書命庶殷公乃早朝用册書命殷地之衆侯甸男邦伯及侯甸男之邦諸侯之長厥既命殷庶其既命殷地之衆庶殷丕作殷地之衆皆大作以赴功周公忠誠感動之也太保乃以庶邦冢君出取幣召公乃挾衆邦大君以出取其幣帛乃復入由外復入復扶又反錫周公以幣帛予周公曰遂致詞於公述其忠誠感動庶殷之意拜手稽首手至地為拜手首至地為稽首以致敬于公旅王若公誥告庶殷召公乃以書陳説於鎬京王所今日亦當順周公誥告庶殷之意而敬謹其徳率先天下越自乃御事於是自汝治事之臣始嗚呼嗟歎而言皇天上帝改厥元子皇天之上帝改其長子紂兹大國殷之命此大國殷家之天命惟王受命惟王受殷之命無疆惟休有無窮之休美亦無疆惟恤亦有無窮憂恤嗚呼召公所以又歎而言曷其奈何弗敬何哉人君奈何不敬乎曷其當如禮記言何居詩言子曰何其天既遐終大邦殷之命天既逺絶大邦殷之命矣兹殷多先哲王在天然商家多有在先明哲之王精爽在天其徳澤深逺越厥後王後民兹服厥命謂紂之身與紂之民所以能服受其天命厥終智藏瘝在奈何其終不能敬於為君斥退君子而智者至於藏匿信任小人而病民者至於在位瘝音官夫知保抱攜持厥婦子天下之民弗忍荼毒夫人皆知保抱其子攜持其婦以哀籲天以哀苦呼告上天籲音喻徂厥亡出執而紂又往其所往出之地而拘執之嗚呼嗟嘆天亦哀於四方民其眷命用懋紂酷虐如此故天亦哀念四方之民其眷顧之命於是别用能勉力於敬徳者以為王王其疾敬徳今成王不可不敏於敬修其徳相古先民有夏王亦嘗相視古之先民有夏之君乎先民猶言古先之人謂禹也天迪從子保禹惟敬徳故天開導之順從之以如子而愛之保安之面稽天若禹又能面向稽考天意所順向之不背稽之不違今時既墜厥命今是其孫桀不能敬徳而隕墜其天命矣今相有殷今又相視有殷之湯天迪格保湯惟敬徳天亦開導之感格保安之面稽天若湯又能面向稽考天意所順以有為今時既墜厥命今是其孫紂不能敬徳而隕墜其天命矣今沖子嗣今王以㓜沖之子繼立則無遺壽耇則不可遺棄有夀老成之人曰其稽我古人之徳謂其多識前言往行可以稽考古人之徳矧曰其有能稽謀自天況又可以言其能考其謀之本於天造而無愧者乎嗚呼嗟歎有王雖小元子哉有王雖㓜小乃武王長子其丕能諴于小民其大能和于小民諴音咸今休則今日即有休美不待持久也王不敢後用成王不敢以此事為後之用而必以為先務者顧畏于民碞在於顧視而畏民情之碞險碞音岩王來紹上帝況成王自鎬京來洛邑所以繼天為君自服于土中周公將歸政而成王自服行其政事于中土謂洛地得天地之中也旦曰於是遂引公言其作大邑謂周公亦嘗自言其所以作此大邑者其自時配皇天將使成王自是洛邑配天為君葢天在上為羣物之祖君配之而在下為萬邦之君也毖祀于上下又自是洛邑以謹祀天神地祗其自時中乂然後自是中土以致治王厥有成命天命文武造周至成王而有成一成而不可變治民今休見於治民今即有休美矣皆周公言王先服殷御事召公又告王今日治此新邑當先訓服殷治事之臣比介于我有周御事使親比以助我周治事之臣習與善人處陰以除其暴虐之心節性惟日其邁裁制其邪性則日復一日行其善矣王敬作所不可不敬徳今王當以敬作所不可不敬之徳我不可不監于有夏亦不可不監于有殷監視其興亡我不敢知曰故我不敢測知而言有夏服天命有夏受天命王天下惟有歴年何為而傳十七王歴四百三十二年我不敢知曰又不敢測知而言不其延何為至桀殄絶不能延長惟不敬厥徳乃早墜厥命惟言不敬其徳乃早隕墜其命灼然無可疑者我不敢知曰故我不敢測知而言有殷受天命有殷受天命王天下惟有歴年何為而傳三十王歴六百三十九年我不敢知曰不其延又不敢測知言何為至紂殄絶不能延長惟不敬厥徳乃早墜厥命惟言不敬其徳乃早隕墜其命今王嗣受厥命今王繼受夏商大命我亦惟兹二國命我亦當思此夏商之天命嗣若功繼夏商以敬徳而有歴年功效可也王乃初服周公復辟成王乃今日初行天子之事嗚呼嗟歎若生子如人生子罔不在厥初生無不在其初生之日父母當謹訓導使之馴習於善自貽哲命彼智哲之善雖天所賦授為父母早訓導之使不失其本心亦若父母自與以智哲善命矣今天其命哲今天於君或命以知哲之徳命吉凶或命之吉或命之凶命歴年或命以歴年之久皆未可前知知今我初服宅新邑天知今日我王初行天子之事又居于新邑之洛肆惟王其疾敬徳故惟王其敏於敬修其徳王其徳之用王其惟徳是用祈天永命則天命以吉以哲以歴年誠可以求天之永命矣其惟王勿以小民淫用非彞其惟王無以小民過用非常道之故亦敢殄戮不教而即殺之乃果於為殄絶殺戮之事用乂民孰若用敬徳以安民若有功若欲治民有功其惟王位在徳元其惟居王者之位在於以徳而率先天下小民乃惟刑用于天下然後小民乃惟儀刑於君而用徳於天下越王顯於是王徳亦因民而顯著於天下上下勤恤夫君民上下皆能盡憂勤之誠以敬徳其曰故我乃敢言曰我受天命我周家受天命有天下丕若有夏歴年今可大如有夏歴年之久式勿替有殷歴年又用勿廢有殷歴年之久欲王以小民受天永命故我惟欲王以徳乂小民受天求長之命葢得乎民而後可得乎天誠不可以淫用非彞而遽至於殄戮拜手稽首曰召公又致敬於周公曰予小臣敢以王之讎民百君子我雖小臣敢以王之讎民即商民昔附武庚又叛與周為讎者百君子即周之所謂有官君子者也越友民乃周家友順之民保受王威命明徳安受王之威命使有所畏而不敢叛安受王之明徳使有所慕而不忍叛王末有成命則王終有成命於天一成而不可變矣王亦顯王之功徳亦於是顯著於天下我非敢勤然我非敢以此為己之勤勞惟恭奉幣我惟當王有成命之際天下既治平之日而以恭敬奉幣帛用供王能祈天永命用供之於王使王以此幣帛而昭荅天休乃見王能於求天永長之命也尚書句解卷八
