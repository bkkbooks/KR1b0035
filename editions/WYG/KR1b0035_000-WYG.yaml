front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0035_WYG_000-1a, image: WYG0062/WYG0062-0885a.png}
body:
  text: 尚書句解書類提要臣等謹案尚書句解十三卷元朱祖義撰祖義字子由廬陵人於諸經皆有句解今多散佚此書僅存元延祐中定經義取士之制尚書以古註疏及蔡沈集傳為宗故王充耘書義矜式尚兼用孔傳迨其末流病古註疏之繁而蔡傳遂獨立於學官業科舉者童而習之莫或出入祖義是書專為啟迪幼學而設故多宗蔡義不復考證舊文於訓詁名物之間亦罕所引據然隨文詮釋詞意顯明使殷盤周誥誥屈聱牙之句皆可於展卷之下了然於心口其亦古者離經辨志之意歟以視附㑹穿鑿浮文妨要反以晦蝕經義者此猶有先儒篤實之遺矣亦未可以其淺近廢也乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書序此序孔安國所作以其上古帝王之書為後世所慕尚故曰尚書序中言伏生年過九十失其本經口以傳授裁二十餘篇以其上古之書謂之尚書是知書是本名尚是伏生所加也古者伏犧氏之王天下也古者有伏犧氏即太皥也以木德王天下始畫八卦始畫乾坤艮巽震離坎兑八卦造書契造作書契謂書之於木刻其側為契各持其一以相考合以代結繩之政以代上古洪荒之世結繩以識其政事事大大其繩事小小其繩由是文籍生焉因此而三墳五典之文籍以生焉伏犧神農黄帝之書三皇之書謂之三墳名謂之三墳墳大也言大道也是其書之所言皆大道也少昊顓頊髙辛唐虞之書五帝之書謂之五典名謂之五典典常也言常道也是其書之所言者皆常行之道至於夏啇周之書至於三代之書雖設教不倫雖禹湯文武設教不見倫類雅誥奥義要之雅正之誥皆有深奥之義其歸一揆如人之於射其歸於一揆度其的而已是故此所以歴代寳之經歴萬代莫不珍惜墳典訓誥之書以為大訓以之為大訓八卦之說如八卦之說文謂之八索其書名謂八索索求也求其義也所以求索八卦之義理也九州之志九州所說謂之九丘其書名謂之九丘丘聚也丘者聚集也言九州所有言九州所有之物土地所生土地所生之物風氣所宜風氣所宜之物皆聚此書也皆聚載於九丘之書春秋左氏傳曰春秋左氏傳有言楚左史倚相楚靈王時有左史倚相史官居左故曰左史也能讀三墳五典八索九丘號為能讀三墳五典八索九丘之書也即謂上世帝王遺書也即以謂上世帝王遺書不知其混殽先君孔子安國是孔子十一世孫尊其祖故曰先君生於周末孔子生於周衰之末覩史籍之繁文見八索九丘之書皆史籍之繁文懼覽之者不一恐覧而觀之者無所統一遂乃定禮樂明舊章述而不改曰定遂乃定禮樂制度之舛錯以發明先世舊章典法刪詩為三百篇就而减削曰刪詩本三千篇削其不合於禮義者特存三百一十篇止言三百以成數言之者也約史記而修春秋凖依其事曰約依魯史而修春秋讃易道以黜八索因而佐成曰讃因伏羲畫之文王重之不可強改特佐成十翼則易道以明而八索之書不必用矣是以黜而棄之焉述職方以除九丘顯而明之曰述盖職方者即周禮職方氏所掌皆九州所有夫子述其所職而載之於經則九丘之書亦不必用故刪除之討論墳典墳典之書傳之既乆不無淆亂孔子討論而整理之斷自唐虞以下訖於周上至三墳五典之書斷自唐虞獨取二典下至有周芟夷煩亂其間有雜亂難考之處皆芟除之而使至於平夷也翦截浮辭浮華無實之言皆剪截而剔去之舉其宏綱綱綱之索但舉大綱而衆目自張撮其機要機弩之括但撮機括之至要非泛無所統撮七括反足以垂世立教誠足以垂示後世而立教於人典謨訓誥誓命之文其典謨訓誥誓命之書凡百篇凡有百篇所以恢𢎞至道皆所以發明張大二帝三王至治之要道示人主以軌範也以明後世人君出治之軌範如車之有軌所行皆由乎是如器之有範所為不外乎是也帝王之制二帝三王之制作坦然明白平易明白可舉而行後世可舉而見於行三千之徒孔子三千徒弟並受其義皆傳受百篇之義及秦始皇及至秦王名政尊為皇帝以初併天下號為始皇滅先代典籍滅除先代經典文籍焚書坑儒焚古書坑儒士天下學士天下儒者逃難解散率皆隐身避世以逃患難分散於四方解音蟹我先人用藏其家書於屋壁時孔子七世孫子襄安國以為先祖故稱我先人慮家書之不傳乃以藏於屋壁中也漢室龍興漢家繼秦如龍之興開設學校開設學校之乆廢者旁求儒雅遍求儒之雅正者以闡大猷以闡明大道濟南伏生濟南有伏生名勝為秦二世博士年過九十年過九十餘老不能行文帝詔晁錯受之失其本經奈何遭秦火之餘散失其百篇本經口以傳授幸伏生記誦之熟以口傳授於晁錯裁二十餘篇僅得堯典舜典臯陶謨益稷禹貢甘誓湯誓盤庚三篇髙宗肜日西伯戡黎㣲子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多士無逸君奭多方立政顧命康王之誥吕刑文侯之命秦誓費誓凡三十三篇除堯典舜典合為一臯陶謨益稷合為一盤庚三篇合為一顧命康王之誥合為一此二十八篇故謂之二十餘篇以其上古之書以其為上古帝王之書謂之尚書名謂之尚書以其為後世所慕尚是知書是本名尚是伏生所加百篇之義百篇之文義世莫得聞世不得而聞至魯共王至漢景帝之子共王名餘封為魯王死諡曰共好治宫室存曰居魯近孔子宅好修治宫室壊孔子舊宅毁壊孔子舊宅壊怪以廣其居以廣大其所居於壁中得先人所藏古文於所壊壁内得安國先人子襄所藏上古帝王之文虞夏啇周之書乃虞夏商周之書及傳論語孝經及孔子所傳論語孝經皆科斗文字皆以科斗文其字科斗蝦蟇子也字形多頭麤尾細肚腹團圓似科斗王又升孔子堂共王又登孔子廟堂聞金石絲竹之音聞金鐘石罄絲琴竹管之聲以此神異乃不壊宅乃不敢毁其居悉以書還孔氏盡以其所得古文虞夏商周之書與傳論孝經還孔氏科斗書廢已乆科斗之書始於倉頡其文至三代不改經秦火廢而不用至漢則其廢已乆時人無能知者漢時人無有能知之者以所聞伏生之書安國乃以前所聞伏生口授之書考論文義考校論說古文之義定其可知者定其可知識者為𨽻古定為𨽻以寫古文而後定更以竹簡寫之又别更以竹簡寫之簡一尺二寸竹簡者以竹長一尺二寸為之更音庚増多伏生二十五篇至此復以屋壁古文校定乃得大禹謨五子之歌𦙍征仲虺之誥湯誥伊訓太甲三篇咸有一徳説命三篇泰誓三篇武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命凡二十五篇伏生初得二十八篇今又増多此二十五篇是已得五十三篇矣伏生又以舜典合於堯典於五十三篇之中伏生又以舜典合堯典為一益稷合於臯陶謨益稷合臯陶謨為一篇盤庚三篇合為一盤庚三篇合為一篇康王之誥合於顧命康王之誥合顧命為一篇復出此篇并序今依古經分堯典舜典為二篇益稷臯陶謨為三篇盤庚為三篇康王之誥顧命為二篇是於三篇復出此五篇并孔子所作書序自作一篇凡五十九篇總得五十九篇為四十六卷除序在外不以卷計由五十八篇同序者同卷異序者異卷如太甲盤庚說命泰誓皆一篇同卷是减八卷矣又大禹謨臯陶謨益稷三篇同序共一卷康誥酒誥梓材三篇同序共一卷是又減四卷矣前減八卷後減四卷共十二卷以五十八卷除十二是為四十六卷其餘錯亂摩滅弗可復知其餘如汨作九共九篇槖飫帝告釐沃湯征汝鳩汝方夏社疑至臣扈典寶明居肆命徂后沃丁咸乂四篇伊陟原命仲丁河亶甲祖乙髙宗之訓分器旅巢命歸禾嘉禾成王政将蒲姑賄肅慎之命亳姑凡四十二篇亡皆錯亂而無序摩滅而不明不可復通知悉上送官安國乃并與竹簡所冩五十八篇盡以上送於官藏之書府藏於秘府以待能者以待後世有能整理而讀之者承詔為五十九篇作傳安國時為武帝博士既考正古文以聞於帝又承詔旨為五十九篇之傳傳通釋解其意也於是遂研精覃思於是遂研覈精專覃静思求其理博考經籍廣博推考羣經六籍採摭羣言於經籍中採摭衆言互相参考摭隻以立訓傳作為詁訓傳通其意約文由義其作傳之體則貴于約省其文而申明一書之義也敷暢厥㫖以敷布宣暢其㫖意庻幾有補於将米庶幾天下後世即其所傳以求聖經之㫖有所補益耳書序即孔子所序序所以為作者之意序述所以為作書者之意昭然義見言其意義昭明無隐宜相附近但作序者不敢厠於正經故以序自作一篇列於百篇之後今安國從宜以序附近於正經故引之各冠其篇首故引而分之各冠其本篇之首定五十八篇既畢書本連序五十九篇今序既分則是損其一篇則定為五十八篇既畢會國有巫蠱事㑹值武帝末年淫惑鬼神崇信巫術有巫蠱事蠱者怪惑之名謂以藥毒害人與行符厭俗為魅令人蠱惑夭年傷性謂之巫蠱以蠱皆巫之所行也奸人江充因行其詐先於太子宫埋桐人告上云太子宫有蠱氣上使充治之於太子宫果得桐人太子知充䧟已乃殺充武帝詔討之太子走奔壺闗自殺蠱音古經籍道息故武帝好經籍之道至此滅息用不復以聞用是不復以所傳聞於上傳之子孫惟自傳於已之子孫以貽後代使之貽於後世之人行之若好古博雅君子後世若有好愛古道廣博學問志懐雅正之君子與我同志與我同慕古之意亦所不隐也亦發明吾道庶㡬傳而不至於隐蔽也尚書序
