body:
  text: 尚書句解卷三元朱祖義撰禹貢第一禹貢之書雖曰治水之後任土作貢在堯舜授受之時以禹有天下實本乎此孔子所以因其舊而冠於夏書之首然是書之作首别九州次言治水又次言田賦土貢終言朝覲達帝都之道其事非一獨以貢名篇者誠以禹治水之功既成條陳九州所有以為貢賦之法用以告成功於上使上之人案此為取民常制實以任土作貢為上故特以貢名焉禹别九州禹分别九州之疆界別鱉隨山濬川隨山之勢深濬川流任土作貢任土地所宜制為貢之等差禹貢此二字作書者揭本篇之題首禹敷土禹敷布其土而敬之使水通流隨山刋木隨山之勢斬木通道奠髙山大川定九州之髙山大川表其疆域冀州帝堯所都故禹治水首從冀起既載壺口壺口山在冀州河之東北屈縣東南禹始有事於壺口之西鑿為龍門以通河治梁及岐梁山在雍州左馮翊夏陽縣西北岐山在雍州扶風美陽縣西北苟禹不於梁岐之東鑿為龍門以通河則冀州河水為患無有平寧既修太原髙平曰原漢以為太原郡汾水所出禹導汾水故治太原至于嶽陽然後至于嶽山之南在太原西南屬河東郡汾水所經自東入河覃懷砥績河內郡有懷縣即此覃懷也自覃懷致功至于衡漳然後至于北導漳水衡即橫字漳水橫流入河厥土惟白壤其土色白性壤而太柔厥賦惟上上錯賦出於田其賦第一或有凶荒雜出第二厥田惟中中其田第五等恆衛既從恆水出恆山曲陽縣東入冦水衛水出常山靈壽縣東北入滹沱河今二水既從故道而流大陸既作廣平曰陸大陸地最卑而河所經今既可耕作島夷皮服海曲曰島居島之夷今皆得食鳥獸肉而以皮為服夾右碣石入于河碣石海畔山在北平驪城縣西南海在其南河又其南禹自海入河逆流而西以歸帝都方其入河時碣石在夾掖之右濟河惟兖州兖州疆界東南據濟據跨也西北距河距至也九河既道河自冀大陸北流入兖分為九道徒駭太史馬頰覆釡胡蘇簡潔鈎盤鬲津今復故道雷夏既澤雷夏在濟隂城南西北其陂東西二十里南北十五里即舜所漁之澤昔嘗散漫今既聚而為澤灉沮㑹同二水㑹同入雷澤桑土既蠶然後宜植桑於土以享蠶柔之利是降丘宅土洪水之初民皆升髙丘避水今水既平兖民於此得下丘以居平土厥土黑墳其土色黑性墳起墳音憤厥草惟繇厥草繇茂厥木惟條其木條而長厥田惟中下田第六等厥賦貞賦正與田相當亦是六等作十有三載乃同洪水之害河為甚兖又河之下流比餘州其害又甚故耕作十有三年其賦法乃與他州同厥貢漆絲貢出於土其所貢漆與絲厥篚織文可以篚盛以貢者有織而成文錦綺之屬浮于濟漯以舟行水曰浮浮于濟漯之水漯塌達于河以水入水曰逹入河以通帝都海岱惟青州青州疆界東北據海西南距岱嵎夷既略即堯典宅嵎夷東方極地也既為之封略者恐其有猾夏之變濰淄其道濰水在琅邪箕屋山北至都昌縣入海淄水出泰山萊蕪縣原山東北至千乘博昌縣入海皆順其故道而流厥土白墳其土色白性墳起海濵廣斥青州在海之濵其地逈闊土斥鹵而鹹可煮為鹽厥田惟上下三等厥賦中上賦第四等厥貢鹽絺具貢鹽即廣斥之地所出貢絺細葛也海物惟錯貢海物魚類錯雜非一岱畎絲枲岱山之谷宜桑貢絲宜麻貢枲枲西上聲鉛松怪石以金則産鉛以木則産松怪石石似玉者萊夷作牧萊山之夷水退可牧牛馬厥篚檿絲可篚盛以貢者檿蠶絲也其絲可為琴瑟絃浮于汶汶水出泰山萊蕪縣今以舟浮于汶逹于濟從西南入于濟濟水出河東垣縣王屋山東南至河內武德縣入河以至冀都海岱及淮惟徐州東至海北至岱南及淮此徐州之境也淮沂其乂淮水出桐柏山在豫州南陽平氏縣東南沂水出太山蓋縣臨樂子山二水發源雖不在徐境而經流徐州大為徐州之害今其已治蒙羽其藝則蒙羽二山其可種藝矣蒙山在太山蒙隂縣西南羽山在東海祝其縣南大野既瀦人野澤名在山陽距野縣北水所停曰瀦大野既足以停水東原砥平則廣平曰原必致功而後地平可耕即今之東平郡在徐之西厥土赤埴墳土色赤性埴而粘墳以起草木漸包草木進長而叢生厥田惟上中二等厥賦中中五等厥貢惟土五色貢青黃白黑赤五色土王者封五色土為社建諸侯則割方色與之歸國立社羽畎夏翟羽山即蒙羽其畎谷出夏翟雉也其羽為旌旗之飾嶧陽孤桐東海下邳縣有葛嶧山其南産特生之桐可中琴瑟之用泗濵浮磬泗水出濟隂乘氏縣東南至睢陵縣入淮泗水之旁出石浮水上可為磬淮夷蠙珠暨魚淮水上夷民獻蚌出珠與魚蠙音駢厥篚𤣥纎縞可篚盛而貢者纎細黑繒纎細白㑹浮于淮泗浮舟于泗以入淮達于河然後達河至帝都淮海惟揚州北據淮南距海揚州之界也彭蠡既瀦彭蠡澤在揚州境內豫章郡彭蠡縣東乃江漢水所㑹即今鄱陽湖在南康軍星子縣南江州彭澤縣西今既足瀦停其水陽鳥攸居陽鳥近澤地名水退其地可居三江既入豫章之川如彭水鄱水塗水之類凡九水合於湖漢東至彭蠡入江乃南江也其後禹導漢水入焉與舊江合流而水之派分為南北乃北江也又其後導岷山之江入焉其流介乎三江之中乃中江也此三江既入于海震澤砥定震澤之水多震動而難定者致定矣篠簜既敷竹小曰篠大者曰簜既敷布而生厥草惟夭其草少長厥木惟喬其木惟喬厥土惟塗泥上卑濕厥田惟下下第九厥賦下上上錯其賦第七雜出第六厥貢惟金三品其貢惟金銀銅三品瑶琨篠簜瑶玉之次琨石之似玉篠竹之小簜竹之大齒革羽毛惟木齒象牙革犀皮羽孔雀翡翠之羽毛旄牛尾可為旌旗之飾木楩楠豫章之屬島夷卉服南海之島有夷人水退得以草為服厥篚織貝以篚盛而貢者染絲織成貝錦貝是錦名厥包橘柚錫貢包裹而貢者小曰橘大曰柚柚似橘而大味酸二者不常用皆待錫命而後貢之沿于江海順流而下曰沿自江下海達于淮泗自海達淮自淮達泗自泗入河以至冀都荆及衡陽惟荆州北據荆山南及衡山之陽荆州之疆界江漢朝宗于海江出岷山漢出嶓冢發於梁州經於荆州入海乃在揚州先未有入海之道荆州實被其害惟禹導之以海水大江漢小以小就大似諸侯朝至尊九江孔殷九江今洞庭也沅水漸水元水辰水叙水酉水醴水湘水資水皆合洞庭中甚得地勢之中正沱潛既道自江别出為沱自漢别出為潛二水發原於梁入於荆故二州皆有沱潛禹治之復故道雲土夢作乂雲夢澤中有平土丘一水去可耕作修治厥土惟塗泥其土卑濕厥田惟下中第八厥賦上下第三厥貢羽毛齒革惟金三品皆與揚同杶幹栝柏杶似樗而實幹柘也可為弓幹栝柏葉松身柏即今之柏礪砥砮丹礪砥皆磨石砥細密而礪粗糲砮石之中矢鏃者丹丹砂也或云可為采砮奴惟箘簵楛箘簵美竹楛木名三者皆可為矢産於雲夢澤箘窘簵路楛戶三邦砥貢厥名以其非常用之物雲夢澤之三國致貢其名庶朝廷知所産之地有用則須包匭菁茅菁茅祭祀之用匭匣也既包裹之又匭盛之以貢厥篚𤣥纁璣組篚盛而貢者三染謂之纁綘色也此則善染𤣥纁之色璣珠之不圓者組綬之類三物皆充冕服之用九江納錫大龜九江産尺有二寸之大龜國有大事則卜之其龜不可常得必蓄以待上之錫命然後納焉浮于江沱潛漢浮舟而行先自江入沱自沱入潛自潛入漢逾于洛至漢則舍舟陸行以過洛至于南河然後至于南河以達兾都河在兾之南故曰南河荆河惟豫州此州界西南至荆山北距河水伊洛瀍澗伊出今汝州南陽縣荀渠山洛出今商州洛陽東北瀍出今西京新安縣榖城山澗出今西京龜池縣白石山既入于河四水既入于河滎波既瀦滎自河溢波自洛出二者既有所瀦蓄導荷澤荷澤在今廣濟軍定陶縣東北然後導荷澤之水荷音何被孟瀦以荷澤水盛乃覆被于孟瀦澤孟瀦在梁國睢陽縣東北厥土惟壤其土髙者無塊曰壤下土墳壚土之下者墳起壚疏厥田惟中上第四厥賦錯上中賦第二雜出第一厥貢漆枲絺紵土所産者貢漆貢枲絺葛之精紵布之精厥篚纎纊篚盛貢者細綿錫貢磬錯治玉之石曰錯治玉磬則用此石非常用也待錫命而後貢浮于洛浮舟于洛達于河達于南河即可以逹帝都華陽黑水惟梁州東據太華山之南西距黑水岷嶓既藝岷山在西徼外江所出嶓冢山在隴西郡漢所出二山皆可種藝沱潛既道自江别出為沱自漢别出為潛二水既復故道而流蔡蒙旅平蔡蒙二山可以刋木旅祭而後得其平矣蔡山在今雅州嚴道縣蒙山在今雅州名山縣和夷砥績又自嚴道而西地名和川夷人所居之地亦可致功而藝矣厥土青黎土色青黑而壤沃厥田惟下上第七厥賦下中三錯賦第八雜出第七第九厥貢璆鐵銀鏤砮磬貢璆美玉也鐵今鐵銀今銀鏤剛鐵可刻鏤物者砮石可中矢鏃者磬石磬也璆求鏤陋熊羆狐貍織皮四獸皮制之可為裘毛織之可為罽罽紀例反西傾因桓是來西傾山在隴西臨洮縣西南桓水出焉西傾本屬雍州在梁北境梁逹帝都别無水道故必循自西傾因桓水而來浮于潛自桓水以舟浮于潛水逾于沔自潛則舍舟陸行以過沔入于渭然後入于渭水亂于河自渭絶流至河乃達帝都黑水西河惟雍州西據黑水東距西河弱水既西弱水之勢利於西流禹因其地既導之使西以順其勢涇屬渭汭涇水自涇陽縣來得以北至渭矣漆沮既從漆水自岐山縣來沮水自北地來既從而入渭灃水攸同灃水自扶風縣來又同入渭荆岐既旅荆岐二山水退皆可旅祭荆在馮翊懷德縣岐在扶風美陽縣西北終南惇物二山皆在扶風武功縣東至于鳥鼠至于鳥鼠山水退皆可旅祭鳥鼠在隴西首陽縣西南原隰砥績髙平原下濕隰詩度其隰原此地在豳水退可以致功而藝至于豬野以至豬野亦可致功豬野在武威縣東北三危既宅三危山在河之南舜竄三苗于此水退其地既可居三苗丕叙三苗之族於是大得其叙厥土惟黃壤土色黃性壤沃厥田惟上上第一厥賦中下第六厥貢惟球琳琅玕球琳皆美玉琅玕皆石之似珠浮于積石積石山在漢金城縣西南河從西流禹自積石浮舟于河至于龍門西河浮舟而至㑹于渭汭又㑹于渭水之北以達于河而至帝都織皮崑崙析支渠搜制獸之皮為裘織獸之毛為罽缺國在河關西者有三國崑崙國在臨缺支渠搜國近朔方西戎即叙此三國皆西戎之種缺導岍及岐禹導雍州扶風岍山旁之積水及扶風美陽縣西北岐山之水岍牽至于荆山使下流至于雍州左馮翊懷德縣荆山逾于河自荆山而越于河壺口雷首然後自冀州河東北屈縣東南壺口山河東蒲坂縣南雷首山導積水至于太嶽使下流至兾州河東彘縣東太嶽山砥柱析城然後自兾州陜縣東北砥柱山河東護澤縣西析城山導積水至于王屋使下流至兾州缺山垣縣東缺至王屋太行恆山然後自冀州河南山陽縣西北太行山曲陽縣北恆山導積水至于碣石使下流至兾州北平驪城縣西南碣石山入于海然後水東北流入海西傾朱圉鳥鼠又導雍州隴西臨洮縣西南西傾山天水兾南朱圍山隴西首陽縣西南鳥鼠山之積水至于太華使下流至豫州京兆華隂縣南太華山熊耳外方桐柏然後自豫州𢎞農盧氏縣東熊耳山嵩髙山即外方山南陽王氏縣東南桐柏山至于陪尾導積水使下流至於豫州江夏安陸縣東北陪尾山導嶓冢導梁州隴西縣嶓冢山旁之積水至于荆山使下流至于荆州南郡臨沮縣荆山內方至于大别然後自荆州江夏竟陵縣東內方山導水使至于漢上大别江岷山之陽又自梁州蜀郡導岷山之南積水至于衡山使下流至荆州長沙湘南縣東南衡山過九江然後過洞庭湖之九江至于敷淺原使下流至揚州豫章東陵縣東南博陽山之敷淺原導弱水導雍州張掖删丹縣西南弱水向西至于合黎下流至于酒泉㑹水縣合黎水餘波入于流沙合黎餘波溢泛入於張掖郡居缺縣東北居缺中即流沙導黑水導雍梁之間黑水向西而流在滇池縣為梁州界在張掖郡為雍州界至于三危下流至雍州河南三危山入于南海從南入蒲類海導河積石河出崑崙山隱缺河中在河關西羌中積石山出禹導始此顔師古言至于龍門從東北流至於雍冀二州界上龍門山南至于華隂折而南流至冀雍梁豫四州界上華山也東至于砥柱又折而東流至虢城東南缺陽城北砥柱山河水分流包山而過山見水中若柱又東至于孟津又迤邐而東至于孟地有津可渡東過洛汭又從河南鞏縣東過洛水之北至于大伾又東行至修武武德縣界上大伾山北過洚水自大伾北流過信都縣之洚水至于大陸又北流至冀州巨鹿縣北之大陸廣平曰陸又北播為九河又北流過兖州分為九河名見前解同為逆河九河將入海又合為一大河名為逆河入于海從東入海嶓冢導漾自梁州隴西郡西縣嶓冢山導漾水東流為漢從東流至漢中為漢水又東為滄浪之水又東流過荆州為滄浪之水過三澨又東過荆州江夏竟陵縣三澨之水至于大别至于大别山水觸山南入于江乃折而南與江合東匯澤為彭蠡然後復東流回于彭蠡澤東為北江從東為北江入于海以入于海岷山導江自蜀郡前道西之岷山導江水東别為沱東流分為蜀郡郫縣之沱又東至于澧又東流至荆州今長沙澧陵地髙曰陵澧乃陵名過九江迤邐過荆州九江今洞庭也至于東陵下流至廬江全箘縣西北東陵之地東迤北會于匯自東迤邐邪行稍稍而北㑹于揚州之彭澤不言㑹于彭澤而言㑹于匯者蒙上東匯澤為彭蠡之文且見其與漢水共注此澤也即彭蠡澤東為中江又向東而流為中江入于海以入于海導沇水又於冀州河東垣縣王屋山導沇水沇兖東流為濟沇東為濟入于河至鞏縣南入河溢為滎其流浸大遂至滎陽縣北溢為滎澤滎澤在敖倉東南東出于陶丘北滎澤不足以容遂决而東出於定陶縣西南陶丘山之北又東至于菏又東流至山陽胡陵縣濟隂定陶兩縣之間菏澤又東北㑹于汶又東流折歸北至東平夀張縣與汶水合又北東入于海又北流折歸東以入于海導淮自桐柏淮水雖出豫州南陽平氏縣東南胎簪山東北禹導淮水實自南陽平氏縣東南之桐柏山始東㑹于泗沂東流㑹于沂沂水出太山孟縣南至下邳入泗泗水出濟隂乘氏縣至臨淮睢陵縣與淮㑹沂宜東入于海向東入海導渭自鳥鼠同穴渭水雖出雍州隴西首陽縣渭首亭南谷禹導渭水實自首陽山縣鳥鼠同穴山始其鳥為鵌其鼠為鼷共處一穴故以此為名東會于灃東則灃水㑹焉上文灃水攸同是也又東㑹于涇又東則涇水㑹焉上文涇屬渭汭是也又東過漆沮又東則過漆沮上文漆沮既從是也入于河從京兆北沿司空縣入河導洛自熊耳洛水出冠舉山禹導洛自豫州𢎞農盧氏縣東之熊耳山始東北㑹于澗瀍遂東北㑹澗瀍二水又東㑹于伊又東㑹伊水三水與洛在河南城南㑹又東北入于河又東流而北入河即豫州伊洛瀍澗既入于河是也九州攸同九州所同者無他當洪水既平之後四隩既宅四方深逺處皆可居九山刋旅九州山皆可刋木通道而旅祭九川滌源九州之川皆滌其泉源無壅塞九澤既陂澤皆已陂障無决溢四海㑹同四海之水皆㑹合同入海六府孔修水火金木土穀六府甚修而不廢庶土交正九州衆土壤墳壚埴之異性青黃赤白之異色交相參考而正砥慎財賦致謹財賦責其有不責其無咸則三壤九州皆準則上中下三等之壤以分輕重而成賦法成賦中邦所成賦法止於中國不及夷狄錫土姓可以建國親侯錫之土以為社錫之姓以為宗祗台德先缺德率先之之不距朕行天下順從之不暇何距違之有五百里甸服方千里為王畿其中為王城王城之外四靣各五百里皆為天子治甸下文所納是也百里賦納總甸服內第一節之百里所貢賦使納總謂藳與穗並納以飼馬二百里納銍第二節之百里納銍銍刈禾鐵謂刈禾穗缺納不缺三百里納秸服第三節之百里納藁并有役則服之四百里粟第四節之百里納穀五百里米第五節之百里納米五百里侯服甸服外五百里天子將以建侯立屏藩衛王室百里采第一節百里建卿大夫所食之米地二百里男邦第二節百里建諸男之邦三百里諸侯由三百里之地衆建諸侯五百里綏服侯服之外五百里內近王室外接要荒名曰綏服使之綏安邉境守衛中國三百里揆文教內之三百里使之揆度文教而行之二百里奮武衛外之二百里使之奮武事以衛天子五百里要服綏服之外五百里皆夷狄之地名曰要服特存其典要約羈縻而已三百里夷要服內三百里乃蠻夷之服二百里蔡由二百里中國有惡積罪大之人先王不忍殺之則放於此左傳定四年蔡蔡叔注云蔡放也五百里荒服要荒外五百里亦是蠻夷之地名曰荒服以其荒忽無常王者但以若有若無來不拒去不追待之而已三百里蠻荒服內三百里乃蠻夷之地二百里流由二百里先王以罪人不可以中國畜之故流於此流共工是也東漸于海禹之功成風聲文教東入于海而極西被于流沙西覆于流沙而極朔南暨聲教北與南亦及之以風聲文教訖于四海四方皆至于海而極禹錫𤣥圭洪水之初禹八年于外事從其宜不由中覆堯以𤣥圭命之故禹常執圭以馭衆今水既退則前之所假當與於君告厥成功告君以治水之功成也甘誓第二啓禹之子因征有扈氏將戰于甘之野先於其野以誓衆故其書謂之甘誓啓與有扈戰于甘之野有扈氏夏同姓諸侯之國跋扈不臣天子有征無戰今啓乃與有扈戰于甘之野郊其罪惡可知也作甘誓誓師于甘遂作甘誓之書甘誓此二字竹簡所標題大戰于甘大戰于甘之野乃召六卿天子六鄉每鄉卿一人有事則各率其鄉之萬二千五百人出征今啓召六卿是合七萬五千人王曰啓言嗟六事之人嗟嘆六卿之軍吏士卒有事於征戰之人豫誓告汝我誓告汝有扈氏威侮五行在天五行五常也有扈恃威虐而侮慢之怠棄三正天地人之正理三綱也有扈則怠慢而廢絶之天用勦絶其命故天用勦戮絶滅其命今豫惟恭行天之罰今我惟敬行天之罰左不攻于左古者車戰每車甲士三人步卒七十二人其三人一居左主射一居右主擊刺一居中主執馭或有居左主射而不治左之事汝不恭命是汝不敬奉君之命下同右不攻于右居右主擊刺而不治右之事汝不恭命見上御非其馬之正居中之馬不以正御而以詭御汝不恭命見上用命賞于祖古者天子親征必載遷廟之主于齊車是行軍未嘗不載祖也汝用君命則功成之日賞之于祖廟不用命戮于社左定公四年云軍行祓社釁鼓是行軍未嘗不載社也汝不用君命則戮于社豫則孥戮汝戮辱也我則以汝為孥而戮汝非殺之謂孥戮者秋官司厲所謂其孥男子入于罪隸女子入于舂藁是也漢書王莽舉此言顔師古注曰夏書甘誓之辭孥戮戮之所以為孥也說者以謂孥子也戮及其子非也泰誓曰囚孥正士豈戮子之謂孥奴五子之歌第三聲詩之作雖詳見於三百篇原其所起實本於虞夏之世舜與臯陶之賡歌元首股肱相資以治其言安以樂所謂治世之音也大康失邦五子咸怨述大禹之戒以作歌其言怨以怒所謂亂世之音也此二歌雖載於書其實詩之淵源也太康失邦太康繼啓而立盤于遊畋為羿所距遂至失邦昆弟五人兄弟五人須于洛汭得太康于洛水之北作五子之歌遂作五子歌之書以五人皆有歌也五子之歌舊竹簡所標題太康尸位太康主尊位以逸豫滅厥德乃以淫逸遊豫滅其德黎民咸二黎民皆懷二心乃盤遊無度乃樂為逸豫之事無有節度畋于有洛之表夏都冀州在河之北洛在河南方且縱為田獵逾河至洛之外十旬弗反一百日而猶不反有窮后羿有窮國君名羿因民弗忍因民心怨叛不能忍距于河遂發兵距之河使不得歸于厥弟五人其弟五人御其母以從侍其母以從田獵徯于洛之汭待太康于洛水之北五子咸怨五子皆怨述大禹之戒以作歌述大禹之明謨定訓作歌其一曰其一章云皇祖有訓大祖有明訓民可近民可親而近之不可下不可踈而下之民惟邦本民為國之根本本固邦寧根本牢固然後國安豫視天下豫觀天下愚夫愚婦一至愚之夫至愚之婦一能勝豫雖一人亦能勝豫一人三失今我一人失至于三積之多而不知改之怨豈在明民怨豈可待其明見而後圖之不見是圖未見之先圖之可也豫臨兆民我臨治兆民凛乎若朽索之馭六馬凛凛乎如以朽索之馭六馬朽索喻君六馬喻民六馬奔突豈朽索之能馭哉為人上者奈何不敬奈何不能處之以敬其二曰其二章云訓有之禹訓有言內作色荒內迷亂于寵嬖外作禽荒外迷亂于遊畋甘酒嗜音耽於酒好樂音甘酣峻宇雕牆髙大其屋宇飾繪其垣牆有一于此人君於六者之中有一於此未或不亡無或不亡况兼有之乎其三曰三章言惟彼陶唐帝堯有此冀方堯都平陽舜都蒲坂禹都安邑在冀州有此方實自堯始今失厥道今太康以逸豫失君道亂其紀綱亂天下之紀綱乃砥滅亡乃致滅亡其四曰其四章言明明我祖有明明之德者我祖大禹萬邦之君萬邦之君有典有則有典章法則貽厥子孫貽遺其子孫關石和鈞至於權衡缺石之微三千斤為鈞四釣為石禹關而通之和而平之使天下如一王府則有王之府庫亦有以示後世貽遺子孫詳密如此荒墜厥緒豈謂今日子孫荒廢隕墜其已成之緒覆宗絶祀遂至覆夏之宗絶禹之祀其五曰五章言嗚呼曷歸嗟太康為羿所距今與母倀倀然何所歸豫懷之悲我懷念於心悲傷不能已萬姓仇豫萬姓咸有二心而結仇怨於我豫將疇依我將托誰為依鬱陶乎豫心非特憤結積聚悲憂於我中心顔厚有忸怩外而見於顔靣間亦覺皮厚有忸怩愧耻之色弗慎厥德不能謹慎以修德反以逸豫而滅德雖悔可追今雖欲改悔可追及乎𦙍征第四羲和世掌天地四時之官今乃沈湎于酒廢時亂日仲康命𦙍國之諸侯掌六師以征之征者正其罪也故作𦙍征之書羲和湎淫羲和沈湎于酒過荒失度湎沔廢時亂日廢其時之春夏秋冬亂其日之甲乙𦙍往征之仲康命𦙍侯往征之作𦙍征遂作𦙍征之書𦙍征古史所題惟仲康肇位四海羿逐太康其弟仲康始居天子之位君臨四海𦙍侯命掌六師即命𦙍國諸侯掌六師為大司馬羲和廢厥職羲和廢其所治之職酒荒于厥邑以耽酒荒亂于其邑𦙍后承王命徂征𦙍侯奉仲康之命往征之告于衆曰乃誓告于衆曰嗟豫有衆嗟嗟我所有之衆士聖有謨訓上古聖人有謨訓之言垂後世明徵定保皆所以為明明之證驗定保天下之常法先王克謹天戒日月蝕五星變皆天所以戒敕人君先王之時能敬畏天戒臣人克有常憲為之臣者皆守常法各司其局不敢荒棄其職百官修輔然後百官皆竭力盡心交修輔相其君厥后惟明明是以其君之德明而又明每嵗孟春每嵗首孟春月遒人以木鐸徇于路命遒人之官以金口木舌之木鐸徇于道路以宣布號令官師相規欲在官之衆交相規正人君之得失工執藝事以諌百工各執其技藝之事以諌爭如輪扁以斫輪諌齊威公是也其或不恭倘既令之或有不敬邦有常刑在國有常刑之誅惟時羲和惟是居羲和之職者顛覆厥德如木之顛如苗之覆以喪其德沈亂于酒沈湎徒亂于酒畔官離次叛所掌之官離所居之次俶擾天紀始擾亂在天嵗日月星辰厯數之五紀遐棄厥司逺棄其所主之司乃季秋月朔乃至於九月初一日辰弗集于房日月相㑹謂之辰辰當集合於房之次舍今乃不合於房則日蝕可知瞽奏鼓瞽者樂官進鼓而伐之以日蝕隂侵陽也鼓陽聲所以助陽警隂嗇夫馳嗇夫主幣之官馳取幣以禮天神庶人走衆人奔走以供救日之役羲和尸厥官羲和於此時主其官罔聞知若無所聞知昏迷于天象昏蒙迷惑于天象如此以干先王之誅以犯先王誅戮之刑政典曰周官政典司馬掌之𦙍侯掌六師為大司言馬故舉政典為先時者殺無赦先時而進是邀功也殺之無赦不及時者殺無赦後時而至是逗留也殺之無赦今豫以爾有衆今我以爾等衆士奉將天罰奉行天罰爾衆士同力王室爾衆士當并其力為王室討賊尚弼豫欽承天子威命庶幾輔我敬奉行天子可畏之威命火炎崑岡且火之炎於崑山之脊玉石俱焚不擇玉石而皆焚之天吏逸德至於奉行天討之天吏其行師用兵或有過逸之德不擇良善兼誅並戮烈于猛火則威風烈熖又甚於猛火之焚崑山殱厥渠魁今當止於殱滅羲和渠魁殱纎脅從罔治其脅從者皆赦勿治舊染汙俗舊染羲和之惡為汙穢之俗者咸與惟新皆使赦過自新嗚呼𦙍侯又嗟歎告衆士威克厥愛允濟軍事以嚴終誠以嚴毅之威勝姑息之愛其功信有所成愛克厥威允罔功以姑息勝嚴毅則信無功其爾衆士懋戒哉當敬勉戒飭無棄我命自契至於成湯八遷此非𦙍征文乃孔子作逸書序自契至成湯十四世而八建都湯始居亳至湯始居亳邑從先王居以契父帝嚳嘗都亳所以從先王而居作帝告釐沃於是作帝嚳釐沃書書亡所言皆湯始居亳之事釐治沃土也湯征諸侯湯之征伐諸侯葛伯不祀葛伯以不祀宗廟神祗之故湯始征之湯始伐之作湯征於是作湯征一篇亡伊尹去亳適夏湯得伊尹於莘野薦之夏所以離去亳而往夏也既醜有夏伊尹五就桀而醜惡之復歸于亳復自夏歸于亳入自北門入自亳之北門乃遇汝鳩汝方乃遇見湯之汝鳩汝方二賢臣作汝鳩汝方遂作汝鳩汝方二篇書亡意其所言必夏之事也尚書句解卷三
