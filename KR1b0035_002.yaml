body:
  text: 尚書句解卷二元朱祖義撰大禹謨第三序書者曰臯陶矢厥謨禹成厥功君子亦曰禹以功臯陶以謨不聞禹有謨也今此篇以大禹謨名詳觀所載又皆非大禹之言大禹不過克艱與六府三事數語而已何也禹非不能言所謂謨者即言其所能行臯陶非無功所謂功者即行其所能言聖賢之德其可以一端求歟臯陶矢厥謨臯陶矢陳其謨陶搖禹成厥功禹成其功帝舜申之帝舜重美二子作大禹臯陶謨益稷於是作此二篇之書大禹謨舊竹簡所標之題曰若稽古大禹史官言順考古道而行之者大禹曰文命敷于四海謂其有文德之教命布于四海祗承于帝能祗敬繼承帝舜之治曰禹言后克艱厥后君盡君之道而能難於為君臣克艱厥臣臣盡臣之道而能難於為臣政乃人則政乃治而政教禮刑無不理黎民敏德由是衆人皆敏疾於修德帝曰俞舜言俞所以然之允若兹惟堯信能如此嘉言罔攸伏故人有嘉謨嘉猷皆入告于上而無所隱伏野無遺賢草野中有賢皆得仕於朝而無所遺棄也萬邦咸寧萬邦以此皆安稽于衆堯猶稽考於衆人以訪政治之得失舍己從人舍己所謀以從人所謀不虐無告民窮而無告者堯則哀矜之而不虐不廢困窮士之失職困窮在下者堯則任用而不廢惟帝時克凡此惟堯是能益曰都益於是言都以申美帝堯帝德廣運謂堯德大於運用其於前數者亦優為之乃聖乃神故自大而化之而言乃謂之聖自聖不可知而言乃謂之神乃武乃文自武之可畏而言乃謂之武自英華外發而言乃謂之文皇天眷命由是皇天眷佑而命之奄有四海為天下君盡有四海之廣而為天下之君禹曰禹乃言惠迪吉信乎順道而行則天應以吉從逆凶從逆而行則吉變為凶惟影響吉凶之來如影隨形響應聲益曰吁益遂吁嗟而言戒哉謂人君所以順道而不從逆者亦自警戒而得警戒無虞當警戒於無事可度之時罔失法度無失法度而紛更舊章罔遊于逸無遊于安逸罔淫于樂無過于樂任賢勿二知其賢而任之必專不可有所二去邪勿疑知其邪而去之必決不可有所疑疑謀勿成去邪而疑必待謀之於人則勿成之矣百志惟熙警戒如此則百為之志既廣且明何向不濟罔違道以干百姓之譽無違道以干求百姓之譽罔咈百姓以從己之欲無逆百姓以從己所欲咈音弗無怠無荒惟無怠惰無荒忽四夷來王則是聖君在上四夷莫不來朝享而尊為王禹曰於禹於是歎美而言於音烏帝念哉舜其念於心而不忘者無他德惟善政以德為政斯為善政政在養民所謂善政惟在養民水火金木土榖惟修六者所以養民之身也疏鑿鑽灼使水火適其用冶鑄矯操使金木成其材墾闢播種使上榖全其利而六府無不修矣正德利用厚生惟和三者所以養民之心也正民之德使無偏而無黨利民之用使求得而欲從厚民之生使家給而人足而三事無不和矣九功惟敘合之為九功修和而得其敘九敘惟歌九者得其敘則民皆頌而歌舞之戒之用休然後警戒之以休美使知勤於此者有無窮之美利董之用威董督之以威使知怠於此者有可畏之刑威勸之以九歌復以前日九敘之歌勉之使之歌詠其事樂而忘勞俾勿壞凡此皆所以使民共起修和九功而勿壞帝曰俞舜聞禹言信而然之地平天成謂在地之水土既平在天之時既成六府三事允治六府三事信乎其治萬世永賴為萬世永賴而無所終窮時乃功皆是汝治平水功致之帝曰舜言格汝禹至汝禹朕宅帝位我居帝位三十有三載舜至六十二始即位至此三十三年夀九十五矣耄期倦于勤禮記八十九十曰耄百年曰期頤期要也頤養也謂年老不知衣服食味惟要孝子頤養實倦怠於勤勞之事汝惟不怠汝惟不倦怠總朕師總攝我衆民禹曰禹答云朕德罔克我德不能勝任民不依民不依附我臯陶邁種德臯陶逺種其德如農之種植德乃降德乃下及於民黎民懷之衆民皆懷歸之帝念哉舜當念念於臯陶而不忘念兹在兹念其可受此位者惟在此臯陶釋兹在兹捨臯陶之外求之餘人無有及於臯陶則可受此位者亦在此臯陶名言兹在兹名言於口以為在此臯陶允出兹在兹信出於心亦以為在此臯陶惟帝念功惟舜當於此念其功而用之帝曰臯陶舜於是稱美臯陶而命之曰惟兹臣庶惟此羣臣庶民罔或干豫正無或有一人敢犯干五常之正理者汝作士實惟汝臯陶作士師之官明于五刑能明審于墨劓剕宫大辟之五刑以弼五教以佐五常之教所不逮期于豫治其所期望者直期如我之欲治刑期于無刑施刑之際必欲天下皆為君子長者之歸可以致無刑之效民協于中民皆合於中道無一夫犯法者時乃功是汝臯陶之功懋哉可不勉哉臯陶曰臯陶又復歸功於舜而言帝德罔愆叶中之效實本於帝德無愆過而適中臨下以簡欲能臨涖其下以簡略御衆以寬御治其衆以寬恕罰弗及嗣罰止其身不及其嗣賞延于世賞不止一身而延及後世宥過無大過誤而犯雖大罪亦在所宥刑故無小故意而犯雖小罪亦在所刑罪疑惟輕可以刑可以無刑罪之可疑也罰疑從去故惟輕功疑惟重可以賞可以無賞功之疑也賞疑從豫故惟重與其失不辜寧失不經與其殺無罪之人寧可失不常之罪而不及誅好生之德由是帝舜好生惡殺之德洽于民心浹洽于民心兹用不犯於有司於此民皆知自愛用不犯有司之法帝曰帝再申美臯陶之功而言俾豫從欲以治使我得以從所欲而治四方風動四方之民如風動而草偃日趨於善惟乃之休實汝之美帝曰來禹舜命禹來洚水警豫天以洪水為災警戒於我成允成功汝之治水自信其必能成功惟汝賢所以惟有汝賢克勤于邦能勤勞于邦克儉于家能節儉于家不自滿假不自盈且大惟汝賢惟有汝賢汝惟不矜汝惟不以其能誇耀於人天下莫與汝爭能則天下自莫有與汝爭能汝惟不伐汝惟不以其功誇大於人天下莫與汝爭功則天下自莫有與汝爭功豫懋乃德此我所以懋勉汝之德而使汝不已嘉乃丕績嘉美汝之大功不敢少忘天之厯數在汝躬以天之厯數推之君位當在汝之身汝終陟元后汝終升大君之位人心惟危奈何人君惟有一心人欲之役於心者既危而難安道心惟微則天理之存於心者遂微而易泯惟精惟一吾惟精專而不雜純一而不二允執厥中信以執其中道斯可矣無稽之言勿聽然無所考合於古而言者謂之私言亦足以惑吾之中也吾則不聽弗詢之謀勿庸無所詢訪於衆而謀者謂之私謀亦足以惑吾之中也吾則不用可愛非君可愛者非君乎可畏非民可畏者非民乎衆非元后何戴苟民不愛君則衆非長君何所奉戴后非衆罔與守邦君不愛民則君非衆人無與守欽哉君民相須如此汝不可不欽敬慎乃有位以謹守汝所有之位敬修其可願以敬修汝之所可願欲者四海困窮苟四海之民至于困窮無告而不恤天祿永終則人君所享之天祿長絶矣惟口出好興戎惟口之所發或出好以賞善或興戎以罰惡一定而不可變朕言不再則我之所以命禹者亦一定而不可易豈可再乎禹曰禹乃辭曰枚卜功臣更可歷歷以有功之臣卜之若杖數然惟吉之從惟其吉者從之帝曰禹舜命禹官占且帝王立卜筮之官於卜占之際惟先蔽志惟先蔽以在己之志昆命于元龜然後始命于大龜以卜之朕志先定今我之志其欲禪禹者己先定於中矣詢謀僉同又詢謀咨問於衆人其致意於禹者衆皆同辭矣鬼神其依鬼神依隨其所謀龜筮協從故見於卜龜筮策之際無不合從卜不習吉汝又欲使我枚卜夫再三瀆瀆則不告豈有重卜重吉哉禹拜稽首固辭禹首至地為稽首而拜堅以辭之帝曰毋舜言毋以禁止之毋音無惟汝諧惟汝能諧和其事正月朔旦乃以明年正月一日受命於神宗禹受命於堯廟祭法曰有夏氏祖顓頊而宗堯則神宗為堯明矣率百官若帝之初率百官若舜攝位之初在璿璣而下是也帝曰舜言咨禹命禹惟時有苗弗率向者已遷有苗之君于三危惟是有苗之惡黨又不率教汝徂征汝禹可往征之禹乃會羣后禹乃會聚羣諸侯兵誓于師曰誓于衆曰濟濟有衆有衆濟濟而盛咸聽朕命皆聽我命誓蠢兹有苗今蠢動作亂者惟此有苗蠢春允反昏迷不恭昏昧迷惑不敬上帝侮慢自賢輕忽上之教命而自以為己賢反道敗德反正道而從邪道敗棄在己之德而不修君子在野君子則棄在野小人在位小人則用在位民棄不保民既棄之而不與守國天降之咎天亦降下災咎而不恤肆豫以爾衆士故我以爾等衆士奉辭伐罪奉其可伐之辭以伐彼可伐之罪爾尚一乃心力爾庶幾一爾心力其克有勳則能有成功矣三旬苗民逆命禹奉帝命討罪以師臨之一月有苗之民乃奉迎帝命而來服如金縢惟朕小子其新逆顧命逆子釗於南門之外皆解逆為迎是有苗之民雖迎迓順從其命令有苗之國君黨惡則未服益贊于禹曰故益乃贊佐于禹曰惟德動天天雖逺矣惟德可以感動無逺弗屆德無逺而不至况有苗乎滿招損苟自滿則適以招損謙受益惟自謙則可以受益時乃天道虧盈益謙是乃天道之常禹宜以謙沖為德不與苗較則苖自服帝初于歷山且如舜初以側微居厯山往于田往耕于田日號泣于旻天于父母日日號泣哀籲于旻天以不得意于父母負罪引慝惟自負荷其罪引咎于己祗載見瞽瞍一旦舜敬以其事見瞽瞍夔夔齋栗夔夔然恐懼而有齋莊嚴栗之容瞽亦允若故雖瞽瞍之頑亦信順之况有苗乎至諴感神且幽而莫測為神可以至諴而感動矧兹有苗況此有苗小人耳反而自修何憂不格禹拜昌言曰俞禹於是拜受益之善言俞以然之班師振旅遂還師於有苗之國整理其衆而歸帝乃誕敷文德舜乃大布文德以懷來之舞干羽于兩階舞干羽於賔主之兩階即文德也所以示偃武修文之意干楯也羽翳也皆舞者執之以修闡文教七旬有苗格故有苖國君之惡黨知舜待我之厚其退省至乎七旬乃舉國而至臯陶謨第四此篇其初因禹之問答其後皆臯陶所陳之謀謨可為萬世帝王之法故名之以臯陶謨臯陶謨孔子於大禹謨總序此篇故此篇只從古書所揭之題起陶搖曰若稽古臯陶史官言順考古道而行之者臯陶曰允迪厥德臯陶告大禹曰凡為臣欲以至誠啓迪人君之德者謨明弼諧必須所進之謨明然後其所輔弼自然諧和於人主之前不至詆訐太甚禹曰俞禹於是信其言如何問其當如何臯陶曰都臯陶言都以美其問慎厥身修謂不過告人君詳其身之所修思永思為長逺之計惇敘九族厚以次敘九族則家齊矣庶明勵翼衆明之臣勉勵輔翼則國治矣邇可逺在兹夫近而吾身以至家國既可如是而治然後逺而治天下不外乎此道則天下平矣禹拜昌言曰俞禹於是拜臯陶之善言俞以然之臯陶曰都臯陶又推廣其義先美而後言在知人為治之道在於知人而無一賢之不察在安民在於安民而無一民不得其所禹曰吁禹於是嗟歎而言咸若時知人與安民皆順是二者而行惟帝其難之雖堯尚以為難和人則哲蓋知人則在於明哲能官人然後能官使人才安民則惠安民則在於恩惠黎民懷之然後衆民懷歸之能哲而惠惟帝堯能盡己之哲以知人善任使如孟子所謂為天下得人謂之仁將見承流宣化者各任其職而恩惠足感黎民之懷何憂乎歡兜則黨惡如歡兜何必憂之何遷乎有苗頑如三苗何必遷之何畏乎巧言令色孔壬巧言令色靜言庸違其憸壬如共工何必畏之臯陶曰都臯陶又先美而後言亦行有九德知人雖難在於知其人所行之行有九德亦言其人有德然後言論其人有九德乃言曰乃敢言論曰載采采此人之德見於行某事行某事厯厯指實而言之禹曰何禹問何謂九德臯陶曰臯陶言寬而栗寬者易失之縱必貴於莊栗柔而立柔者易失之懦必貴於有立志願而恭淳朴謹願者常略於外貌必貴於恭肅亂而敬有治亂之才者常恃才輕物必貴於莊敬擾而毅循理安分之人多失於無斷必濟以果毅直而溫直情徑行之人多失於不能容物必濟以溫和簡而亷簡率之人常不謹細行不修亷隅故貴於亷剛而塞剛者當行而行無所避忌然多色厲而內荏故貴于塞實強而義強者執己所是不為衆撓然多動不合宜故在於義彰厥有常吉哉人君當彰顯擢用九德之中有常善而不變者即立政庶常吉士是也日宣二德治一家者其事略卿大夫當日宣達夫人有九德之三者夙夜浚明有家使之夙夜深明所有一家之事浚峻日嚴祗敬六德治一國者其事詳諸侯當日日嚴之祗之敬之以用夫人有九德之六者亮采有邦使明其事於所有之邦翕受敷施至於天子有天下比侯國又詳故必合衆人之有九德者受之以敷布施於列職之間九德咸事如此則九德之人皆趨於事俊乂在官俊而有德乂而有才者皆在官百僚師師百官僚屬皆相師法百工惟時以之冶百事皆得其時撫于五辰故能順金木水火土之五辰木王春火王夏金王秋水王冬土王四季百事皆因時而作庶績其凝宜衆功之有成無教逸欲有邦人君所為諸侯所法無教安逸縱欲於有邦之諸侯兢兢業業惟當兢兢而戒謹業業而恐懼一日二日萬幾誠以一日二日之間而有萬事之繁安危治亂之機常存於細微之際無曠庶官不可曠廢衆官天工人其代之以人君所治皆天之事必須人以代治之天敘有典天次敘人所有父子君臣夫婦長幼朋友五常之道敕我五典五惇哉天雖序之必須人以代天敕正我之五典然後五典有惇厚之風天秩有禮天秩敘人有吉凶軍賔嘉之五禮自我五禮有庸哉天雖秩之必須人以代天因我之五禮然後可以常行而不惑同寅協恭和衷哉君臣可不同其寅畏叶其恭謹和其衷善相與共成典禮哉天命有德以至有德者天所命五服五章哉必人代天彰之以五等之服天討有罪有罪者天所討五刑五用哉必人代天用之以五等之刑政事懋哉懋哉如是則人君於刑賞之政事可不勉而又勉哉天聰明况天至聰明自我民聰明乃因我民視聽為聰明天明畏天至明畏自我民明威因我民好惡為明威達于上下天位乎上民位乎下當相通達敬哉有土有土之君位乎天民兩間可不敬哉臯陶曰臯陶又告禹曰朕言惠我言順理可砥行可致而行禹曰俞然之乃言砥可績汝言豈但可行致而行之必有成功臯陶曰臯陶又言豫未有知行我之言成功實在禹我未有所知思日贊贊襄哉但心之所思口之所言惟欲相成禹之功而已益稷第五書之名篇未嘗有以二臣共一篇者以益與稷道同德合無有異志故以名其篇益稷二字史官舊題帝曰舜曰來禹呼禹來汝亦昌言汝亦陳善言禹拜曰都拜而歎美帝豫何言先稱帝而後謂臯陶之謨既已盡善我復何言豫思日孜孜我但思念日日孜孜以盡躬行之力耳臯陶曰吁吁嗟而疑怪之如何問禹孜孜者何事禹曰禹乃言洪水滔天洪大之水其勢漫天浩浩懷山襄陵浩浩然盛大包山過陵下民昏墊在下之民精神昏惑雖墊陷沉溺不自知墊玷豫乘四載我乘此四種之載水乘舟陸乘車泥乘輴以板為之其狀如箕以板行泥上山乘樏以鐵為之其利如錐長半寸施之履下以上山不跌隨山刋木隨山勢刋除其木開通障蔽以致功暨益奏庶鮮食與益因其焚烈助我治水所得新殺鳥獸之鮮者進之庶民以充食豫決九川我決九州川澤之水距四海使至於海則大小有所歸濬畎澮距川濬導畎澮之水使至川則水有所歸案考工記匠人為溝洫廣尺深尺謂之畎廣二尋深二仭謂之澮乃田間水道以正疆界備旱潦者暨稷播奏庶艱食鮮食洪水既平與稷播種而進衆民以稼穡艱難而後成食又以決川所得魚鱉殺而鮮者充民食之乏懋遷有無化居然後懋勉斯民使遷有之無變化其物之居積者如魚鱉徙山林林木徙川澤是也蒸民乃粒衆民乃享粒食之利萬邦作乂萬邦之氏皆趨於治臯陶曰俞臯陶言然師汝昌言謂我當師法汝昌言禹曰都禹又先美後戒帝慎乃在位謂舜謹慎乃可在位帝曰俞舜言然禹曰禹言安汝止謂當安行汝之所當止謂人君止於仁是也惟幾惟康其弼直又慮事之微於未著圖國之安於未危然後輔弼之臣敢於盡正直之義惟動丕應傒志一有動作已為而人大應之未為而人待其志以昭受上帝宜其以此而明受上天之眷天其申命用休天其重命之以休美之命而不已帝曰吁舜言吁以歎其如此實賴人臣之助臣哉鄰哉欲盡臣之職者必有以親於君鄰哉臣哉能親於君者斯可盡臣之職禹曰俞禹言俞以然之帝曰舜乃言臣作朕股肱耳目君有動作視聽實須臣以為股肱耳目之助豫欲左右有民我欲左右扶持所有之民汝翼汝禹當為朕股肱以輔翼之豫欲宣力四方我欲布治功於天下汝為汝禹為朕股肱代我為之豫欲觀古人之象我欲觀古人取象於物以作服易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤是上衣下裳制自黃帝堯舜因之日月星辰此下即十有二章取象於物也日月星辰謂之三辰取其明山取其靜龍取其變華蟲雉也取其文作會讀為繪謂以五色繪畫前六者於衣宗彛宗廟彛尊取其孝藻水草取其潔火取其能照粉米取其養人黼如斧形取能斷音甫黻為兩已相背取其能辨音弗絺繡絺讀為黹展里反黹綟謂縫也以前六者絺以繡施之於裳絺蚩以五采彰施于五色作服取象十二章之物以五采明施青黃白黑赤五色或繪畫或刺繡以為上衣下裳以質言之則曰采以所施者言之則曰色汝明汝禹當為朕目以明制度豫欲聞六律我欲聞六律即黃鍾大簇姑洗蕤賔夷則無射五聲單出為聲即宫啇角徵羽八音雜出為音即金石絲竹匏土革木以律和聲而播之於八音以為樂在治忽以是樂察政事之治亂以出納五言以是樂出五言謂受君之言以播於樂使其言合於宫啇角徵羽之五聲民聞之者皆洞曉上意以是樂納五言謂采民之言以播於樂使其言亦合於五聲君聞之足以為戒汝聽汝禹當為朕耳以聽之豫違汝弼我有違失汝禹當弼正之汝無靣從汝無面從其君以為是退有後言退則背議其君以為非欽四鄰故我欽敬左右前後鄰近之臣忠於弼違紏過者庶頑讒説或有不以弼違為意多為是心不則德義肆其巧言謗丄若不在時意本在是而言似不在是者侯以明之汝當講射侯之禮以明其賢否撻以記之若果頑然不可化必鞭撻之使記過而不忘書用識哉又書其過於册以記其事為他日格不格之驗欲並生哉惟欲與之並生於世而為善之歸耳工以納言又使樂工採其言以納之時而揚之時以舉揚於上觀其格不格者格則承之庸之至於善則受而用之否則威之不至於善則威之以刑禹曰俞哉案春秋傳太子欲殺渾良夫公曰諾哉諾哉云者口諾而心未諾然也今禹言俞所以然舜之言俞哉又未敢全以舜之言為然者帝光天之下蓋謂堯德之光為能及於天下至于海隅蒼生又至於四海之隅草木蒼然而生之處萬邦黎獻則萬邦衆賢共惟帝臣皆欲共為帝者之臣惟帝時舉惟帝舜一時舉而用之是矣又安有庶頑讒説勞帝刑威之用耶敷納以言賢者既舉必使之敷陳嘉言以納於上明庶以功明其衆庶之賢否者又當以功車服以庸有功則旌以車服而用之誰敢不讓若然則誰敢不謙遜其志不矜不伐以立功耶敢不敬應又誰敢不以敬而應上之命以立功耶帝不時帝苟不如是敷同日奏罔功則布同天下皆日進於無功之地無若丹朱傲無如堯之子丹朱傲狠漢書溝洫志云堯禪舜朱處丹為諸侯則朱是名丹是所封之國惟慢遊是好惟怠慢之遊是好傲虐是作所作者傲而至于虐罔晝夜額額無有晝夜慢遊傲虐額額然未嘗休息額音額罔水行舟又矜其勇力陸地行舟朋淫于家多聚朋黨而淫亂于家用殄厥世所以用絶于世不得以有天下豫創若時我懲創丹朱如是娶于塗山故娶塗山氏之女辛壬癸甲辛日娶至甲日即往治水甫及四日啓􅈱􅈱而泣其後有子名啓􅈱􅈱然泣􅈱孤豫弗子禹過其門亦不以子故而留以撫字之孟子言禹八年於外三過其門而不入是也惟荒度土功惟大謀度乎水土之功弼成五服水土既平然後五服之制古有成法禹於是輔成之使復其舊至于五千每服五百里五五共二千五百里東西相距為五千里南北相距為五千里直方為萬里州十有二師甸侯綏方二千里是九州之內也每州立十二人為諸侯師外薄四海要荒各一千里是九州之外也薄近四海咸建五長每一服皆五人為長各迪有功故內外相維蹈迪其職而各砥成功苗頑弗即工獨有苖頑不率不肯就官立功帝其念哉舜當以苗民為念帝曰舜聞禹言乃歸美其功而言迪朕德內外所以各迪我德而有功者時乃功惟敘皆是汝治水能致九功之惟敘臯陶方祗厥敘臯陶方始得以敬承汝功之有其敘方施象刑惟明方始施象刑而明以示人如周官垂刑象于象魏使人知畏而保其功於無窮夔曰夔乃自述其作樂之功而言戛擊鳴球鳴球玉磬也戛擊之則鳴戛秸搏拊琴瑟以詠搏拊琴與瑟以歌詠燕禮曰堂上之樂以歌為主祖考來格祖考感樂之和而來至虞賔在位丹朱雖頑以堯之後為賔於虞亦在助祭之位羣后德讓與羣諸侯相讓下管鼗鼓燕禮曰堂下之樂以管為主鼗鼓如鼓而小持其柄而搖耳旁自擊以出音合止柷敔柷狀如漆桶方一尺四寸深一尺八寸中有錐柄左右擊以合樂於始也敔狀如虎背上有二十七鉏鋙刻以木長二尺櫟之以止樂於終敔語笙鏞以間笙以匏為之列管於匏上而施簧於管端鏞大鍾也吹笙擊鏞以次迭作鳥獸蹌蹌雖鳥獸微物亦感至和蹌蹌然而率舞蹌音鏘簫韶九成簫韶舜樂總名合奏九變而樂成以象九功之成鳯凰來儀至靈如鳯凰亦感其和而來有容儀之可觀夔曰夔又自述作樂之功而言於豫擊石拊石石磬也八音之中石為難和於我大擊小附百獸率舞百獸感其和而皆舞庶尹允諧衆正官之長亦冇所感信皆諧和帝庸作歌曰舜乃用功成作樂之意作歌曰敕天之命惟時惟幾今雖天命眷顧常當警敕不可以治功成而自忽惟時以趨事惟幾以察微乃歌曰乃歌云股肱喜哉股肱喻臣也大臣喜而樂於赴功元首起哉元首喻君也人君之治功翕然奮起百工熙哉百工之職業自然廣大臯陶拜手稽首揚言曰手至首為拜手首至地為稽首大言宣於庭念哉我等當思念帝歌率作興事相率作興政事慎乃憲謹慎汝之常法欽哉敬哉屢省乃成再三循省汝治功之成欽哉敬哉乃賡載歌曰臯陶乃又賡續帝歌有未盡者載成其歌云元首明哉君明於上股肱良哉則臣忠於下庶事康哉然後庶事安康而無紊亂又歌曰臯陶又歌以為戒云元首叢脞哉人君親細碎不務大略屑屑侵臣職脞取果反股肱惰哉則人臣怠惰不共乃職事萬事墮哉然後萬事從而隳廢矣墮音隳帝拜曰俞舜乃拜受其言俞以然之云往欽哉自今以往君臣皆當敬其事而行之尚書句解卷二
