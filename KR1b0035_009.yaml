body:
  text: 尚書句解卷九元朱祖義撰洛誥第十五周公攝政七年成王年已二十公知王君徳已成可居君位故復辟告歸王知公不可一日去已故堅留不與其去何前日疑公而今乃復留之葢今日成王非昔日成王七年之間周召左右所以誘掖開導之者深矣故此篇首載周公在洛遣使告卜之言中載成王留公之意後載公歸自洛與王對荅之語故作洛誥之書召公既相宅召公既如洛相度其所居周公往營成周周公繼往經營成周以遷頑民使來告卜於是使使來鎬京告王以所卜吉兆作洛誥遂作此書洛誥竹簡標題周公拜手稽首曰周公手至首首至地致敬於王而後遣使告卜辭曰朕復子明辟我於營洛之後即欲還子明辟之位辟壁王如弗敢及天基命定命我向時所以居攝者以王意謙謙如恐不敢及於文王之基命葢周家之命基於文王也不敢及於武王之受命葢周家之命定於武王也予乃𦙍保我乃繼文武保有天命大相東土於是大相視鎬京之東洛土以營作新邑者其基作民明辟不過為成王基立其為民明君之本而已予惟乙夘我惟以乙夘日朝至于洛師早朝至洛地衆民興作之師即召誥周公朝至于洛是也我卜河朔黎水我以龜卜宅於大河之北黎水之上卜此不吉我乃卜澗水東我乃渡河而南卜於澗水之東瀍水西惟洛食惟洛地則龜兆食墨而吉葢古者卜龜先用墨畫龜而後灼之而其兆之文循墨而行如食墨然則謂之吉也我又卜瀍水東又踰瀍水之東卜之亦惟洛食亦惟洛地龜兆食墨而吉夫周公聖人其宅洛之計已定於胸中然猶卜於河朔澗瀍東西再三不能自已者葢以實其皆不如洛之吉耳伻來使來鎬京伻絣以圖及獻卜以洛之地圖及卜之吉兆獻之於王王拜手稽首曰王乃手至首首至地以謝公獻卜之言而留公曰公不敢不敬天之休公不敢不敬上天眷命我周之休美來相宅所以來洛地相視其所居其作周匹休將以作周室配天之休美公既定宅公今既定其所居矣伻來又使使者逺來來視予卜休恒吉所以來者示我以所卜之休美可以常膺之吉祥我二人共貞須得公與我二人同心協力貞固以守此吉祥公其以予萬億年敬天之休公其以我歴萬億年敬受天之休美拜手稽首誨言使我常得致所以求訓誨之言周公曰公歸自洛邑在鎬京訓誨成王曰王肇稱殷禮今日新邑既成王當肇始率行盛禮祀于新邑以祭于新邑之地咸秩無文皆秩叙其禮文所以載者祀之予齊百工我則整齊百官伻從王于用使從王往新邑時周公尚為冢宰百官尚總己以聴於公予惟曰我惟告百官曰庶有事汝從王而往庶幾有所行事於周今王即命曰今王即當命百官曰記功宗我往新邑非有他也將記功之尊者以功作元祀以功之尊者而作為大祀即祭法所謂聖王之制祭祀也法施於民則祀之以死勤事以勞定國能禦大烖能捍大患則祀之此周公正欲禮樂自成王始也惟命曰成王乃惟命周公曰汝受命篤弼汝受命於文武厚輔於我丕視功載當為我大視功之所載於禮之合損合益祀之合豐合殺也乃汝其悉自教工乃汝周公當盡自以己命百官是成王未欲禮樂自已出也孺子其朋故周公呼成王為孺子謂若欲己自教百官當念及朋黨之禍孺子其朋其往所以當念朋黨之禍者自今以往絶之於未萌無若火始燄燄無使若火之始然其初但燄燄而已厥攸灼敘弗其絶及燄燄而不已其所灼燒者有次敘不可絶也厥若彞王今將如何哉亦在順其常道及撫事及撫臨政事之際如予惟以在周工一如我之所為惟用在周之百官不必更求新進以間舊人自開朋黨之門往新邑今王往治新邑伻嚮即有僚當使此在周之人各自因其職而面兢其所有之僚明作有功惟其有功之人明然以奬勸之術作成之惇大成裕如此則為君者能厚其廣大之道成就其綽綽有餘裕之徳汝永有辭汝成王可長有稱譽之辭於世公曰公又告王而言已汝惟沖子惟終已矣乎汝成王乃童子今日初即政思有以善其終者汝其敬識百辟享在汝先自致敬以識認衆諸侯之朝享能致其誠者辟壁亦識其有不享亦識認其有不能誠於享上者享多儀以享上之道在於多禮儀不區區在於物儀不及物使諸侯來朝禮儀疎略不及乎幣帛之多則是物有餘禮不足惟曰不享身雖來朝與不享同故雖享而曰不享惟不役志于享以其不用心於享上凡民惟曰不享若然則非特諸侯不用心與享上凡為民亦將則而效之而無奉上之意惟事其爽侮天下之事安得不爽亂而肆其輕侮哉乃惟孺子頒朕彼諸侯享上尚不可區區於物而不盡其誠况成王以孺子為君待周公之臣徒有髙爵厚禄頒賜於我不暇聽朕教汝于棐民彞略不暇聽我所教汝棐輔斯民常性之道汝乃是不蘉汝乃是不能自勉而怠於民事蘉忙乃時惟不永哉何能於是而保長永之業篤敘乃正父武王云為注措無不一出於正故曰正父王今當篤厚以次敘汝正父所為而奉行之罔不若無所不順予不敢廢乃命則汝有所為我亦不敢廢汝命汝往敬哉今汝往新邑即辟當敬其所行之事兹予其明農哉我亦欲退歸州里申明農事如今人謂歸田里彼裕我民王若與彼新邑裕厚我民無逺用戾則民無逺而皆用戾止王若曰公欲告老歸農王於是留之意若曰公明保予沖子公未可遽退且留以明明師保教誨成就我㓜沖之子公稱丕顯徳在公自舉一己大明之徳以予小子揚文武烈以我小子之故發揚文武之成功使昭昭然暴白於天下奉荅天命以此奉荅上天之命和恒四方民以此而和四方常性之民居師居大師之位而無愧惇宗將禮乃可惇厚尊崇其大禮稱秩元祀以舉行次序其大祀咸秩無文凡不在祀典法應祀者皆以序祀之惟公徳明惟公之徳明顯光于上下上則光著于天下則光著于地謂格于天地也勤施于四方逺則勤施于四方欲無往不被旁作穆穆迓衡旁則作成穆穆致敬之徳以迎迓太平之治不迷文武勤教親承文武勤勤之教以輔相我者庶以不迷失之予沖子夙夜毖祀我㓜沖所當自任者惟早夜謹祭祀之禮王曰又申美周公之言公功棐迪篤公功所以棐輔啓迪於我者甚厚罔不若時如上文之功無不如是之厚也王曰公又呼公而言予小子其退即辟于周我小子今其退朝就君位于洛邑命公後欲為公立後命伯爵封為諸侯四方迪亂況公於四方有以開其已治之效未定于宗禮尚未定所以尊公之禮亦未克敉公功若遽告歸恐亦未能有以定公之功雖公於此無心而成王實懍然不自安也迪將其後我是以封伯禽而啓迪周公之後監我士師工公當且留為我監臨此治政事之衆官此士與見士于周之士同謂政事之事誕保文武受民大保安文武所受民于天者亂為四輔使治功無愧於為王左右前後之輔臣也王曰王又告公公定公當定其留計予往已我惟往新邑而已公功肅將祗歡公功著在人心公又能肅敬以自將不矜伐以驕人人皆敬而喜之公無困哉公今必當為我曲留共冶斯民豈可有倦于勤之心哉我惟無斁其康事我惟無厭斁其安民之事公勿替刑公誠能不廢其所以儀刑四方之意四方其世享四方民亦世世享其徳矣周公拜手稽首曰公於是手至首首至地致敬於王許以留王命予來謂王前所言乃命我來洛邑者承保乃文祖受命民欲我奉安汝文徳之祖文王受命于天所得之民越乃光烈考武王及增光汝功烈之父武王之功𢎞朕恭以此大我恭敬之心使我大盡其敬以為之也孺子来相宅則為孺子者自今来洛相其所居其大惇典殷獻民必當大厚其常禮以待商賢臣之有老成人者以安商人之心亂為四方新辟將以致治為四方之新君辟壁作周恭先為用家敬徳之王相繼敬徳者皆推成王為先曰公又言其自時中乂王自是中土洛邑以治萬邦咸休萬邦至皆有治平之美惟王有成績惟獨成王有成功矣予旦以多子越御事周公稱名而言我旦但與衆卿大人及治事之臣篤前人成烈相與以篤厚増光前人文武之成功荅其師還以是功荅天下衆民之望作周孚先與周家有信徳之臣凡躬行信徳者皆推周公為先考朕昭子刑王試考我前此所明示子以儀刑之道乃單文祖徳乃盡是文徳之祖文王之徳伻來毖殷前日我在洛邑營作時王使使來毖謹勞來殷民伻絣乃命寧予以秬鬯二卣乃因而命安慰我以秬鬯二卣秬黑黍也一稃二米天地中和之氣所産也鬯香草也以此米與此草揉而為酒卣中尊也王以此酒二尊與我時曰明禋乃言明禋精意以享謂之禋謂使我以此酒明潔禋祀也拜手稽首休享周公於是拜手稽首而致美以享神予不敢宿我於此時不敢宿留王命于家則禋于文王武王即以此酒精意以致祭于文武之廟此乃成王以公有人臣所莫能為之功故賜公以人臣所不用之禮樂也惠篤敘周公蒙如此之賜當如何哉不過順冶功已厚之次序不可改作無有遘自疾無有遇自疾苦之事以自害其良心萬年厭于乃徳將見冶功愈厚而天下之民雖萬年之久皆飽於成王之徳即醉酒飽徳之時殷乃引考殷民亦必感化長有所成謂風俗歸厚一成不變也王伻殷乃承敘故王有所使令則殷民乃承其事之次敘順㫖無有或違萬年其永觀朕子懷徳如此則非特周民飽徳雖殷民亦將萬年之久長觀於我與子成王而懷歸其徳也戊辰周公攝政之七年十二月晦日戊辰王在新邑王到洛在新邑烝祭歳親行烝禮祭文武於歳盡之日文王騂牛一武王騂牛一周尚赤二王廟各用赤色牛一頭騂音辛王命作册成王命有司之言作告神冊書逸祝册又命史官名逸者為之祝其所作之冊書惟告周公其後祝告文武言將為周公立其後王賔殺禋咸格王國之賔諸侯聞王將殺牲精意祭祖廟故皆至于洛以助祭王入太室祼王遂入清廟之太室灌以告神祼灌也謂以圭瓚酌於爵以獻尸尸受酒而不飲因灌於地故謂祼祼貫王命周公後王就廟命周公之後封伯禽於魯作册復作命伯禽之册書逸誥使史逸讀以告伯禽在十有二月此又史官總記周公攝政之年月謂自武王崩後居攝至此年十二月惟周公誕保文武受命惟七年惟周公大保安文武所受之大命者終始惟七年矣多士第十六此篇衆多之士皆紂時有位之士也習紂之惡頑不率教遂遷之耳史官以周公所告之言稱爾殷遺多士又稱爾殷多士故以多士名篇成周既成周公於澗水之東瀍水之西營作王城於瀍水之東營作成周是成周乃王城東之邑也成周之邑既成遷殷頑民遷殷頑不率教之民居之周公以王命誥公恐有安土之人故稱成王命以告作多士作此篇書多士舊簡所題惟三月周公攝政七年十二月既復辟乃以次年三月遷頑民周公初于新邑洛公初往新邑洛用告商王士用安慰開諭以告商紂時有位之士王若曰公謂王意若曰爾殷遺多士爾衆乃殷王遺餘之多士弗弔以紂為不道不足恤弔的旻天大降喪于殷皇天乃大降下喪亡之禍于爾殷家我有周佑命有周乃受上天佑助之命將天明威遂將奉上天顯然之威罰致王罰致王者之罰于紂勅殷命終于帝以正殷之命使終絶于天謂彼不正此以天威正之肆爾多士非我小國敢弋殷命故爾多士當知我周之有天下非我周小國敢弋取殷之天命惟天不畀乃紂不道不為天之所與允罔固亂信乎天不堅固此為亂人弼我所以輔弼我周我其敢求位我周豈敢求爾商之天位惟帝不畀紂不道不為天帝之所與惟我下民秉為惟我下民皆秉心協力以為我故我所以有天位也惟天明畏惟此天威明然可畏我聞曰周公謂聞人説上帝引逸天意於君之好逸樂者皆引以去之有夏不適逸是以有夏時如大禹諸賢君知天意所在皆志於憂勤不敢適情以逸樂則惟帝降格則惟天降至於夏其意向在夏也嚮于時夏自是之後漸次向至於是夏桀之君弗克庸帝不能用上天意大淫泆有辭盡大過於泆蕩而有惡辭在人泆逸惟時天罔念聞惟是之故天不復愛念不復聽聞厥惟廢元命遂廢絶其大命降致罰而降行天罰於桀乃命爾先祖成湯革夏天乃命爾商之先祖成湯改革夏命為商俊民甸四方又生賢俊佐湯治四方自成湯至于帝乙故自湯至帝乙二十六君皆能念天之意罔不明徳恤祀無不明一己之徳以憂恤祭祀之事亦惟天丕建保乂有殷亦惟天之所大建立而安治於有商殷王亦罔敢失帝殷王亦無敢失天意罔不配天其澤無不益廣其徳以合上天之澤在今後嗣王奈何在今後嗣王紂誕罔顯于天大不明於天意是以天引逸而紂乃適逸矧曰况能自言其有聽念于先王勤家其有耳聽心念先王勤勞以建立國家之事業誕淫厥泆乃大過為泆蕩之事罔顧于天顯民祗全不顧視天之顯然可畏民之不可不敬惟時上帝不保惟是天乃不安於紂降若兹大喪遂降此大喪亡之禍惟天不畀天不與紂者不明厥徳以紂不明其徳凡四方小大邦喪凡四方小邦大邦用至喪亡者罔非有辭于罰以習紂惡我國家征伐四方之國無非有可罰之辭王若曰公又言王意爾殷多士爾殷衆士今惟我周王今國家得天下者以我周文王丕靈承帝事大善承順天所欲行之事有命曰割殷於是天有命命文武曰可割絶殷紂之命告勅于帝然後以正殷之事告于上帝也惟我事不貳適惟我國家所作事無有再往者以其承帝所欲行毎一舉而定惟爾王家我適惟爾商家不明天命所歸如紂之惡我國家已滅之而爾武庚復反使人於伐紂之事遂再往予其曰我豈怨汝但自言曰惟爾洪無度惟爾紂不君武庚不臣大無法度我不爾動我固不為汝之恐動自乃邑其罪皆自汝邑中自造有以招我之罰耳予亦念天即于殷大戾我亦念天已就於殷誅紂殺武庚而大加罪戾肆不正故今日汝等雖有罪我皆肆赦而不盡正其罪謂不忍盡伐也王曰猷此以下公告以遷之之意謂王以道而言告爾多士告爾殷之衆士予惟時其遷居西爾我今惟是遷爾等之居於西爾商在洛邑東自商遷洛是自東適西非我一人奉徳不康寧然我所遷爾者非我一人奉持其徳好動衆不安寧時惟天命是惟天命如此無違不可少違朕不敢有後我所以急營成周遷爾而西不敢有後時無我怨爾無怨我惟爾知爾等是殷王遺民非不知惟殷先人有册有典今日所以不用爾等在位者殷王先世自有册書有典籍殷革夏命載殷家當時改革夏命之事今爾又曰今爾又倡言於下曰夏迪簡在王庭夏民在當時我殷王皆啓迪簡拔使之在王庭有服在百僚皆有職事列在百僚之間予一人惟聽用徳我一人惟於有徳者是聽是用肆予敢求爾于天邑商汝果有徳故我敢求汝於天邑之商而用之商舊為王都故從舊言天邑予惟率肆矜爾今我率皆肆赦矜恤所以遷改而西者非予罪非我之罪時惟天命是惟天命如此而已王曰公又以王命告多士呼衆士昔朕來自奄昔我東滅三監之後自奄來歸於鎬予大降爾四國民命我大降減爾管蔡商奄四國之民死命降猶今法降一等降重從輕我乃明致天罰然後我方始明致行天罰於汝移爾遐逖用移爾等於遐逺之郷謂遷之成周是降死一等以流法處之比事臣我宗多遜亦使之親密王室親此服事以臣於我王家祖宗尚為多順之事將使化為友民也王曰又更端稱王命告爾殷多士告爾殷家衆士今予惟不爾殺今我惟不殺汝者予惟時命有申我惟以是誥命三令五申教汝今朕作大邑于兹洛今我所以作大邑於此洛地予惟四方罔攸賔我意以四方諸侯無所賔見於王此洛地則四方道里之均故營之以為朝會之所亦惟爾多士亦以爾衆士去王都逺教化有所不使故又營成周使汝密邇王室攸服奔走所以易於服其奔走之勞臣我多遜臣事與我王室而為多順之事爾乃尚有爾土爾庶幾有爾所居土爾乃尚寧幹止爾乃庶幾得安於幹其所居止之事爾克敬爾於既遷之後果能致敬不狃前日之惡天惟畀矜爾則天將有畀與於汝矜恤於汝爾不克敬汝若後狃前惡不能致敬爾不啻不有爾土則汝不但不能保有汝今所居之土啻趨予亦致天之罰于爾躬我亦將行天罰於汝身今爾惟時宅爾邑汝惟是之故須當居汝所居之邑繼爾居為長久之計使子孫相繼於爾所居之地爾厥有幹有年于兹洛則凡汝所幹可長久於此洛邑爾小子乃興從爾遷當時㓜小子孫必有不遷者今皆興起以從爾遷王曰周公謂成王既言此又曰又復言曰時予乃或言爾攸居於是乃或言及爾所居而不能自已者葢欲爾往新邑變頑為友庶幾可以安其所居也無逸第十七此時周公方復政厥辟成王初臨涖萬幾能知其不可自逸而動以行之後猶或怠況始焉不勤則後將若何故周公防徹杜漸而作此書以警之周公作無逸孔子序此書與周公作立政伊尹作咸有一徳同直書之而意自顯無逸竹簡所題周公曰嗚呼公歎言君子所其無逸君子所其無逸豫者先知稼穡之艱難以其先知稼穡之事沾體塗足不勝艱難乃逸終獲有秋之利而享逸豫則知小人之依則知小人之依頼者在於稼穡因此不敢逸豫相小人奈何相視彼小人厥父母勤勞稼穡其父母勤勞於稼穡厥子乃不知稼穡之艱難其為子者食父母之食衣父母之衣乃不知衣食自稼穡艱難中來乃逸乃為逸豫遊戲乃諺則反言議父母既誕既又敢誕父母否則侮厥父母不然則又訕侮父母曰乃言昔之人無聞知我父母古老之人無聞見識知不能享其樂也周公曰嗚呼凡此更端皆歎而重其事我聞曰我聞古人之言昔在殷王中宗大戊嚴恭寅畏天命上則嚴恭寅畏天命嚴以恭之非徒恭而已敬而畏之非徒畏而已如有冦盗而畏豈敬畏哉如見小人在位而恭豈嚴恭哉自度治民下則從法度以治民祗懼不敢荒寧夙夜之間祗敬恐懼不敢荒廢於事以圖安寧肆中宗之享國七十有五年故天與之民悅之享國之永其在髙宗時自大戊以下十四世至髙宗其名曰武丁舊勞于外舊為王子常勤勞於外爰暨小人於是所與者在下之小人作其即位及作起而即位乃或亮陰三年不言乃或居父之喪信然隂黙三年必謹持喪之道曽不發言其惟不言言乃雍惟居喪不妄發言及發言則切中人情而雍和不敢荒寧不敢荒廢於事以圖安寧嘉靖殷邦雖處衰亂之時實能善靖殷邦之亂以致中興至於小大至於天下之民小者大者無時或怨求得欲從無時有怨髙宗者肆髙宗之享國五十有九年享國之永其在祖甲自髙宗而後三世其君謂之祖甲先儒皆以為太甲非葢周公順世次言之太戊之後言髙宗髙宗宗之後祖甲不義惟王鄭𤣥亦謂祖甲武丁子有兄祖庚賢髙宗欲廢兄立祖甲祖甲以此為不義逃於民間故此云不義惟王舊為小人舊逃民間而為小人作其即位及其作起而即王位爰知小人之依於是知小人所依頼稼穡能保惠于庶民故能保佑恵愛衆民不敢侮鰥寡不敢輕侮鰥夫寡婦肆祖甲之享國三十有三年享國之久亦由無逸所致自時厥後立王自是三宗之後所立之王生則逸生則享安逸不知民間之疾苦生則逸惟其生則逸不知稼穡之艱難不聞小人之勞不知艱難不聞勞苦惟耽樂之從惟過樂之事是從耽丁南自時厥後故自是之後或自中宗之後或自髙宗之後或自祖甲之後亦罔或克壽亦無或能享夀考者或十年多者十年或七八年或五六年其次七八年其次五六年或四三年甚至三年四年皆耽樂損夀也周公曰嗚呼又更端歎言厥亦惟我周大王王季謂無逸永年豈惟商三宗而已其亦惟我周家祖宗有大王王季克自抑畏能自謙抑能自畏懼文王卑服文王繼之亦以抑畏為心而卑其所服不敢妄自矜大一說卑陋其服飾不敢華侈即康功田功卑下其所事故所就者安民之功與田畝之功徽柔懿恭善其柔使不至於不立善其恭使不至於足恭懷保小民小民則懷來而保安之惠鮮鰥寡鰥寡則以恩惠而鮮活之自朝至于日中昊自早朝至日之方中或至日昊昊仄不遑暇食不遑於寛暇以食饑則急食不暇緩食也用咸和萬民非欲自善將用此皆和悦天下之民文王不敢盤于遊田不敢樂於遊遨田獵之事以庶邦惟正之供以衆邦諸侯上之人當以正道待之文王受命惟中身厥享國五十年受命在中年之身必是近五十左右受命為諸侯至九十七而終享國五十年亦以勤儉享國之永周公曰嗚呼歎言繼自今嗣王繼自今以往嗣王呼成王則其無淫于觀無過於觀玩于逸無過於逸豫于遊于田無過於遊戲田獵以萬民惟正之供以萬民在下當以正道待之無皇曰王無自大言曰今日耽樂我止今日耽於樂乃非民攸訓雖一日之樂若無害非所以為訓民之道非天攸若亦非天意所順時人丕則有愆一時之人化之亦將大有愆過無若殷王受之迷亂無如商王名受迷惑昏亂酗于酒乃酗于酒謂因酒為凶也酗煦徳哉成王觀此可不務於徳哉周公曰嗚呼公又歎言我聞曰我聞古人之言古之人猶胥訓告古之人凡相處者或有過失猶陳古以訓或直言以告不從又未敢深言以逆其意胥保惠且保安而惠愛之待其意與吾相得也胥教誨則又詳以教之誨之民無或胥譸張為幻故一時為民者皆無譸張誑誕而為幻惑之事皆以誠相處也古之人相處猶以誠相規箴如此況我與王君臣也譸輈幻患此厥不聽苟王於我此言不能聽用人乃訓之則人乃務相順從不復以諫正為事乃變亂先王之正刑乃相與變亂先王之正法至于小大至於小事大事無不變亂民否則厥心違怨及其不為順從則其心又違忤於君怨恨於君否則厥口詛祝及其又不為違怨則其口必詛祝於君詛祝罵之也詛側助反祝咒周公曰嗚呼又歎言自殷王中宗及髙宗及祖甲及我周文王兹四人迪哲此四君皆行明哲之徳以臨下知人情偽不為人言所惑厥或告之曰其或告之曰小人怨汝詈汝小人心怨汝口罵汝詈力知反則皇自敬徳則大自敬修其徳不復責人厥愆其以下謗上乃民之愆過曰朕之愆而此四君則曰非民之愆乃朕之愆允若時淮四君信能如是不啻不敢含怒則於小民之怨詈不但不敢含畜忿怒於心曰樂聞其言以知己過此厥不聽苟成王於我此言不能聽用人乃或譸張為幻人乃或有誑誕為幻惑者曰小人怨汝詈汝言小人心怨汝口罵汝則信之則汝必輕信不復辨眞偽則若時夫如是不永念厥辟又不能常念其為君之道不寛綽厥心必不能寛大綽緩其心亂罰無罪含怒躁急妄罰無罪殺無辜殺戮無辜之人怨有同泃怨詈一人耳今乃怨惡之心同於天下是叢于厥身是其怨且將叢聚於一人之身矣周公曰嗚呼公又歎言嗣王其監于兹呼成王其當監觀我此篇之言尚書句解卷九
