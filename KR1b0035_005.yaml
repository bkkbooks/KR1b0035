body:
  text: 尚書句解卷五元朱祖義撰盤庚上第九堯舜未施信而民信之動則丕應徯志有不待言而自從者商徳之衰盤庚欲為遷都之舉而民敢出怨言以咎其上其君從而諄複告語之上篇告於未遷之時中篇告於將遷之際已遷之後又為下篇以安慰之亦足以見風俗之薄矣又足以見盤庚之於民忠厚之至也歟盤庚五遷湯遷亳仲丁遷嚻河亶甲居相祖乙遷耿盤庚又遷亳自湯至盤庚五遷將治亳殷將修治亳邑之別名殷商人稱殷自盤庚遷殷始民咨胥怨民皆咨嗟相怨作盤度三篇盤庚盤庚遷于殷民不適有居民不肯往亳殷所有之邑居率籲衆戚盤庚皆呼衆憂之人出矢言出陳誓言以告之曰我王來言我王祖乙自相來旣爰宅于兹旣於是居于此耿地重我民亦惟愛重我民無盡劉無盡殺害之置之死地也不能胥匡以生豈意耿邑復有河患汝民不能相正以生生之理卜稽曰我乃考之龜卜卜之所言果曰其如台其如我所欲遷殷者先王有服况我商自湯以來凡有所事恪謹天命無不誠恪敬謹天命兹猶不常寧於此猶不能常安居不常厥邑不常處其都邑于今五邦自湯至今五遷都矣今不承於古倘今不能順古先王之事以遷罔知天之斷命則是不知天之斷絶汝命於此耿地斷上聲矧曰況曰其克從先王之烈其能從湯成功故地而居若顚木之有由蘖如顚仆之木尚有萌蘖再生之理天其永我命于兹新邑今天將長我商家社稷無窮之命於此新邑紹復先王之大業使我繼紹復興先王大業厎綏四方致安四方盤庚斆于民故今盤庚教民以遷斆效由乃在位必自汝在位人臣始以常舊服使人臣用先王常行遷都故事正法度正其法度率民以遷曰所言惟曰無或敢伏小人之攸箴自今以往無或敢隱伏小人所以箴規人君之心欲遷都者王命衆悉至於庭盤庚命羣臣及庶民盡至於庭王若曰盤庚順其事告之曰格汝衆至汝衆人予告汝訓我告汝以教訓之言汝猷黜乃心汝謀去汝私心無傲從康無敖慢上命不肯往遷從康安之志古我先王亦惟圖任舊人共政古我先王自湯而下亦惟圖謀任用老成舊臣與之共行政事王播告之修故先王有號令播告之修為不匿厥指皆言達於下未嘗隱匿其旨意王用丕欽先王亦欲大敬罔有逸言無有過逸之言惑亂衆聽民用丕變是以民用大變其所為從上所為今汝聒聒今汝等人臣聒聒然肆為多言起信險膚務為險峻膚淺之言以起信於人予弗知乃所訟我竟不知汝所爭者何事非予自荒兹徳非我自失此徳以為必遷惟汝含徳若從汝言惟汝含容以為徳不惕予一人使汝終不畏我一人予若觀火我若觀火燎原坐視不救予亦拙謀則我亦拙謀作乃逸成汝之過矣若網在綱民從上如網之在綱有條而不紊舉其綱則網之目皆有條理不紊亂若農服田力穡今民誠體網從綱之義不憚勞而從遷正如農夫有事於田畆盡力於稼穡也乃亦有秋汝亦有秋成之利孰謂遷都不享安居之利邪汝克黜乃心汝犀臣誠能去汝傲上從康之心施實徳于民施其實徳惠于民使享安居之利至于婚友以至汝婚姻朋友他日皆有生生之樂丕乃敢大言我於此時方敢丕大其言語汝有積徳稱揚汝祖父在先王時能率民以遷今汝又能率民以遷是有積世之徳在民乃不畏戎毒于逺邇汝若不知畏懼大為害於逺近之民惰農自安如惰農偷一時之安不昬作勞不知敏勉以作勞苦之事不服田畝不肯服事田畝之間越其罔有黍稷於汝無有黍稷之利矣汝不和吉言于百姓汝不能調和善言以曉諭百姓使遷惟汝自生毒他日民不安居是汝生毒乃敗禍姦宄乃至敗禍姦宄以自災于厥身以自取災害于其身乃旣先惡于民汝旣率民以不遷是以惡先為之倡乃奉其恫乃自奉其災痛恫通汝悔身何及至是汝雖悔之何所及乎相時憸民今我相視一時小民猶胥顧于箴言或事不如意猶相顧於箴勉之言其發有逸口惟恐言之妄發則以口過取禍矧予制乃短長之命况我制生殺之權實操汝短長之命汝曷弗告朕汝苟以遷都非利何不入告我而胥動以浮言而乃相摇動以不實之言恐沈于衆恐動沈溺衆人若火之燎于原如火之焚燎于原野不可嚮邇火雖不可向近其猶可撲滅其猶可撲而滅之今汝肆浮言於下我一旦用刑以撲滅之則惟汝衆則是汝衆臣自作弗靖自為不安非予有咎非我一人咎惡遲任有言曰盤庚又舉古賢遲任有言人惟求舊人求舊則所見審器非求舊惟新器舊則弊弊則必易新者古我先王自成湯以下曁乃祖乃父與汝祖汝父胥及逸勤安則相與同其安勞則相與同其勞予敢動用非罰我豈今日不念其子孫敢動用非祖之罰加爾乎世選爾勞世世選用爾之勞績予不掩爾善我不敢掩蔽爾善兹予大享于先王此我有烝嘗之祭大享于先王爾祖其從與享之爾之祖亦從而與享作福作災今汝或為善或為惡皆汝自取予亦不敢動用非徳我亦豈敢以非徳賞汝乎予告汝于難我告汝以行事之難不可輕易若射之有志如射之志於的必詳審而後發汝無侮老成人老成慮逺必欲遷也汝無侮之不從其言無弱孤有幼幼無父罹其害亦欲遷也汝無弱之不聽其言各長于厥居各思乆長所居勉出乃力勉出汝之心力聽予一人之作猷聽我一人所作之謀無有逺邇無有逺邇踈近而親用罪伐厥死不能率民以遷是用罪也吾必有罰以伐汝趨死路用徳彰厥善能率民遷是用徳也吾必有賞以彰汝向善之心邦之臧旣遷之後國之臧善得以去害趨利惟汝衆皆出汝衆之謀邦之不臧旣遷之後國之不善惟予一人有佚罰惟我一人有過失之罰凡爾衆凡爾衆臣其惟致告其惟以吾言致告戒於民自今至于後日自今日至後日各恭爾事各自恭敬汝所治事齊乃位整齊汝所居之位度乃口以法度制節汝口無浮言罰及爾身弗可悔不然吾有罰以加爾之身汝欲悔之而不及矣盤庚中第十盤庚作盤庚率民而起惟涉河以民遷涉河而南以民遷亳乃話民之弗率乃以話言陳述向來不率之民誕告用亶其有衆大告以言用誠信以孚于衆人之心咸造弗褻在王庭臣民咸至王庭亦皆以誠信應上命無敢冇褻狎者盤庚乃登進厥民盤庚乃升其民而進至前曰諭之曰明聽朕言汝當明明聽我之言無荒失朕命無復如前日之荒怠遺棄我之教命嗚呼嗟歎古我前后盤庚己前諸君罔不惟民之承凡有施為無不惟民是順保后胥慼民亦保衞其君相與同其憂戚鮮以不浮于天時少有不先天時以趨事者殷降大虐以天於殷家屢降大虐罰如囂與相皆有水患先王不懷是以先王不敢懷安故邑厥攸作其所作為視民利用遷必視民所利而用之以遷汝曷弗念我古后之聞汝民何不念我先王遷都之事聞之後世者承汝俾汝惟喜康共我今日遷不過順汝民情使汝惟喜樂康安之是共非汝有咎非汝有罪咎比于罰故遂遷徙勞頓使汝比近于罰予若籲懷兹新邑我所以順呼汝民使懷安于此新邑者亦惟汝故亦皆緣汝之故以丕從厥志所以大從汝之志願今予將試以汝遷今我將用以汝遷安定厥邦安定綏懷於其邦汝不憂朕心之攸困汝民乃不憂我心之所困者在於欲遷乃咸大不宣乃心乃皆大不宣布汝之腹心欽念以忱敬念以忱誠動予一人感動我一人爾惟自鞠自苦是汝自取困窮自取病苦若乗舟譬如乘舟汝弗濟汝不以時而濟臭厥載將臭敗其所載之物爾忱不屬今汝忱誠有所不逮不能從我遷惟胥以沈惟相與及於沈溺矣不其或稽爾乃不能稽考是非利害所在自怒曷瘳他日罹其禍患雖自怒何所瘳瘥乎汝不謀長汝不謀為長乆之計以思乃災以思汝不遷之災汝誕勸憂是汝大勤勉於憂愁之道今其有今罔後今但有目前無長久之計汝何生在上汝何以得久生在世上乎今予命汝一今我命汝遷亳之言一定不易無起穢以自臭無鼓浮言惑衆如起横惡之物非特臭及他人適所以自臭也恐人倚乃身恐奸人好生事者倚托汝之身迂乃心以迂曲汝之心倡浮言以惑衆遂文其説以謂衆人之情皆如此有此等人汝不可輕信予迓續乃命于天我所以將汝遷者但欲迎迓接續汝命于天予豈汝威我豈以威脅汝哉用奉畜汝衆欲奉養汝衆民而已予念我先神后之勞爾先因念我先神后自湯至祖乙諸君勞動爾先祖率民以遷予丕克羞爾用懷爾然使我今日大能進用爾於列位者用懷爾祖之勞所以如此失于政苟今日爾臣不能率民以遷是失其政也陳于兹不當久居於耿而欲居之是陳於兹也髙后丕乃崇降罪疾曰我啇髙后乃赫然震怒于上天大重降其罪疾於我曰曷虐朕民耿地圮壞如此汝何虐害我民而不遷乎汝萬民乃不生生汝萬民乃不以生生為念曁予一人猷同心與我一人謀同其心以遷先后丕降與汝罪疾曰則我先后又將大降與汝以罪疾曰曷不曁朕幼孫有比耿地如此汝何不與我幼小之孫有所親比相與共遷乎故有爽徳此皆我先王有明爽之徳在天見汝衆民傲慢不從有此罪疾自上其罰汝乃自上天降罰於汝汝罔能廸汝將何道以辭其責古我先后自成湯至祖乙旣勞乃祖乃父旣以遷都之故勞爾祖父汝共作我畜民故我用汝共為吾民畜養之官汝有戕則在乃心汝乃有戕賊吾民之象在汝之心我先后綏乃祖乃父則我先王必先有以安慰汝祖汝父乃祖乃父乃㫁棄汝使汝祖父乃㫁絶遺棄汝不救乃死坐視汝受先王之罪疾而不救汝死兹予有亂政同位於此衆有亂政之臣締交立黨同在列位具乃貝玉眷戀取邑沃饒備具貝玉貝水蟲古人取其甲為寳如今用錢玉亦寳也乃祖乃父丕乃告我髙后曰汝祖父將大告我先王曰作丕刑于朕孫可作為大刑罰以及於我子孫迪髙后又開導啓迪我先王丕乃崇降弗祥大重降不祥之事於汝身而不汝赦嗚呼盤庚嗟歎今予告汝不易今我告汝不可改易永敬大恤無胥絶逺汝分猷念以相從汝分其謀分其念各自為謀念以相從我無同謀合辭以為不可遷各設中于乃心各設中正于汝心無狥私情而忘公理乃有不吉不迪乃或有不善不道之人顚越不恭顚覆違越我言不恭我命暫遇姦宄徒欲耿邑時暫逢人而為奸宄之事我乃劓殄滅之我乃輕則割其鼻重則殄滅之至死無遺育無使遺漏再得生育於世無俾易種于兹新邑無使移其種類於此新邑往哉生生往新邑則可厚生生之理今予將試以汝遷今我將試與汝衆遷于亳都永建乃家以永長建立爾之家盤庚下第十一盤庚旣遷旣渡河以遷于亳邑奠厥攸居君民各定所居乃正厥位正其宗廟社稷朝廷之位綏爰有衆慰安有衆之情使無疑曰無戲怠言旣遷之後無遊戲怠惰懋建大命當勉立汝之大命長為生生計今予其敷心腹腎腸今我其布心腹腎腸所藴歴告爾百姓于朕志歴歴告以所遷之志罔罪爾衆今日旣遷無罪爾衆爾無共怒爾衆無共為忿怒協比讒言予一人相與恊比肆讒言以毁我一人古我先王湯將多于前功契始居亳湯欲廣前功於是復居亳適于山往亳依山而居用降我凶徳用降凶徳而升吉徳嘉績于朕邦湯所以能成美功於我國家今我民用蕩析離居今我民在耿地用摇蕩分析離其所居罔有定極無有定止爾謂朕曷震動萬民以遷爾臣民乃謂我何無故震動萬民以遷都之勞肆上帝將復我髙祖之徳殊不知我遷乃天將復我髙祖成湯盛徳大業亂越我家致治於我國家朕及篤敬朕於是及篤厚欽敬之臣恭承民命敬承民之命用永地于新邑用長其宅地于此新邑肆予沖人故我幼沖之人非廢厥謀非敢廢爾卿士大夫不遷之謀而不用弔由靈惟至誠用善謀及去爾不善之謀各非敢違卜爾不欲遷而我必遷蓋不敢違吉卜用宏兹賁將恢𢎞増大商業賁餙其治耳嗚呼盤庚嗟歎邦伯師長一邦之伯諸侯衆官之長六卿百執事之人百執事小臣皆呼而告之尚皆隱哉爾等庶㡬皆加惻隱之心予其懋簡相爾我其勸勉簡擇使爾為我輔相念敬我衆思念欽敬我之衆民朕不肩好貨我不任好貨財之人敢恭生生有能果於恭敬生民之生者鞠人謀人之保居能鞠養人者又能圖謀使人保安其居者敘欽吾則敘其勞績而用之加其禮貌而敬之今我旣羞告爾于朕志若否今我旣進爾告爾以我志所順與不順者罔有弗欽無有不敬無緫于貨寶爾無以緫聚貨寳為心生生自庸惟以厚民生生之業自用其心式敷民徳用布其愛民之徳永肩一心長任此心而不變說命上第十二嘗怪傅說以匹夫而登相位不由薦舉不由人望不由勲業不由資序田野之夫一旦得君如此然有髙宗有傅說則可君非髙宗臣非傅說而欲效其所為未必不以私意用人也若漢文以夢得鄧通光武以䜟用王梁豈足以為憑哉後之君欲用人者當如堯之試舜則可以無失矣髙宗夢得說髙宗思想賢相之功遂於夢中得傅說之形象說曰使百工營求諸野使百官經營而求諸田野得諸傅巖果得說於傅氏之巖作說命三篇說命舊簡所標王宅憂髙宗宅憂亮隂三祀誠信淵黙不言已三年旣免喪已除喪其惟弗言其猶不言羣臣咸諫于王曰羣臣皆進諫于髙宗曰嗚呼嗟歎知之曰明哲事無不知謂之明哲明哲實作則有明哲之徳則所言實可為天下之法則天子惟君萬邦髙宗以天子之尊君臨萬邦百官承式百官遵承其言以為法式王言惟作命人君有言則可以為教命不言無言臣下罔攸稟令則臣下無所稟受其號令王庸作書以誥曰髙宗用臣下進諫之故作書以誥曰以台正于四方以我表正四方台恐徳弗類我恐徳之不善無以率天下兹故弗言此所以不言恭黙思道但恭敬淵黙沈思治道夢帝賚予良弼已而思之旣深誠感上天於夢寐間見上帝賚賜以忠良輔弼之人其代予言將以代我出言令四方乃審厥象乃審度思念夢中所見之形象俾以形旁求于天下使以夢中所見圖為形以此形徧求天下說築傅巖之野惟肖果於傅巖得築隄人名說者與此形相肖爰立作相於是立以為相王置諸其左右髙宗處之左右使兼師保之職命之曰遂命之言朝夕納誨朝夕之閒納其誨言以輔台徳以輔翼我之徳若金若金欲成利器不可無礪用汝作礪今用汝說作礪欲其體此義以治己若濟巨川若濟渡大川不可無舟楫用汝作舟楫用汝說作舟楫欲體其義以濟難若歳大旱若年歳大旱不可無霖雨用汝作霖雨用汝說作霖雨欲體此義以澤民啓乃心啓發汝心所藴沃朕心以沃我心若藥弗瞑眩如藥不能使人昏潰厥疾弗瘳則病不愈言不能使人難受則非心不格若跣弗視地如徒跣而行不視地厥足用傷則足用傷不資說為視聽則必至於害事惟曁乃僚欲說率其僚屬罔不同心以匡乃辟同心以匡正其君心俾率先王使其君率循古先王迪我髙后道迪我髙后成湯之所行以康兆民以安兆民嗚呼髙宗又歎欽予時命汝當敬我是命其惟有終其惟有終如始說復于王曰說於是荅髙宗惟木從繩則正木有曲直惟從繩墨作為器用則正后從諫則聖君所行有善否惟能從諫弗咈斯足以成聖徳后克聖惟君能成聖徳臣不命其承則在朝之臣不待君命皆承上意以納諫疇敢不祗若王之休命如是則誰敢不敬順王之美命說命中第十三惟說命惟傅說承王命緫百官居冢宰之職以緫百官乃進于王曰進戒于王嗚呼明王奉若天道天有日星之布列尊卑相正小大相維故明哲之王奉順天道而體之建邦設都建諸侯之邦於外設天子之都於内樹后王君公於都立天子以治之謂之后王於邦立諸侯以治之謂之君公承以大夫師長又各為之命大夫與衆官之長以承奉於諸侯天子不惟逸豫豈欲逸豫以位為樂惟以亂民惟欲體天道叶心勠力以治民惟天聦明天之聦自我民聽天之明自我民視出於自然至公無私惟聖時憲聖人法天聦明無一毫之私意惟臣欽若則臣下皆敬順惟民從乂斯民敢不自治惟口起羞言出於口為命一命受爵再命受服三命受位苟口之所命非人則適以自取羞辱惟甲胄起戎身被甲胄以禦寇若無故被甲胄則適以自致冦戎惟衣裳在笥惟口起羞也故衣裳寧藏在笥不可輕以予人惟干戈省厥躬惟甲胄起戎也故用干戈必省於躬不可輕以加人王惟戒兹王惟以此為戒允兹克明言此不可輕用而能明其所為乃罔不休惟能賞當功罰當罪無不善矣惟治亂在庶官惟天下之治亂在庶官得人與不得人爾官不及私昵欲官其人不可以私愛而官之惟其能惟有才能然後官之爵罔及惡徳欲賜以爵不可以惡徳而進之惟其賢惟有賢徳然後爵之慮善以動審慮其事合於善然後可以動動惟厥時旣善而動又必其時以立功有其善苟慮善而動遂以善為已有喪厥善適所以失其善矜其能動而有功遂矜其能喪厥功適所以失其功惟事事乃其有備惟事事皆為之預備有備無患有備則無憂患無啓寵納侮無開寵嬖之門納小人之侮無恥過作非無羞恥有過而作成其非惟厥攸居思慮於所居無事之時政事惟醇則政事皆醇粹無有駮雜黷于祭祀祭祀數則黷時謂弗欽是謂之不敬禮煩則亂祀禮煩則紛亂事神則難施於事神難以格其來享王曰旨哉髙宗味其言羙說呼說乃言惟服爾所言我惟佩服而行之乃不良于言苟爾不善於所言予罔聞于行則我無所聞而厎於行說拜稽首曰說於是手至首而拜君首至地而稽首言曰非知之艱非徒知其言之善者為難行之惟艱能行其言之善為難王忱不艱髙宗誠能不以行之為難而盡躬行之實允恊于先王成徳信能合先王成湯已全之成徳惟說不言有厥咎有君如此而說不言當自負其咎罪也說命下第十四王曰來汝說髙宗言來汝說台小子舊學于甘盤我小子舊日學于賢臣甘盤旣乃遯于荒野旣而廢業乃隱遯居田野入宅于河後入居于河濵自河徂亳自河往亳邑即位曁厥終罔顯及其終無顯明之徳爾惟訓于朕志故今日有望於傅說訓迪我志若作酒醴如作酒醴必用麯糵爾惟麯糵資爾說體麯糵之義以輔成我之徳使之醇正若作和羮如作和羮必用鹽梅爾惟鹽梅資爾說體鹽梅之義以調和我之性使之温柔爾交修予罔予棄爾說能交迭修治我之徳而不我棄予惟克邁乃訓則我亦能行汝訓言說曰說言王稱王而告人求多聞人之為人所貴多聞之冨時惟建事將以是建立政事也學于古訓又必學于古訓多識前言往行乃有獲然後發於政事有得於善事不師古苟為政事不法乎古以克永世而能享長世之祚者匪說攸聞非說所聞惟學遜志惟學當謙遜其志務時敏務要時時敏疾以求之厥修乃來則其所修乃來欲仁而仁至也允懷于兹信能懐念此遜志時敏之誠而不怠道積于厥躬則道積於其身惟斆學半然以道教我者特學之半念終始典于學惟因其所教而自思念終始有常於學厥徳修罔覺則其徳之修日益不自知監于先王成憲其永無愆又能監視先王成湯為學成法而躬行之其永無失徳之愆也惟說式克欽承有君如此惟說用能敬承其徳旁招俊乂廣求俊而有徳乂而有才者列于庶位以列于庶位共致其修輔之功王曰嗚呼髙宗歎言說呼說告之四海之内咸仰朕徳今四海之間皆仰慕我徳時乃風皆是汝之風化有以鼓舞而動蕩之股肱惟人信有股肱之助方可為人良臣惟聖有良臣之助方可成聖徳昔先正保衡昔者伊尹為先代百官之正長謂之保衡言為人君所保以為平者作我先王作成我先王湯之徳乃曰乃言予弗克俾厥后惟堯舜我若不能使其君為堯舜之君其心愧恥若撻于市心愧恥若鞭撻于市井閒一夫不獲其民有一夫不得其所則曰時予之辜言是我之罪佑我烈祖故能佐佑我功烈之祖湯格于皇天其徳足感格于皇天也爾尚明保予爾說庶㡬體伊尹致君澤民之志明白其心以安我罔俾阿衡專美有商無使伊尹為君所倚以取平者得以獨擅美名於商惟后非賢不乂惟君非得賢人不使以治天下惟賢非后不食賢人非得賢君則寜退而不食天禄君臣之相擇如此今日我君臣可謂明良慶㑹其爾克紹乃辟于先王爾說當輔乃君之徳使足以仰繼於先王永綏民永妥天下之民說拜稽首曰解見前篇敢對揚天子之休命天子揚此美命於上而公卿大夫知之大臣揚此美命於下而百執事與天下之人知之是謂對揚也髙宗肜日第十五此篇祖己作以訓髙宗見君臣遇災警戒之意夫以髙宗之聖精誠上通於天而四海仰徳於下冝祥瑞屢見可也胡為肜祭之日有雉升鼎耳之異蓋天心之愛君猶父母之愛子故凡加之以鞭撻警之以詞責者必其可教之子若夫子之不肖為父母所棄絶者則無事鞭撻訶責矣肜容髙宗祭成湯有飛雉升鼎耳而雊絲衣繹賔尸之詩言自羊徂牛鼎鼎及鼒則繹祭亦陳鼎鼐明矣髙宗祭湯之明日方陳鼎鼐乃有雉自外來入其廟中升鼎耳而鳴蓋髙宗之祀常豐于昵祖則必殺於逺者其祭湯時必多闕不備故有此異雊構祖己訓諸王賢臣祖己怪之遂訓王欲其修己以應天作髙宗肜日作此篇書髙宗之訓又作髙宗之訓篇亡髙宗肜日史官題篇目髙宗肜日又言髙宗肜日史官推本祖己所言之由肜者祭之明日又祭也商謂之肜周謂之繹蓋有相承不絶之意取其尋繹而復祭也故春秋宣八年辛巳有事于大廟仲遂卒于垂壬午猶繹穀梁傳之曰繹者祭之明日又祭也髙宗於肜祭之日越有雊雉於此有雊雉之異夫雉之為禽飛鳴於野今乃於宗廟行禮之時升鼎耳而鳴其為災異明矣祖己曰惟先格王祖己言惟先格王之非心正厥事正其敬父薄祖之事乃訓于王曰然後訓于王曰惟天監下民上天監視下民典厥義以義為主降年有永有不永故降年於人有永有不永非天夭民非天固欲夭民而絶之民中絶命民之不義自中絶其命也民有不若徳民有不順其徳不聽罪又不服罪而恣行不義者天旣孚命正厥徳天旣以可信之命降之災異以格正其徳使之恐懼修省乃曰其如台民乃頑無知曰天命其如我何嗚呼嗟歎王司敬民君所司者代天敬民罔非天𦙍若祖若父代天敬民無非天嗣典祀無豐于昵凡祀之常典不可豐於父而薄於祖豐之於近廟而薄於踈逺也故髙宗有飛雉之異豈無自而然西伯戡黎第十六史記曰文王脫羑里之囚而獻洛西之地然後紂賜之弓矢斧鉞使專征伐為西伯文王旣受命於紂故諸侯有為不道文王誅之黎諸侯之國在上黨壺闗乃朝歌之西境其地密邇王畿其君黨惡於紂虐用其民故文王為民稱兵伐之祖伊知周徳及黎則天下之困於虐政者皆將去商歸周於是震恐作此篇殷始咎周史官言祖伊聞而始咎周蓋殷始咎惡周者周人乗黎以周人勝黎則舉天下困於虐政皆將歸之紂雖欲不亡不可得也祖伊恐祖伊震恐奔告于受奔告殷受作西伯戡黎遂作此書戡堪西伯戡黎竹簡所標題西伯旣戡黎又言西伯旣戡黎乃史官推本祖己所言之由蓋黎侯不道文王戡伐之祖伊知戡黎之後代虐以寛民必去商歸周祖伊恐於是震恐奔告于王奔走告商王受曰天子稱受為天之子天旣訖我殷命天旣訖絶我殷之命格人元龜稽於正人之言考於大龜之占罔敢知吉皆無敢言商家之吉非先王不相我後人非我商先代諸賢王不相助我後人惟王淫戲用自絶惟王自以滛亂戲怠之事自絶于天故天棄我故天因而棄絶我商不有康食喪亡無日不得安坐而食不虞天性倫於惡徳不知虞度天性之善不迪率典父子兄弟無以相養不知蹈循常典今我民罔弗欲喪今我商民無不欲其喪亡曰天曷不降威言天何不降威罰於紂大命不摯受天大命伐商者又何為不至今王其如台今紂雖尚處君位民心已離其如我何王曰紂恬不以為意方且言曰嗚呼我生不有命在天我生於世不有修短之命在天乎民雖怨我如我何祖伊反祖伊知其不可以言語感動反身而退語於人曰曰嗚呼乃罪多參在上歎紂罪惡多參列著見於上天天已誅絶之矣乃能責命于天今乃不自責已責命于天謂我生修短自有天命殷之即喪觀此知殷即日喪亡指乃功指汝之政事皆喪亡之兆不無戮于爾邦不能無誅戮之禍於爾殷邦微子第十七吕氏春秋曰紂母生微子時尚為妾改為妻生紂紂父欲立微子太史曰有妻之子不可立妾子乃立紂微者圻内國名子爵入為卿士微子傷國將亡作此篇以告箕子比干殷旣錯天命殷旣錯亂天命逆天命也微子作誥父師少師父帥箕子少師比干微子微子若曰意若曰父師少師呼箕子比干而告之殷其弗或亂正四方殷家危亡之證已成不復能治正四方矣我祖厎遂陳于上我祖成湯致力而行遂成其功昭然陳列在上我用沈酗于酒我紂沈湎酒而迷溺酗酒而醉怒用亂敗厥徳于下用亂敗湯徳于下殷罔不小大好草竊姦宄殷之臣民染紂之惡無有小大好為草野竊盗以至為奸於外為宄於内卿士師師非度以至上而六卿與庶士亦皆相師效為非法度之事凡有辜罪凡下有辜罪者乃罔恒獲乃上下相蒙常不獲罪小民方興小民之被害者方將興起相為敵讎共為敵讎今殷其淪喪喪亡若涉大水洪水其無津涯無有津涯畔岸不復可救殷遂喪越至于今殷遂喪亡顚越必在今日曰父師少師微子又呼箕子比干而與之謀我其發出狂我念商家危亡不覺發出狂疾吾家耄我一家皆老耄不堪遜于荒欲遯走于荒野今爾無指告予今我父師少師乃無指意告我顚隮若之何其不知商家顚越隕墜將若之何父師若曰箕子荅㣲子意若曰王子呼微子為王子天毒降災荒殷邦天降酷毒之災荒亂殷邦方興沈酗于酒紂方且興起沈酗于酒乃罔畏畏乃不畏其所可畏咈其耇長咈戾其老成長上舊有位人舊有職位之人今殷民乃攘竊神祗之犧牷牲用今殷民化之亦無所畏乃攘竊祭天神地祗色純之犧體全之牷牛羊豕之牲器實之用以容將食無災逓相容隱將而食之略無災罪降監殷民故我下視殷民用乂讎斂紂所用以治者皆重斂之人與民為仇讎召敵讎不怠故民仇之皆自召敵仇曽不解怠罪合于一君臣上下恣行不義罪合為一多瘠罔詔善良之人多有瘠病無有詔而救之商今其有災商家今有喪亡之災我興受其敗我若興起諫紂人必不聽徒受禍敗而已商其淪喪我罔為臣僕商若没亡我當守節不事他國之主以為臣僕詔王子出迪但詔微子出而逃遯我舊云刻子我舊日常云立微子繼帝乙微子旣不立而紂立未免刻害於子王子弗出微子不出紂必戮之我乃顚隮我商家乃顚越隮隕不可復存自靖為今之計不過人自為謀人自獻于先王人自為謀獻于先王我不顧行遯如我所謀誓與商為依豈復顧為遯走之計乎尚書句解卷五
